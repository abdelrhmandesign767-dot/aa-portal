<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>AR Gastronomy | Premium Dining</title>

  <!-- Typefaces: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js (r128) from JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- Tesseract.js from JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS — Obsidian Atelier
       Gold-on-black luxury. Every size from the φ scale (×1.618).
    ═══════════════════════════════════════════════════════════════ */
    :root {
      /* Palette */
      --gold:          #d4af37;
      --gold-pale:     #e8d48a;
      --gold-dim:      rgba(212,175,55,0.10);
      --gold-mid:      rgba(212,175,55,0.22);
      --gold-glow:     rgba(212,175,55,0.55);
      --ink:           #050505;
      --ink-lift:      #0c0c0c;
      --surface:       rgba(5,5,5,0.97);
      --white:         #f5f0e8;
      --text-hi:       #f5f0e8;
      --text-lo:       rgba(245,240,232,0.45);
      --text-mid:      rgba(245,240,232,0.70);
      --success:       #4db87a;
      --danger:        #e05a5a;
      --border-hair:   rgba(212,175,55,0.18);
      --border-mid:    rgba(212,175,55,0.30);

      /* φ Spacing */
      --s1:  5px;   --s2:  8px;   --s3: 13px;
      --s4: 21px;   --s5: 34px;   --s6: 55px;  --s7: 89px;

      /* φ Type scale */
      --t-2xs: 9px;  --t-xs: 11px; --t-sm: 13px;
      --t-md:  16px; --t-lg: 21px; --t-xl: 34px;
      --t-2xl: 55px; --t-3xl: 89px;

      /* Golden-ratio blade width */
      --blade-w: calc(100vw / 1.618);

      /* Easing library */
      --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);       /* luxury slide */
      --ease-out-quart:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);   /* elastic pop */
      --ease-in-out:     cubic-bezier(0.65, 0, 0.35, 1);

      /* Durations */
      --dur-blade: 0.78s;
      --dur-block: 0.60s;
    }

    /* ─── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-hi);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Grain overlay (subtle film texture across entire UI) ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
      opacity: 0.55;
    }

    /* ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
    ═══════════════════════════════════════════════════════════════ */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; background: var(--ink);
      transition: opacity 1s var(--ease-out-expo),
                  visibility 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .launch-bg {
      position: absolute; inset: -8%;
      background-size: cover; background-position: center;
      filter: blur(14px) brightness(0.4);
      z-index: 0; will-change: transform;
    }
    .launch-scrim {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 60%,
                  rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%);
      z-index: 1;
    }
    .launch-body {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--s5);
      text-align: center; padding: var(--s5);
    }

    /* Wordmark */
    .launch-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      letter-spacing: 14px; color: var(--gold);
      text-transform: uppercase;
      animation: riseIn 1.1s var(--ease-out-expo) both;
    }
    .launch-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--white); letter-spacing: 2px;
      animation: riseIn 1.2s var(--ease-out-expo) 0.1s both;
    }
    .launch-sub {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 5px; text-transform: uppercase;
      animation: riseIn 1.3s var(--ease-out-expo) 0.2s both;
    }

    /* Portal CTA */
    .portal-ring {
      position: relative; margin-top: var(--s4);
      width: 190px; height: 190px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-mid); cursor: pointer;
      box-shadow: 0 0 0 1px rgba(212,175,55,0.08),
                  0 20px 60px rgba(0,0,0,0.7),
                  0 0 80px rgba(212,175,55,0.15);
      animation: portalBreath 3.5s ease-in-out infinite,
                 riseIn 1.4s var(--ease-out-expo) 0.3s both;
      transition: box-shadow 0.3s ease, transform 0.4s var(--ease-spring);
    }
    .portal-ring:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 0 1px var(--gold-mid),
                  0 30px 80px rgba(0,0,0,0.8),
                  0 0 120px rgba(212,175,55,0.3);
    }
    .portal-img {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
      transition: transform 0.6s var(--ease-out-expo);
    }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      transition: opacity 0.3s ease;
    }
    .portal-ring:hover .portal-scrim { opacity: 0; }
    .portal-icon {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    @keyframes portalBreath {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0  80px rgba(212,175,55,0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.7), 0 0 130px rgba(212,175,55,0.30); }
    }

    /* HUD corner buttons */
    .hud-corner {
      position: absolute; z-index: 15;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s var(--ease-spring);
    }
    .hud-corner:hover {
      background: rgba(212,175,55,0.18);
      border-color: var(--gold-mid);
      transform: scale(1.12);
    }
    .hud-corner svg {
      width: 18px; height: 18px;
      stroke: var(--text-mid); stroke-width: 1.5;
      fill: none; transition: stroke 0.2s ease;
    }
    .hud-corner:hover svg { stroke: var(--gold); }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }

    /* Language pill */
    .lang-pill {
      position: absolute; bottom: var(--s5); left: var(--s5); z-index: 20;
      display: flex; gap: var(--s3);
      background: rgba(0,0,0,0.40);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-hair);
      border-radius: 24px;
      padding: var(--s2) var(--s3);
    }
    .lang-opt {
      background: transparent; border: none;
      color: var(--text-lo); font-size: var(--t-xs); font-weight: 500;
      cursor: pointer; padding: 4px 10px; border-radius: 12px;
      transition: all 0.25s ease;
    }
    .lang-opt.active {
      background: var(--gold-dim);
      color: var(--gold);
    }
    .lang-opt:hover { color: var(--gold); }

    /* ─────────────────────────────────────────────────────────────────
       AR STACK — video, canvas, overlay
    ───────────────────────────────────────────────────────────────── */
    #videoFeed {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #videoFeed.on { display: block; }

    #parallaxCanvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      display: none; pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s var(--ease-out-expo);
    }
    #parallaxCanvas.on { display: block; }
    #parallaxCanvas.fade-in { opacity: 1; }

    #arOverlay {
      position: fixed; inset: 0; z-index: 4;
      display: none; cursor: crosshair;
    }
    #arOverlay.on { display: block; }

    /* ─────────────────────────────────────────────────────────────────
       OCR SCANNING ANIMATION — Moving horizontal line
    ───────────────────────────────────────────────────────────────── */
    #ocrScanLine {
      position: fixed; left: 0; right: 0; z-index: 5;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent 0%, 
        var(--gold) 50%, 
        transparent 100%);
      top: 50%;
      display: none;
      opacity: 0;
      animation: scanMove 1.2s ease-in-out infinite;
      pointer-events: none;
    }
    #ocrScanLine.scanning { 
      display: block;
      opacity: 0.7;
    }
    @keyframes scanMove {
      0% { top: 20%; opacity: 0; }
      50% { opacity: 0.8; }
      100% { top: 80%; opacity: 0; }
    }

    /* ─────────────────────────────────────────────────────────────────
       HUD BAR — Status and OCR indicators
    ───────────────────────────────────────────────────────────────── */
    #hudBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      padding: var(--s4) var(--s5);
      display: none; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
      backdrop-filter: blur(10px);
    }
    #hudBar.on { display: flex; }

    .hud-left {
      display: flex; align-items: center; gap: var(--s4);
    }

    .hud-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-sm); font-weight: 600;
      letter-spacing: 4px; color: var(--gold);
    }

    .hud-status {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 2px; text-transform: uppercase;
    }

    #ocrPill {
      display: flex; align-items: center; gap: var(--s2);
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 20px;
      font-size: var(--t-2xs);
      color: var(--text-lo);
      transition: all 0.3s ease;
    }
    #ocrPill[data-status="ready"] { 
      border-color: var(--success); 
      color: var(--success); 
    }
    #ocrPill[data-status="scanning"] { 
      border-color: var(--gold); 
      color: var(--gold);
      background: var(--gold-dim);
    }
    #ocrPill[data-status="locked"] { 
      border-color: var(--gold); 
      background: var(--gold-dim); 
      color: var(--gold); 
    }
    #ocrPill[data-status="error"] { 
      border-color: var(--danger); 
      color: var(--danger); 
    }

    .ocr-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ─────────────────────────────────────────────────────────────────
       SIDE BLADE — Menu slide-out panel
    ───────────────────────────────────────────────────────────────── */
    #sideBlade {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: var(--blade-w); max-width: 100%; z-index: 100;
      background: var(--surface);
      border-left: 1px solid var(--border-hair);
      box-shadow: -20px 0 80px rgba(0,0,0,0.6);
      overflow-y: auto;
      padding: var(--s7) var(--s5) var(--s6);
      transform: translateX(105%);
      transition: transform var(--dur-blade) var(--ease-out-expo);
    }
    #sideBlade.active { transform: translateX(0); }

    .blade-x {
      position: absolute; top: var(--s4); right: var(--s4);
      width: 34px; height: 34px;
      background: transparent; border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      color: var(--text-lo); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
    }
    .blade-x:hover { 
      color: var(--gold); 
      border-color: var(--gold);
    }

    .motion-element {
      opacity: 0; transform: translateY(26px);
      transition: all 0.6s var(--ease-out-expo);
    }
    #sideBlade.active .motion-element {
      opacity: 1; transform: translateY(0);
    }
    .delay-1 { transition-delay: 0.10s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.34s; }
    .delay-4 { transition-delay: 0.46s; }

    .blade-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700; color: var(--white);
    }
    .blade-category {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase;
    }

    .blade-block {
      margin-top: var(--s5);
      padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .blade-block:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .blade-label {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: var(--s2);
    }

    .blade-value {
      font-size: var(--t-md); color: var(--text-hi);
      font-weight: 500;
    }

    .blade-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-2xl); font-weight: 700;
      color: var(--gold); margin-top: var(--s3);
    }

    .blade-ing-text {
      font-size: var(--t-sm); color: var(--text-mid);
      line-height: 1.6; margin-top: var(--s3);
    }

    .blade-cta {
      margin-top: var(--s5);
      padding: 12px 21px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-mid);
      color: var(--gold);
      font-size: var(--t-sm); font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
    }
    .blade-cta:hover {
      background: var(--gold-mid);
      color: var(--ink);
    }

    .share-row {
      display: flex; gap: var(--s3); margin-top: var(--s4);
    }
    .share-btn {
      flex: 1;
      padding: 10px;
      background: rgba(212,175,55,0.08);
      border: 1px solid var(--border-hair);
      color: var(--text-lo);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.25s ease;
    }
    .share-btn:hover {
      background: var(--gold-dim);
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ─────────────────────────────────────────────────────────────────
       TOAST NOTIFICATIONS
    ───────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: var(--s5); left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      padding: var(--s3) var(--s5);
      background: rgba(0,0,0,0.85);
      border: 1px solid var(--border-hair);
      border-radius: 8px;
      color: var(--text-hi);
      font-size: var(--t-sm);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #toast.show { 
      opacity: 1; 
      pointer-events: auto;
    }

    /* ─────────────────────────────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────────────────────────────── */
    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="launchScreen">
    <div class="launch-bg" id="launchBg"></div>
    <div class="launch-scrim"></div>
    
    <div class="launch-body">
      <h1 class="launch-wordmark" id="wordmark">AR GASTRONOMY</h1>
      <p class="launch-tagline" id="tagline">Discover Culinary Artistry</p>
      <p class="launch-sub" id="launchSub">Premium Dining Experience</p>
      
      <div class="portal-ring" id="portalBtn">
        <div class="portal-img" id="portalImg"></div>
        <div class="portal-scrim"></div>
        <div class="portal-icon">📷</div>
      </div>
    </div>

    <div class="hud-corner corner-tl" id="btnInfo" title="Info">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    </div>
    <div class="hud-corner corner-tr" id="btnMenu" title="Menu">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    </div>

    <div class="lang-pill">
      <button class="lang-opt active" data-lang="en">EN</button>
      <button class="lang-opt" data-lang="ar">العربية</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       AR EXPERIENCE STACK
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Video Feed (Camera) -->
  <video id="videoFeed" playsinline autoplay muted></video>

  <!-- OCR Scanning Animation (Moving horizontal line) -->
  <div id="ocrScanLine"></div>

  <!-- 3D Parallax Canvas (THREE.js) -->
  <canvas id="parallaxCanvas"></canvas>

  <!-- AR Overlay -->
  <div id="arOverlay"></div>

  <!-- HUD Bar (Status) -->
  <div id="hudBar">
    <div class="hud-left">
      <div class="hud-name" id="hudName">AG</div>
      <div id="ocrPill" data-status="ready">
        <div class="ocr-dot"></div>
        <span id="ocrStatus">READY</span>
      </div>
    </div>
  </div>

  <!-- Side Blade (Menu) -->
  <div id="sideBlade">
    <button class="blade-x" id="bladeClose">✕</button>

    <!-- Dish Title -->
    <div class="motion-element delay-1">
      <div class="blade-title" id="bladeTitle">Dish Name</div>
      <span class="blade-category" id="bladeCategory">CATEGORY</span>
    </div>

    <!-- Price -->
    <div class="blade-block motion-element delay-2">
      <div class="blade-label" id="bladePriceLabel">Price</div>
      <div class="blade-price" id="bladePrice">$00.00</div>
    </div>

    <!-- Rating -->
    <div class="blade-block motion-element delay-3">
      <div class="blade-label" id="bladeRateLabel">Rating</div>
      <div class="blade-value" id="bladeScore">★★★★★</div>
    </div>

    <!-- Ingredients -->
    <div class="blade-block motion-element delay-4">
      <div class="blade-label" id="bladeIngLabel">Key Ingredients</div>
      <div class="blade-ing-text" id="bladeIngText">•  •  •</div>
    </div>

    <!-- CTA Buttons -->
    <button class="blade-cta motion-element delay-4" id="videoCta" title="Watch">
      📹 Watch Preparation
    </button>

    <div class="share-row motion-element delay-4">
      <button class="share-btn" id="shareIG" title="Share on Instagram">📸</button>
      <button class="share-btn" id="shareWA" title="Share on WhatsApp">💬</button>
      <button class="share-btn" id="shareMail" title="Share via Email">✉️</button>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  restaurant: {
    name: 'UMAMI PRIME',

/* ─────────────────────────────────────────────────────────────────
   FUZZY MATCH ALGORITHM (Levenshtein distance)
   Returns score 0-1 where 1 is perfect match
───────────────────────────────────────────────────────────────── */
function levenshteinDistance(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;

  const matrix = Array(b.length + 1)
    .fill(null)
    .map(() => Array(a.length + 1).fill(0));

  for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
  for (let j = 0; j <= b.length; j++) matrix[j][0] = j;

  for (let j = 1; j <= b.length; j++) {
    for (let i = 1; i <= a.length; i++) {
      const indicator = a[i - 1] === b[j - 1] ? 0 : 1;
      matrix[j][i] = Math.min(
        matrix[j][i - 1] + 1,
        matrix[j - 1][i] + 1,
        matrix[j - 1][i - 1] + indicator
      );
    }
  }

  const distance = matrix[b.length][a.length];
  const maxLen = Math.max(a.length, b.length);
  return 1 - distance / maxLen;
}

function fuzzyMatchDish(ocrText) {
  const normalized = ocrText.toLowerCase().trim();
  let bestMatch = null;
  let bestScore = 0;

  for (const dish of CONFIG.menu) {
    const dishName = dish.name.toLowerCase();
    const dishKeywords = dish.keywords.map(k => k.toLowerCase());

    // Check full name match
    let score = levenshteinDistance(normalized, dishName);
    
    // Check keyword matches
    for (const keyword of dishKeywords) {
      if (normalized.includes(keyword)) {
        score = Math.max(score, 0.8);
      }
      const keywordScore = levenshteinDistance(normalized, keyword);
      score = Math.max(score, keywordScore);
    }

    if (score > bestScore) {
      bestScore = score;
      bestMatch = dish;
    }
  }

  return bestScore > CONFIG.ocr.fuzzyMatchThreshold ? { dish: bestMatch, score: bestScore } : null;
}

/* ─────────────────────────────────────────────────────────────────
   THREE.JS PARALLAX SCENE
───────────────────────────────────────────────────────────────── */
let parallaxCtx = null;

function initParallax() {
  try {
    const canvas = el('parallaxCanvas');
    const w = window.innerWidth;
    const h = window.innerHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
    camera.position.z = 2;

    const renderer = new THREE.WebGLRenderer({ 
      canvas, 
      alpha: true, 
      antialias: true 
    });
    renderer.setSize(w, h);
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(window.devicePixelRatio);

    // Glow ring
    const glowGeom = new THREE.TorusGeometry(1.2, 0.08, 32, 100);
    const glowMat = new THREE.MeshPhongMaterial({
      color: 0xd4af37,
      emissive: 0xd4af37,
      emissiveIntensity: 0.6
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    glow.rotation.x = 0.3;
    scene.add(glow);

    // Dish image plane
    const planeGeom = new THREE.PlaneGeometry(1.4, 1.4);
    const dishMat = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      emissive: 0x222222,
      emissiveIntensity: 0.3
    });
    const plane = new THREE.Mesh(planeGeom, dishMat);
    plane.position.z = 0.1;
    scene.add(plane);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xd4af37, 0.8, 10);
    pointLight.position.set(2, 2, 3);
    scene.add(pointLight);

    // Handle window resize
    window.addEventListener('resize', () => {
      const nw = window.innerWidth;
      const nh = window.innerHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    });

    // Click on canvas to open blade
    canvas.addEventListener('click', () => {
      if (STATE.currentDish && !STATE.bladeOpen) {
        openBlade(STATE.currentDish);
      }
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      glow.rotation.z += 0.002;
      renderer.render(scene, camera);
    }
    animate();

    return { renderer, dishMat };
  } catch (err) {
    console.error('[Parallax]', err);
    throw err;
  }
}

/* ─────────────────────────────────────────────────────────────────

───────────────────────────────────────────────────────────────── */
function switchDish(dish) {
  STATE.currentDish = dish;
  if (!parallaxCtx) return;

  try {
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    loader.load(
      dish.image,
      (tex) => {
        parallaxCtx.dishMat.map = tex;
        parallaxCtx.dishMat.needsUpdate = true;
      },
      undefined,
      (err) => console.warn('[TextureLoad]', err)
    );
  } catch (err) {
    console.warn('[SwitchDish]', err);
  }
}

function openBlade(dish) {
  if (!dish || STATE.bladeOpen) return;
  STATE.bladeOpen = true;

  el('bladeTitle').textContent = dish.name;
  el('bladeCategory').textContent = dish.category;
  el('bladePrice').textContent = dish.price;
  el('bladeScore').textContent = dish.rating;
  el('bladeIngText').textContent = dish.ingredients.join(' · ');

  el('sideBlade').classList.add('active');
  el('ocrPill').dataset.status = 'locked';
  el('ocrStatus').textContent = 'LOCKED';
  el('ocrScanLine').classList.remove('scanning');

  toast(`✓ IDENTIFIED: ${dish.name}`);
  track('dish_identified', { dish: dish.name, score: 'ocr-match' });
}

function closeBlade() {
  STATE.bladeOpen = false;
  el('sideBlade').classList.remove('active');
  el('ocrPill').dataset.status = 'ready';
  el('ocrStatus').textContent = 'READY';
}

el('bladeClose').addEventListener('click', closeBlade);

/* ─────────────────────────────────────────────────────────────────
   TESSERACT OCR — Hardcoded JSDelivr CDN
───────────────────────────────────────────────────────────────── */
let tesseractWorker = null;
let ocrScanTimer = null;
const TESSERACT_CONFIG = {
  langPath: 'https://cdn.jsdelivr.net/npm/tesseract.js-data@v4.0.0',
  workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/worker.min.js',
  corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@v4.0.0/tesseract-core.wasm.js'
};

async function initOCR() {
  el('ocrStatus').textContent = 'LOADING...';
  el('ocrPill').dataset.status = 'loading';

  try {
    tesseractWorker = await Tesseract.createWorker({
      langPath: TESSERACT_CONFIG.langPath,
      workerPath: TESSERACT_CONFIG.workerPath,
      corePath: TESSERACT_CONFIG.corePath,
      logger: (m) => {
        if (m.status === 'recognizing text') {
          const progress = Math.round(m.progress * 100);
          console.log(`[OCR] ${progress}%`);
        }
      }
    });

    await tesseractWorker.loadLanguage('eng+ara');
    await tesseractWorker.initialize('eng+ara');

    STATE.ocrReady = true;
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent = 'READY';
    toast('✓ OCR Ready');

    console.log('[OCR] Initialized');
  } catch (err) {
    console.error('[OCR Init]', err);
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent = 'ERROR';
    toast('OCR initialization failed');
  }
}

async function runOCRScan() {
  if (!STATE.ocrReady || !STATE.started || STATE.bladeOpen) return;

  const video = el('videoFeed');
  if (!video || !video.srcObject || video.readyState < 2) return;

  try {
    // Show scanning animation
    el('ocrScanLine').classList.add('scanning');
    el('ocrPill').dataset.status = 'scanning';
    el('ocrStatus').textContent = 'SCANNING';

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const result = await tesseractWorker.recognize(canvas);
    const text = result.data.text;
    const confidence = result.data.confidence;

    console.log(`[OCR] Text: "${text.substring(0, 50)}..." | Confidence: ${confidence}`);

    // Only proceed if we have confidence > 30 and some text
    if (confidence > 30 && text.trim().length > 3) {
      checkTextAgainstMenu(text);
    } else {
      el('ocrPill').dataset.status = 'ready';
      el('ocrStatus').textContent = 'READY';
      el('ocrScanLine').classList.remove('scanning');
    }
  } catch (err) {
    console.error('[OCR Scan]', err);
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent = 'ERROR';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function checkTextAgainstMenu(text) {
  const match = fuzzyMatchDish(text);

  if (match && match.score > CONFIG.ocr.fuzzyMatchThreshold) {
    console.log(`[Match] "${match.dish.name}" (score: ${match.score.toFixed(2)})`);

    // CRITICAL SEQUENCE: 
    // 1. Update current dish
    switchDish(match.dish);

    // 2. Fade in the 3D image (canvas)
    el('parallaxCanvas').classList.add('fade-in');

    // 3. Auto-open blade
    setTimeout(() => {
      openBlade(match.dish);
    }, 300);
  } else {
    console.log(`[NoMatch] No dish found for: "${text.substring(0, 40)}..."`);
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent = 'READY';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function startOCRLoop() {
  if (ocrScanTimer) clearInterval(ocrScanTimer);
  ocrScanTimer = setInterval(runOCRScan, CONFIG.ocr.scanIntervalMs);
  console.log('[OCR] Loop started');
}

function stopOCRLoop() {
  if (ocrScanTimer) {
    clearInterval(ocrScanTimer);
    ocrScanTimer = null;
  }
}

/* ─────────────────────────────────────────────────────────────────
   AR INITIALIZATION
   CRITICAL: Do NOT auto-show dish. Screen stays empty until OCR match.
───────────────────────────────────────────────────────────────── */
function startAR() {
  STATE.started = true;

  el('videoFeed').classList.add('on');
  el('parallaxCanvas').classList.add('on');
  el('arOverlay').classList.add('on');
  el('hudBar').classList.add('on');

  // Start camera
  navigator.mediaDevices
    ?.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    })
    .then((stream) => {
      const video = el('videoFeed');
      video.srcObject = stream;
      
      video.onloadedmetadata = () => {
        console.log('[Camera] Ready');

        // Initialize parallax scene
        try {
          parallaxCtx = initParallax();
          // DO NOT call switchDish() here — wait for OCR match
          console.log('[Parallax] Scene ready (waiting for OCR match)');
        } catch (err) {
          console.error('[Parallax]', err);
          toast('3D initialization failed');
          return;
        }

        // Initialize and start OCR
        initOCR().then(() => {
          if (STATE.ocrReady) {
            startOCRLoop();
            toast('📷 Point camera at dish name');
          }
        });
      };
    })
    .catch((err) => {
      console.error('[Camera]', err);
      toast('Camera access denied');
    });

  track('ar_started');
}
