<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurant Luxury AR Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --white: #f7f4ee;
            --bg-dark: #050505;
            --glass: rgba(10, 10, 10, 0.8);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; font-family: 'Cairo', sans-serif;
            color: var(--white);
        }

        /* 1. حل مشكلة الشاشة السوداء: وضع الفيديو في طبقة خلفية صحيحة */
        #video-container {
            position: fixed; inset: 0; z-index: 1;
            width: 100%; height: 100%;
        }
        
        video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 2. واجهة البداية (Launch Pad) */
        #launch-pad {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #launch-pad.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        /* مكان شعار المطعم بدلاً من V9 */
        .restaurant-logo {
            width: 120px; height: 120px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 30px var(--gold-glow);
            overflow: hidden;
            background: rgba(0,0,0,0.5);
        }
        .restaurant-logo img { width: 80%; height: auto; object-fit: contain; }

        .welcome-text {
            text-align: center; margin-bottom: 40px;
        }
        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; color: var(--gold); letter-spacing: 2px;
        }
        .welcome-text p { color: rgba(255,255,255,0.6); font-weight: 300; }

        /* زر البدء النبّاض */
        .start-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--gold); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s infinite; transition: 0.3s;
        }
        .start-btn svg { width: 35px; fill: #000; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* 3. واجهة المستخدم العلوية (HUD) */
        #hud {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            padding: 20px; display: none;
            justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        #hud.active { display: flex; }

        .hud-logo { height: 40px; } /* شعار صغير في الأعلى */

        /* 4. الأركان الذكية (بديل الرادار المربع والبار) */
        #scanner-ui {
            position: fixed; inset: 0; z-index: 10; pointer-events: none;
            display: none; align-items: center; justify-content: center;
        }
        #scanner-ui.active { display: flex; }

        .reticle {
            position: relative; width: 250px; height: 250px;
        }
        .corner {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--gold);
        }
        .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 15px; }
        .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 15px; }
        .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 15px; }
        .br { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 15px; }

        /* خط المسح المتحرك */
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 15px var(--gold);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* 5. بطاقة معلومات الطبق (Glassmorphism) */
        #ar-card {
            position: fixed; bottom: -100%; left: 20px; right: 20px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid var(--border);
            padding: 30px; z-index: 60;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #ar-card.visible { bottom: 30px; }

        /* أنيميشن الكلام (Cascade Effect) */
        .cascade { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .visible .cascade { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }
        .delay-3 { transition-delay: 0.6s; }

        .card-title { color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }
        .card-desc { font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.8); }

        .close-btn {
            margin-top: 20px; background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 20px; border-radius: 10px; cursor: pointer;
        }

        /* أيقونات البداية الجانبية */
        .side-menu {
            position: absolute; top: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .icon-circle {
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(212,175,55,0.4); display: flex; align-items: center; justify-content: center;
            color: var(--gold); cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="ar-video" autoplay playsinline muted></video>
    </div>

    <div id="launch-pad">
        <div class="side-menu">
            <div class="icon-circle" title="قائمة الطعام">☰</div>
            <div class="icon-circle" title="عن المطعم">ℹ</div>
        </div>

        <div class="restaurant-logo">
            <img src="https://via.placeholder.com/150x150?text=LOGO" alt="Logo">
        </div>

        <div class="welcome-text">
            <h1>إسم المطعم</h1>
            <p>وجه الكاميرا نحو صورة الطبق لتكتشف تفاصيله</p>
        </div>

        <button class="start-btn" onclick="initExperience()">
            <svg viewBox="0 0 24 24"><path d="M12 11c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 2c0-3.31-2.69-6-6-6s-6 2.69-6 6 2.69 6 6 6 6-2.69 6-6zm1.79-6.21L19 7c0-1.1-.9-2-2-2h-3.17L12 3H8l-1.83 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2h-1.21zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        </button>
    </div>

    <div id="hud">
        <img src="https://via.placeholder.com/100x40?text=LOGO" class="hud-logo" alt="Logo">
        <div style="font-size: 12px; letter-spacing: 2px; color: var(--gold);">جاري المسح الضوئي...</div>
    </div>

    <div id="scanner-ui">
        <div class="reticle">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line"></div>
        </div>
    </div>

    <div id="ar-card">
        <h2 class="card-title cascade delay-1" id="dish-name">اسم الطبق المكتشف</h2>
        <p class="card-desc cascade delay-2" id="dish-desc">هذا النص يظهر بتأثير التتالي التدريجي، حيث يتم شرح مكونات الطبق وطريقة تحضيره بأسلوب فاخر يليق بمطعمكم.</p>
        <button class="close-btn cascade delay-3" onclick="closeCard()">إغلاق</button>
    </div>

    <script>
        let mindarThree = null;

        async function initExperience() {
            try {
                // 1. طلب الإذن للكاميرا وتفعيلها فوراً لحل الشاشة السوداء
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('ar-video').srcObject = stream;

                // 2. إخفاء واجهة البداية وإظهار واجهة المسح
                document.getElementById('launch-pad').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('hud').classList.add('active');
                    document.getElementById('scanner-ui').classList.add('active');
                }, 600);

                // 3. هنا يتم ربط MindAR مع الكاميرا (يجب أن يكون لديك ملف .mind)
                startARTracking();

            } catch (err) {
                alert("يرجى السماح بالوصول للكاميرا لتجربة الـ AR");
                console.error(err);
            }
        }

        function startARTracking() {
            // محاكاة التعرف على طبق بعد 3 ثوانٍ لرؤية الأنيميشن (لأغراض العرض فقط)
            setTimeout(() => {
                showDishDetails("ستيك الواغيو الفاخر", "لحم واغيو ياباني مع صوص الترافل الأسود وهريس البطاطس الكريمي.");
            }, 3000);
        }

        function showDishDetails(name, desc) {
            document.getElementById('dish-name').innerText = name;
            document.getElementById('dish-desc').innerText = desc;
            
            // تفعيل البطاقة والأنيميشن
            document.getElementById('ar-card').classList.add('visible');
            document.getElementById('scanner-ui').style.opacity = "0.2"; // تخفيف الأركان عند الظهور
        }

        function closeCard() {
            document.getElementById('ar-card').classList.remove('visible');
            document.getElementById('scanner-ui').style.opacity = "1";
        }

        // الأيقونات في البداية:
        // ☰: يمكن ربطها بصفحة منيو عادية خارج الـ AR
        // ℹ: يمكن ربطها بصفحة "من نحن" أو قصة المطعم
    </script>
</body>
</html>
