<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>AR Gastronomy | Obsidian Atelier</title>

  <!-- Typefaces -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js Core -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- Tesseract.js v4.0.2 (will be reinitialized with Blob Worker Bypass) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    /* ----- DESIGN TOKENS: φ scale, gold on black ----- */
    :root {
      --gold: #d4af37;
      --gold-pale: #e8d48a;
      --gold-dim: rgba(212,175,55,0.10);
      --gold-mid: rgba(212,175,55,0.22);
      --ink: #050505;
      --surface: rgba(5,5,5,0.97);
      --white: #f5f0e8;
      --text-hi: #f5f0e8;
      --text-lo: rgba(245,240,232,0.45);
      --border-hair: rgba(212,175,55,0.18);
      --success: #4db87a;
      --danger: #e05a5a;
      --s1: 5px; --s2: 8px; --s3: 13px; --s4: 21px; --s5: 34px; --s6: 55px; --s7: 89px;
      --blade-w: calc(100vw / 1.618);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); font-family: 'DM Sans', sans-serif; color: var(--text-hi); -webkit-font-smoothing: antialiased; }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px 128px; pointer-events: none; opacity: 0.55;
    }

    /* ----- LAUNCH SCREEN (original elegance) ----- */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--ink); transition: opacity 1s var(--ease-out-expo), visibility 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .launch-bg { position: absolute; inset: -8%; background-size: cover; background-position: center; filter: blur(14px) brightness(0.4); z-index: 0; }
    .launch-scrim { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 80% at 50% 60%, rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%); z-index: 1; }
    .launch-body { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: var(--s5); text-align: center; padding: var(--s5); }
    .launch-wordmark { font-family: 'Cormorant Garamond', serif; font-size: var(--t-xl); font-weight: 700; letter-spacing: 14px; color: var(--gold); text-transform: uppercase; animation: riseIn 1.1s var(--ease-out-expo) both; }
    .launch-tagline { font-family: 'Cormorant Garamond', serif; font-size: var(--t-lg); font-weight: 300; font-style: italic; color: var(--white); letter-spacing: 2px; animation: riseIn 1.2s var(--ease-out-expo) 0.1s both; }
    .portal-ring { position: relative; margin-top: var(--s4); width: 190px; height: 190px; border-radius: 14px; border: 1px solid var(--gold-mid); cursor: pointer; box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7); transition: transform 0.4s var(--ease-spring); animation: portalBreath 3.5s ease-in-out infinite; }
    .portal-ring:hover { transform: translateY(-5px) scale(1.02); }
    .portal-img { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.6s var(--ease-out-expo); }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 72px; background: rgba(0,0,0,0.28); border-radius: 14px; }
    @keyframes portalBreath { 0%,100%{box-shadow:0 0 0 1px rgba(212,175,55,0.08),0 20px 60px rgba(0,0,0,0.7);} 50%{box-shadow:0 0 0 1px rgba(212,175,55,0.18),0 24px 70px rgba(0,0,0,0.7),0 0 130px rgba(212,175,55,0.3);} }
    @keyframes riseIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .hud-corner { position: absolute; z-index: 15; width: 42px; height: 42px; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid var(--border-hair); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }
    .lang-pill { position: absolute; bottom: var(--s5); left: var(--s5); z-index: 20; display: flex; gap: var(--s3); background: rgba(0,0,0,0.40); backdrop-filter: blur(15px); border: 1px solid var(--border-hair); border-radius: 24px; padding: var(--s2) var(--s3); }
    .lang-opt { background: transparent; border: none; color: var(--text-lo); font-size: var(--t-xs); font-weight: 500; cursor: pointer; padding: 4px 10px; border-radius: 12px; transition: all 0.25s ease; }
    .lang-opt.active { background: var(--gold-dim); color: var(--gold); }

    /* AR STACK */
    #videoFeed { position: fixed; inset: 0; z-index: 2; width: 100%; height: 100%; object-fit: cover; display: none; }
    #videoFeed.on { display: block; }
    #parallaxCanvas { position: fixed; inset: 0; z-index: 3; width: 100%; height: 100%; display: none; pointer-events: auto; opacity: 0; transition: opacity 0.8s var(--ease-out-expo); }
    #parallaxCanvas.on { display: block; }
    #parallaxCanvas.fade-in { opacity: 1; }
    #arOverlay { position: fixed; inset: 0; z-index: 4; display: none; }
    #arOverlay.on { display: block; }
    #ocrScanLine { position: fixed; left: 0; right: 0; z-index: 5; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%); top: 50%; display: none; opacity: 0; animation: scanMove 1.2s ease-in-out infinite; pointer-events: none; }
    #ocrScanLine.scanning { display: block; opacity: 0.7; }
    @keyframes scanMove { 0% { top: 20%; opacity: 0; } 50% { opacity: 0.8; } 100% { top: 80%; opacity: 0; } }

    #hudBar { position: fixed; top: 0; left: 0; right: 0; z-index: 60; padding: var(--s4) var(--s5); display: none; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%); backdrop-filter: blur(10px); }
    #hudBar.on { display: flex; }
    #ocrPill { display: flex; align-items: center; gap: var(--s2); padding: 6px 12px; background: rgba(0,0,0,0.55); border: 1px solid var(--border-hair); border-radius: 20px; font-size: var(--t-2xs); transition: all 0.3s ease; }
    #ocrPill[data-status="ready"] { border-color: var(--success); color: var(--success); }
    #ocrPill[data-status="scanning"] { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    #ocrPill[data-status="locked"] { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    .ocr-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* SIDE BLADE */
    #sideBlade { position: fixed; right: 0; top: 0; bottom: 0; width: var(--blade-w); max-width: 100%; z-index: 100; background: var(--surface); border-left: 1px solid var(--border-hair); overflow-y: auto; padding: var(--s7) var(--s5) var(--s6); transform: translateX(105%); transition: transform var(--dur-blade) var(--ease-out-expo); }
    #sideBlade.active { transform: translateX(0); }
    .blade-x { position: absolute; top: var(--s4); right: var(--s4); width: 34px; height: 34px; border: 1px solid var(--border-hair); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; }
    .motion-element { opacity: 0; transform: translateY(26px); transition: all 0.6s var(--ease-out-expo); }
    #sideBlade.active .motion-element { opacity: 1; transform: translateY(0); }
    .blade-title { font-family: 'Cormorant Garamond', serif; font-size: var(--t-xl); font-weight: 700; }
    .blade-price { font-family: 'Cormorant Garamond', serif; font-size: var(--t-2xl); font-weight: 700; color: var(--gold); }
    .blade-cta { margin-top: var(--s5); padding: 12px 21px; background: var(--gold-dim); border: 1px solid var(--gold-mid); color: var(--gold); border-radius: 8px; cursor: pointer; text-align: center; }
    .share-row { display: flex; gap: var(--s3); margin-top: var(--s4); }
    .share-btn { flex: 1; padding: 10px; background: rgba(212,175,55,0.08); border: 1px solid var(--border-hair); border-radius: 6px; cursor: pointer; }

    /* IN-APP BROWSER SHIELD */
    #inAppShield {
      position: fixed; inset: 0; z-index: 10000; background: #000000dd; backdrop-filter: blur(24px);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 32px;
      text-align: center; font-family: 'DM Sans', sans-serif;
    }
    #inAppShield.active { display: flex; }
    .shield-card { background: #0c0c0c; border: 1px solid var(--gold-mid); border-radius: 28px; padding: 48px 28px; max-width: 380px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
    .shield-icon { font-size: 56px; margin-bottom: 24px; }
    .shield-title { font-size: 26px; font-family: 'Cormorant Garamond', serif; color: var(--gold); margin-bottom: 16px; }
    .shield-desc { color: var(--text-mid); font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
    .shield-btn { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); padding: 12px 28px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }

    /* DIAGNOSTIC CONSOLE */
    #diagConsole {
      position: fixed; bottom: 20px; right: 20px; z-index: 10001; width: 300px; max-height: 180px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); border-left: 3px solid var(--gold); border-radius: 8px;
      font-family: monospace; font-size: 10px; color: #8fdc8f; padding: 10px; overflow-y: auto; pointer-events: none;
      box-shadow: 0 0 12px rgba(0,0,0,0.5); transition: opacity 0.2s;
    }
    #diagConsole .diag-line { border-bottom: 1px solid #2a2a2a; padding: 4px 0; word-break: break-word; }

    #toast { position: fixed; bottom: var(--s5); left: 50%; transform: translateX(-50%); z-index: 500; padding: var(--s3) var(--s5); background: rgba(0,0,0,0.85); border: 1px solid var(--border-hair); border-radius: 8px; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LAUNCH SCREEN -->
<div id="launchScreen">
  <div class="launch-bg" id="launchBg"></div>
  <div class="launch-scrim"></div>
  <div class="launch-body">
    <h1 class="launch-wordmark">AR GASTRONOMY</h1>
    <p class="launch-tagline">Discover Culinary Artistry</p>
    <div class="portal-ring" id="portalBtn">
      <div class="portal-img" id="portalImg"></div>
      <div class="portal-icon">📷</div>
    </div>
  </div>
  <div class="hud-corner corner-tl" id="btnInfo">ⓘ</div>
  <div class="hud-corner corner-tr" id="btnMenu">☰</div>
  <div class="lang-pill"><button class="lang-opt active" data-lang="en">EN</button><button class="lang-opt" data-lang="ar">العربية</button></div>
</div>

<!-- AR STACK -->
<video id="videoFeed" playsinline autoplay muted></video>
<div id="ocrScanLine"></div>
<canvas id="parallaxCanvas"></canvas>
<div id="arOverlay"></div>
<div id="hudBar"><div class="hud-left"><div class="hud-name" id="hudName">AG</div><div id="ocrPill" data-status="ready"><div class="ocr-dot"></div><span id="ocrStatus">READY</span></div></div></div>

<!-- SIDE BLADE -->
<div id="sideBlade"><button class="blade-x" id="bladeClose">✕</button>
  <div class="motion-element delay-1"><div class="blade-title" id="bladeTitle">Dish</div><span class="blade-category" id="bladeCategory">CATEGORY</span></div>
  <div class="blade-block motion-element delay-2"><div class="blade-label">Price</div><div class="blade-price" id="bladePrice">$00.00</div></div>
  <div class="blade-block motion-element delay-3"><div class="blade-label">Rating</div><div class="blade-value" id="bladeScore">★★★★★</div></div>
  <div class="blade-block motion-element delay-4"><div class="blade-label">Key Ingredients</div><div class="blade-ing-text" id="bladeIngText">•</div></div>
  <button class="blade-cta motion-element delay-4" id="videoCta">📹 Watch Preparation</button>
  <div class="share-row motion-element delay-4"><button class="share-btn" id="shareIG">📸</button><button class="share-btn" id="shareWA">💬</button><button class="share-btn" id="shareMail">✉️</button></div>
</div>

<div id="toast"></div>

<!-- IN-APP BROWSER SHIELD -->
<div id="inAppShield">
  <div class="shield-card">
    <div class="shield-icon">⚠️</div>
    <div class="shield-title">Native Browser Required</div>
    <div class="shield-desc">For the full AR Gastronomy experience, please open this page in <strong>Safari, Chrome, or Edge</strong>.<br>Tap the three dots (⋮) and select <strong>"Open in Browser"</strong>.</div>
    <button class="shield-btn" id="shieldDismiss">I understand, continue anyway</button>
  </div>
</div>

<!-- DIAGNOSTIC CONSOLE -->
<div id="diagConsole"></div>

<script>
  (function(){
    // ---------- DIAGNOSTIC LOGGER ----------
    const diagEl = document.getElementById('diagConsole');
    function diagLog(msg, isError = false) {
      const line = document.createElement('div');
      line.className = 'diag-line';
      line.style.color = isError ? '#ff8888' : '#b8f2b0';
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      diagEl.appendChild(line);
      diagEl.scrollTop = diagEl.scrollHeight;
      while(diagEl.children.length > 35) diagEl.removeChild(diagEl.firstChild);
      console.log(msg);
    }
    window.diagLog = diagLog;

    // ---------- IN-APP DETECTION (FB, Messenger, IG) ----------
    const ua = navigator.userAgent;
    const isInApp = /FBAN|FBAV|Messenger|Instagram|Fbios/i.test(ua);
    const shield = document.getElementById('inAppShield');
    if(isInApp) {
      shield.classList.add('active');
      diagLog('[SYSTEM] In-App browser detected: shield displayed');
    } else {
      diagLog('[SYSTEM] Native browser mode — safe to proceed');
    }
    document.getElementById('shieldDismiss')?.addEventListener('click', () => {
      shield.classList.remove('active');
      diagLog('[SYSTEM] Shield dismissed by user');
    });

    // ---------- CONFIG & MENU ----------
    const CONFIG = {
      restaurant: { name: 'UMAMI PRIME', location: '📍 123 Gastronomy Ave, Dubai', phone: '+971 4 XXX XXXX', heroImage: 'https://images.unsplash.com/photo-1504674900850-4d69be8b7e58?w=1200&h=600&fit=crop', portalImage: 'https://images.unsplash.com/photo-1495000871168-a47a3a3bae48?w=400&h=400&fit=crop' },
      menu: [
        { id:1, name:'SAFFRON RISOTTO', category:'PRIMO', price:'$42.00', rating:'★★★★★', image:'https://images.unsplash.com/photo-1502869012803-1fca8ec53d02?w=600&h=600&fit=crop', keywords:['saffron','risotto','rice'], ingredients:['Arborio Rice','Saffron','Parmigiano','White Wine'], videoUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ' },
        { id:2, name:'WAGYU TOMAHAWK', category:'CARNE', price:'$85.00', rating:'★★★★★', image:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&h=600&fit=crop', keywords:['wagyu','tomahawk','steak'], ingredients:['Japanese Wagyu','Sea Salt','Black Garlic','Miso Butter'], videoUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ' },
        { id:3, name:'TRUFFLE AGNOLOTTI', category:'PASTA', price:'$65.00', rating:'★★★★★', image:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600&h=600&fit=crop', keywords:['truffle','agnolotti','pasta'], ingredients:['Black Truffle','Ricotta','Egg Pasta','Brown Butter'], videoUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ' },
        { id:4, name:'MISO-GLAZED HALIBUT', category:'PESCE', price:'$58.00', rating:'★★★★☆', image:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&h=600&fit=crop', keywords:['halibut','miso','fish'], ingredients:['Halibut','White Miso','Sake','Sesame'], videoUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ' }
      ],
      ocr: { scanIntervalMs: 2100, fuzzyMatchThreshold: 0.5 }
    };

    let STATE = { lang:'en', started:false, bladeOpen:false, ocrReady:false, currentDish:null, parallaxCtx:null, tesseractWorker:null, ocrTimer:null };
    function t(key) { const l10n = { en:{ ready:'READY', scanning:'SCANNING...' }, ar:{ ready:'جاهز', scanning:'جاري المسح...' } }; return l10n[STATE.lang]?.[key] || key; }
    function toast(msg) { const box = document.getElementById('toast'); box.textContent = msg; box.classList.add('show'); setTimeout(()=>box.classList.remove('show'),3000); }
    
    // fuzzy levenshtein
    function levenshtein(a,b) { const m=Array(b.length+1).fill().map(()=>Array(a.length+1).fill(0)); for(let i=0;i<=a.length;i++) m[0][i]=i; for(let j=0;j<=b.length;j++) m[j][0]=j; for(let j=1;j<=b.length;j++) for(let i=1;i<=a.length;i++) { const cost=a[i-1]===b[j-1]?0:1; m[j][i]=Math.min(m[j][i-1]+1, m[j-1][i]+1, m[j-1][i-1]+cost); } return m[b.length][a.length]; }
    function fuzzyMatch(ocrText) { const norm=ocrText.toLowerCase().trim(); let best=null, bestScore=0; for(const dish of CONFIG.menu) { let score=levenshtein(norm, dish.name.toLowerCase())/Math.max(dish.name.length, norm.length); score=1-score; for(const kw of dish.keywords) if(norm.includes(kw.toLowerCase())) score=Math.max(score,0.75); if(score>bestScore) { bestScore=score; best=dish; } } return bestScore>CONFIG.ocr.fuzzyMatchThreshold? { dish:best, score:bestScore }:null; }

    // ---------- THREE.JS PARALLAX ----------
    function initParallax() {
      const canvas = document.getElementById('parallaxCanvas');
      const w = window.innerWidth, h = window.innerHeight;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, w/h, 0.1, 1000);
      camera.position.z = 2;
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(w, h); renderer.setClearColor(0x000000, 0);
      const glowGeom = new THREE.TorusGeometry(1.2, 0.08, 32, 100);
      const glowMat = new THREE.MeshPhongMaterial({ color: 0xd4af37, emissive: 0xd4af37, emissiveIntensity: 0.6 });
      const glow = new THREE.Mesh(glowGeom, glowMat); glow.rotation.x = 0.3; scene.add(glow);
      const planeGeom = new THREE.PlaneGeometry(1.4, 1.4);
      const dishMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x222222, emissiveIntensity: 0.3 });
      const plane = new THREE.Mesh(planeGeom, dishMat); plane.position.z = 0.1; scene.add(plane);
      const ambient = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambient);
      const pointLight = new THREE.PointLight(0xd4af37, 0.8); pointLight.position.set(2,2,3); scene.add(pointLight);
      window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
      function animate() { requestAnimationFrame(animate); glow.rotation.z += 0.002; renderer.render(scene, camera); }
      animate();
      canvas.addEventListener('click', () => { if(STATE.currentDish && !STATE.bladeOpen) openBlade(STATE.currentDish); });
      return { dishMat, renderer };
    }

    function switchDish(dish) { if(!STATE.parallaxCtx) return; STATE.currentDish = dish; const loader = new THREE.TextureLoader(); loader.crossOrigin = 'anonymous'; loader.load(dish.image, tex => { STATE.parallaxCtx.dishMat.map = tex; STATE.parallaxCtx.dishMat.needsUpdate = true; }); }
    function openBlade(dish) { if(STATE.bladeOpen) return; STATE.bladeOpen=true; document.getElementById('bladeTitle').innerText=dish.name; document.getElementById('bladeCategory').innerText=dish.category; document.getElementById('bladePrice').innerText=dish.price; document.getElementById('bladeScore').innerText=dish.rating; document.getElementById('bladeIngText').innerHTML = dish.ingredients.join(' · '); document.getElementById('sideBlade').classList.add('active'); document.getElementById('ocrPill').dataset.status='locked'; document.getElementById('ocrStatus').innerText='LOCKED'; document.getElementById('ocrScanLine').classList.remove('scanning'); toast(`✓ ${dish.name} recognized`); }
    function closeBlade() { STATE.bladeOpen=false; document.getElementById('sideBlade').classList.remove('active'); document.getElementById('ocrPill').dataset.status='ready'; document.getElementById('ocrStatus').innerText='READY'; }

    // ---------- BLOB WORKER BYPASS (CORE FIX) ----------
    async function initOCRWithBlobWorker() {
      diagLog('[OCR] Starting Blob-Worker initialization (bypass in-app restrictions)');
      try {
        const workerScriptUrl = 'https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/worker.min.js';
        const response = await fetch(workerScriptUrl);
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const scriptText = await response.text();
        const blob = new Blob([scriptText], { type: 'application/javascript' });
        const blobUrl = URL.createObjectURL(blob);
        diagLog(`[SYSTEM] Blob URL Created: YES (${blobUrl.substring(0, 50)}...)`);
        
        // Tesseract configuration with blob workerPath + gzip:false & legacyCore:true
        const worker = await Tesseract.createWorker({
          workerPath: blobUrl,
          corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@v4.0.0/tesseract-core.wasm.js',
          langPath: 'https://cdn.jsdelivr.net/npm/tesseract.js-data@v4.0.0',
          gzip: false,
          legacyCore: true,
          logger: m => { if(m.status === 'recognizing text') diagLog(`[OCR] progress: ${Math.round(m.progress*100)}%`); }
        });
        await worker.loadLanguage('eng+ara');
        await worker.initialize('eng+ara');
        STATE.tesseractWorker = worker;
        STATE.ocrReady = true;
        document.getElementById('ocrPill').dataset.status = 'ready';
        document.getElementById('ocrStatus').innerText = 'READY';
        diagLog('[OCR] Worker ready — Blob bypass successful');
        toast('OCR engine ready • point camera at menu');
        startOCRLoop();
      } catch(err) {
        diagLog(`[OCR] FATAL: ${err.message}`, true);
        document.getElementById('ocrPill').dataset.status = 'error';
        document.getElementById('ocrStatus').innerText = 'ERROR';
        toast('OCR failed, but you can still use demo keys 1-4');
      }
    }

    async function runOCRScan() {
      if(!STATE.ocrReady || !STATE.started || STATE.bladeOpen) return;
      const video = document.getElementById('videoFeed');
      if(!video || !video.srcObject || video.readyState < 2) return;
      try {
        document.getElementById('ocrScanLine').classList.add('scanning');
        document.getElementById('ocrPill').dataset.status = 'scanning';
        document.getElementById('ocrStatus').innerText = 'SCANNING';
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const { data: { text, confidence } } = await STATE.tesseractWorker.recognize(canvas);
        if(confidence > 30 && text.trim().length > 3) {
          const match = fuzzyMatch(text);
          if(match) {
            diagLog(`[OCR] MATCH: ${match.dish.name} (score:${match.score.toFixed(2)})`);
            switchDish(match.dish);
            document.getElementById('parallaxCanvas').classList.add('fade-in');
            setTimeout(()=>openBlade(match.dish), 320);
          } else diagLog(`[OCR] No match: "${text.substring(0,40)}"`);
        }
        document.getElementById('ocrPill').dataset.status = 'ready';
        document.getElementById('ocrStatus').innerText = 'READY';
        document.getElementById('ocrScanLine').classList.remove('scanning');
      } catch(e) { diagLog(`[OCR Scan Error] ${e.message}`, true); document.getElementById('ocrScanLine').classList.remove('scanning'); }
    }
    function startOCRLoop() { if(STATE.ocrTimer) clearInterval(STATE.ocrTimer); STATE.ocrTimer = setInterval(runOCRScan, CONFIG.ocr.scanIntervalMs); diagLog('[OCR] Loop started'); }
    function stopOCRLoop() { if(STATE.ocrTimer) { clearInterval(STATE.ocrTimer); STATE.ocrTimer=null; } }

    // ---------- AR CAMERA + INIT ----------
    async function startAR() {
      if(STATE.started) return;
      STATE.started = true;
      document.getElementById('videoFeed').classList.add('on');
      document.getElementById('parallaxCanvas').classList.add('on');
      document.getElementById('arOverlay').classList.add('on');
      document.getElementById('hudBar').classList.add('on');
      diagLog('[AR] Starting camera & 3D');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal:1280 }, height:{ideal:720} }, audio: false });
        const videoEl = document.getElementById('videoFeed');
        videoEl.srcObject = stream;
        await new Promise(resolve => videoEl.onloadedmetadata = resolve);
        diagLog('[Camera] Ready');
        STATE.parallaxCtx = initParallax();
        diagLog('[3D] Parallax scene active — awaiting OCR detection');
        await initOCRWithBlobWorker();
      } catch(err) { diagLog(`[Camera error] ${err.message}`, true); toast('Camera access needed for AR'); }
    }

    // ---------- UI EVENT BINDINGS ----------
    document.getElementById('portalBtn').addEventListener('click', ()=>{ document.getElementById('launchScreen').classList.add('hidden'); startAR(); });
    document.getElementById('bladeClose').addEventListener('click', closeBlade);
    document.getElementById('videoCta').addEventListener('click', ()=>{
      if(!STATE.currentDish) return;
      const modal=document.createElement('div'); modal.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;';
      modal.innerHTML=`<div style="position:relative;width:90%;max-width:600px;"><button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#d4af37;font-size:28px;">✕</button><video src="${STATE.currentDish.videoUrl}" controls autoplay style="width:100%;border-radius:12px;"></video></div>`;
      document.body.appendChild(modal);
    });
    const shareHandler = (platform)=>{ if(STATE.currentDish) window.open(platform==='ig'?`https://www.instagram.com/?caption=${encodeURIComponent(STATE.currentDish.name)}`:`https://wa.me/?text=${encodeURIComponent(STATE.currentDish.name+' — AR Gastronomy')}`,'_blank'); };
    document.getElementById('shareIG').onclick=()=>shareHandler('ig');
    document.getElementById('shareWA').onclick=()=>shareHandler('wa');
    document.getElementById('shareMail').onclick=()=>{ if(STATE.currentDish) window.location.href=`mailto:?subject=Discover ${STATE.currentDish.name}&body=${encodeURIComponent(location.href)}`; };
    document.getElementById('btnInfo').onclick=()=>toast(`${CONFIG.restaurant.location}  ·  ${CONFIG.restaurant.phone}`);
    document.getElementById('btnMenu').onclick=()=>toast('Full Menu — Coming Soon');
    document.querySelectorAll('.lang-opt').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.lang-opt').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); STATE.lang=btn.dataset.lang; toast(`Language: ${STATE.lang.toUpperCase()}`); }));
    window.addEventListener('keydown', (e)=>{
      if(e.key==='Escape' && STATE.bladeOpen) closeBlade();
      if(e.key===' ' && !STATE.started) { document.getElementById('launchScreen').classList.add('hidden'); startAR(); }
      if(['1','2','3','4'].includes(e.key) && STATE.started) { const dish = CONFIG.menu[+e.key-1]; if(dish){ if(STATE.bladeOpen) closeBlade(); switchDish(dish); document.getElementById('parallaxCanvas').classList.add('fade-in'); setTimeout(()=>openBlade(dish), 220); toast(`DEMO: ${dish.name}`); } }
    });
    window.addEventListener('beforeunload', ()=>{ stopOCRLoop(); if(STATE.tesseractWorker) STATE.tesseractWorker.terminate(); });
    document.getElementById('launchBg').style.backgroundImage = `url('${CONFIG.restaurant.heroImage}')`;
    document.getElementById('portalImg').style.backgroundImage = `url('${CONFIG.restaurant.portalImage}')`;
    document.getElementById('hudName').innerText = CONFIG.restaurant.name.substring(0,2).toUpperCase();
    diagLog('[APP] Boot complete — ready for portal');
  })();
</script>
</body>
</html>
