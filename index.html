<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>AR Gastronomy | Premium Dining</title>

  <!-- Typefaces: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js (r128) from JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  TESSERACT v2.4.0 — ARCHITECTURAL FIX                           ║
    ║                                                                  ║
    ║  REASON FOR DOWNGRADE FROM v4 → v2:                             ║
    ║  v4 uses ES Module workers which are blocked by mobile browsers ║
    ║  (Samsung Internet, UC Browser, older iOS Safari) due to        ║
    ║  strict CORS + worker-type:module policies. The symptom is      ║
    ║  "Tesseract Worker Error: [object Event]" — the browser fires   ║
    ║  an Event (not a real Error) when the worker script is          ║
    ║  rejected at the network/security level before JS even runs.    ║
    ║                                                                  ║
    ║  v2.4.0 uses classic Blob workers + WASM, which are universally ║
    ║  supported on all mobile browsers including iOS Safari 12+.     ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v2.4.0/dist/tesseract.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS — Obsidian Atelier
       Gold-on-black luxury. Every size from the φ scale (×1.618).
    ═══════════════════════════════════════════════════════════════ */
    :root {
      /* Palette */
      --gold:          #d4af37;
      --gold-pale:     #e8d48a;
      --gold-dim:      rgba(212,175,55,0.10);
      --gold-mid:      rgba(212,175,55,0.22);
      --gold-glow:     rgba(212,175,55,0.55);
      --ink:           #050505;
      --ink-lift:      #0c0c0c;
      --surface:       rgba(5,5,5,0.97);
      --white:         #f5f0e8;
      --text-hi:       #f5f0e8;
      --text-lo:       rgba(245,240,232,0.45);
      --text-mid:      rgba(245,240,232,0.70);
      --success:       #4db87a;
      --danger:        #e05a5a;
      --border-hair:   rgba(212,175,55,0.18);
      --border-mid:    rgba(212,175,55,0.30);

      /* φ Spacing */
      --s1:  5px;   --s2:  8px;   --s3: 13px;
      --s4: 21px;   --s5: 34px;   --s6: 55px;  --s7: 89px;

      /* φ Type scale */
      --t-2xs: 9px;  --t-xs: 11px; --t-sm: 13px;
      --t-md:  16px; --t-lg: 21px; --t-xl: 34px;
      --t-2xl: 55px; --t-3xl: 89px;

      /* Golden-ratio blade width */
      --blade-w: calc(100vw / 1.618);

      /* Easing library */
      --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out:     cubic-bezier(0.65, 0, 0.35, 1);

      /* Durations */
      --dur-blade: 0.78s;
      --dur-block: 0.60s;
    }

    /* ─── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-hi);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Grain overlay ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
      opacity: 0.55;
    }

    /* ═══════════════════════════════════════════════════════════════
       ON-SCREEN DIAGNOSTIC CONSOLE — z-index 99999, bottom 30%
    ═══════════════════════════════════════════════════════════════ */
    #diagConsole {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30vh;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.88);
      border-top: 1px solid rgba(212, 175, 55, 0.35);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    #diagConsoleHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: rgba(212,175,55,0.10);
      border-bottom: 1px solid rgba(212,175,55,0.20);
      flex-shrink: 0;
    }

    #diagConsoleTitle {
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #d4af37;
      text-transform: uppercase;
    }

    /* Pre-warm status badge next to title */
    #prewarmBadge {
      font-size: 8px;
      letter-spacing: 1px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 8px;
      font-weight: bold;
      background: rgba(255,224,130,0.15);
      border: 1px solid rgba(255,224,130,0.3);
      color: #ffe082;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    #prewarmBadge.ready {
      background: rgba(77,184,122,0.18);
      border-color: rgba(77,184,122,0.45);
      color: #4db87a;
    }
    #prewarmBadge.error {
      background: rgba(224,90,90,0.18);
      border-color: rgba(224,90,90,0.45);
      color: #e05a5a;
    }

    #diagConsoleBtns {
      display: flex;
      gap: 6px;
    }

    .diag-btn {
      font-size: 9px;
      padding: 2px 7px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.30);
      border-radius: 3px;
      color: #d4af37;
      cursor: pointer;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .diag-btn:active { background: rgba(212,175,55,0.30); }

    #diagLog {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      -webkit-overflow-scrolling: touch;
    }

    .diag-line {
      font-size: 10px;
      line-height: 1.5;
      padding: 1px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .diag-line.log   { color: #c8e6c9; }
    .diag-line.warn  { color: #ffe082; }
    .diag-line.error { color: #ef9a9a; font-weight: bold; }
    .diag-line.crit  { color: #ff5252; font-weight: bold; background: rgba(255,82,82,0.12); padding: 2px 4px; border-radius: 2px; }
    .diag-line.info  { color: #80deea; }
    .diag-line.sys   { color: #ce93d8; }  /* purple for [SYSTEM] entries */

    /* ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
    ═══════════════════════════════════════════════════════════════ */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; background: var(--ink);
      transition: opacity 1s var(--ease-out-expo),
                  visibility 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .launch-bg {
      position: absolute; inset: -8%;
      background-size: cover; background-position: center;
      filter: blur(14px) brightness(0.4);
      z-index: 0; will-change: transform;
    }
    .launch-scrim {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 60%,
                  rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%);
      z-index: 1;
    }
    .launch-body {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--s5);
      text-align: center; padding: var(--s5);
    }

    .launch-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      letter-spacing: 14px; color: var(--gold);
      text-transform: uppercase;
      animation: riseIn 1.1s var(--ease-out-expo) both;
    }
    .launch-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--white); letter-spacing: 2px;
      animation: riseIn 1.2s var(--ease-out-expo) 0.1s both;
    }
    .launch-sub {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 5px; text-transform: uppercase;
      animation: riseIn 1.3s var(--ease-out-expo) 0.2s both;
    }

    .portal-ring {
      position: relative; margin-top: var(--s4);
      width: 190px; height: 190px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-mid); cursor: pointer;
      box-shadow: 0 0 0 1px rgba(212,175,55,0.08),
                  0 20px 60px rgba(0,0,0,0.7),
                  0 0 80px rgba(212,175,55,0.15);
      animation: portalBreath 3.5s ease-in-out infinite,
                 riseIn 1.4s var(--ease-out-expo) 0.3s both;
      transition: box-shadow 0.3s ease, transform 0.4s var(--ease-spring);
    }
    .portal-ring:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 0 1px var(--gold-mid),
                  0 30px 80px rgba(0,0,0,0.8),
                  0 0 120px rgba(212,175,55,0.3);
    }
    .portal-img {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
      transition: transform 0.6s var(--ease-out-expo);
    }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      transition: opacity 0.3s ease;
    }
    .portal-ring:hover .portal-scrim { opacity: 0; }
    .portal-icon {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    @keyframes portalBreath {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0  80px rgba(212,175,55,0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.7), 0 0 130px rgba(212,175,55,0.30); }
    }

    .hud-corner {
      position: absolute; z-index: 15;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s var(--ease-spring);
    }
    .hud-corner:hover {
      background: rgba(212,175,55,0.18);
      border-color: var(--gold-mid);
      transform: scale(1.12);
    }
    .hud-corner svg {
      width: 18px; height: 18px;
      stroke: var(--text-mid); stroke-width: 1.5;
      fill: none; transition: stroke 0.2s ease;
    }
    .hud-corner:hover svg { stroke: var(--gold); }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }

    .lang-pill {
      position: absolute; bottom: var(--s5); left: var(--s5); z-index: 20;
      display: flex; gap: var(--s3);
      background: rgba(0,0,0,0.40);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-hair);
      border-radius: 24px;
      padding: var(--s2) var(--s3);
    }
    .lang-opt {
      background: transparent; border: none;
      color: var(--text-lo); font-size: var(--t-xs); font-weight: 500;
      cursor: pointer; padding: 4px 10px; border-radius: 12px;
      transition: all 0.25s ease;
    }
    .lang-opt.active { background: var(--gold-dim); color: var(--gold); }
    .lang-opt:hover  { color: var(--gold); }

    /* ─────────────────────────────────────────────────────────────────
       AR STACK — video, canvas, overlay
    ───────────────────────────────────────────────────────────────── */
    #videoFeed {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #videoFeed.on { display: block; }

    #parallaxCanvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      display: none; pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s var(--ease-out-expo);
    }
    #parallaxCanvas.on    { display: block; }
    #parallaxCanvas.fade-in { opacity: 1; }

    #arOverlay {
      position: fixed; inset: 0; z-index: 4;
      display: none; cursor: crosshair;
    }
    #arOverlay.on { display: block; }

    /* ─────────────────────────────────────────────────────────────────
       OCR SCANNING ANIMATION
    ───────────────────────────────────────────────────────────────── */
    #ocrScanLine {
      position: fixed; left: 0; right: 0; z-index: 5;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--gold) 50%,
        transparent 100%);
      top: 50%;
      display: none;
      opacity: 0;
      animation: scanMove 1.2s ease-in-out infinite;
      pointer-events: none;
    }
    #ocrScanLine.scanning { display: block; opacity: 0.7; }
    @keyframes scanMove {
      0%   { top: 20%; opacity: 0; }
      50%  { opacity: 0.8; }
      100% { top: 80%; opacity: 0; }
    }

    /* ─────────────────────────────────────────────────────────────────
       HUD BAR
    ───────────────────────────────────────────────────────────────── */
    #hudBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      padding: var(--s4) var(--s5);
      display: none; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
      backdrop-filter: blur(10px);
    }
    #hudBar.on { display: flex; }

    .hud-left  { display: flex; align-items: center; gap: var(--s4); }
    .hud-name  {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-sm); font-weight: 600;
      letter-spacing: 4px; color: var(--gold);
    }
    .hud-status {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 2px; text-transform: uppercase;
    }

    #ocrPill {
      display: flex; align-items: center; gap: var(--s2);
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 20px;
      font-size: var(--t-2xs); color: var(--text-lo);
      transition: all 0.3s ease;
    }
    #ocrPill[data-status="ready"]    { border-color: var(--success); color: var(--success); }
    #ocrPill[data-status="scanning"] { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    #ocrPill[data-status="locked"]   { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    #ocrPill[data-status="error"]    { border-color: var(--danger); color: var(--danger); }

    .ocr-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ─────────────────────────────────────────────────────────────────
       SIDE BLADE
    ───────────────────────────────────────────────────────────────── */
    #sideBlade {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: var(--blade-w); max-width: 100%; z-index: 100;
      background: var(--surface);
      border-left: 1px solid var(--border-hair);
      box-shadow: -20px 0 80px rgba(0,0,0,0.6);
      overflow-y: auto;
      padding: var(--s7) var(--s5) var(--s6);
      transform: translateX(105%);
      transition: transform var(--dur-blade) var(--ease-out-expo);
    }
    #sideBlade.active { transform: translateX(0); }

    .blade-x {
      position: absolute; top: var(--s4); right: var(--s4);
      width: 34px; height: 34px;
      background: transparent; border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      color: var(--text-lo); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
    }
    .blade-x:hover { color: var(--gold); border-color: var(--gold); }

    .motion-element {
      opacity: 0; transform: translateY(26px);
      transition: all 0.6s var(--ease-out-expo);
    }
    #sideBlade.active .motion-element { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 0.10s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.34s; }
    .delay-4 { transition-delay: 0.46s; }

    .blade-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700; color: var(--white);
    }
    .blade-category {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase;
    }
    .blade-block {
      margin-top: var(--s5); padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .blade-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    .blade-label {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: var(--s2);
    }
    .blade-value  { font-size: var(--t-md); color: var(--text-hi); font-weight: 500; }
    .blade-price  {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-2xl); font-weight: 700;
      color: var(--gold); margin-top: var(--s3);
    }
    .blade-ing-text {
      font-size: var(--t-sm); color: var(--text-mid);
      line-height: 1.6; margin-top: var(--s3);
    }
    .blade-cta {
      margin-top: var(--s5); padding: 12px 21px;
      background: var(--gold-dim); border: 1px solid var(--gold-mid);
      color: var(--gold); font-size: var(--t-sm); font-weight: 500;
      border-radius: 8px; cursor: pointer;
      transition: all 0.25s ease; text-align: center;
    }
    .blade-cta:hover { background: var(--gold-mid); color: var(--ink); }

    .share-row { display: flex; gap: var(--s3); margin-top: var(--s4); }
    .share-btn {
      flex: 1; padding: 10px;
      background: rgba(212,175,55,0.08);
      border: 1px solid var(--border-hair);
      color: var(--text-lo); border-radius: 6px;
      cursor: pointer; font-size: 16px; transition: all 0.25s ease;
    }
    .share-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

    /* ─────────────────────────────────────────────────────────────────
       TOAST  — raised above the diagnostic panel
    ───────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: calc(30vh + 10px); left: 50%;
      transform: translateX(-50%);
      z-index: 50000;
      padding: var(--s3) var(--s5);
      background: rgba(0,0,0,0.85);
      border: 1px solid var(--border-hair);
      border-radius: 8px; color: var(--text-hi);
      font-size: var(--t-sm); backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; pointer-events: auto; }

    /* ─────────────────────────────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       DIAGNOSTIC CONSOLE — z-index 99999
       Floats above grain overlay (9999), toast (50000), everything.
  ═══════════════════════════════════════════════════════════════ -->
  <div id="diagConsole">
    <div id="diagConsoleHeader">
      <span id="diagConsoleTitle">⚡ DIAGNOSTIC CONSOLE</span>
      <span id="prewarmBadge">OCR: WARMING...</span>
      <div id="diagConsoleBtns">
        <button class="diag-btn" id="diagClearBtn">CLEAR</button>
        <button class="diag-btn" id="diagToggleBtn">HIDE</button>
      </div>
    </div>
    <div id="diagLog"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="launchScreen">
    <div class="launch-bg" id="launchBg"></div>
    <div class="launch-scrim"></div>

    <div class="launch-body">

/* ═══════════════════════════════════════════════════════════════
   BLOCK 1 — ON-SCREEN DIAGNOSTIC CONSOLE
   Bootstrapped FIRST. Overrides console before any app code runs.
═══════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  const diagLog   = document.getElementById('diagLog');
  const clearBtn  = document.getElementById('diagClearBtn');
  const toggleBtn = document.getElementById('diagToggleBtn');
  const diagPanel = document.getElementById('diagConsole');
  const badge     = document.getElementById('prewarmBadge');
  let   isHidden  = false;

  /* ── Append a styled line ────────────────────────────────────── */
  function appendLine(level, args) {
    const line = document.createElement('div');
    line.className = 'diag-line ' + level;

    const now = new Date();
    const ts  = [now.getHours(), now.getMinutes(), now.getSeconds()]
                  .map(n => String(n).padStart(2, '0')).join(':')
                + '.' + String(now.getMilliseconds()).padStart(3, '0');

    const msg = args.map(a => {
      if (a === null)            return 'null';
      if (a === undefined)       return 'undefined';
      if (a instanceof Error)    return `${a.name}: ${a.message}`;
      if (typeof a === 'object') { try { return JSON.stringify(a); } catch(e) { return String(a); } }
      return String(a);
    }).join(' ');

    line.textContent = `[${ts}] ${msg}`;

    // Escalate CRITICAL lines visually
    if (msg.includes('CRITICAL')) line.className = 'diag-line crit';
    // Purple for [SYSTEM] entries
    if (msg.startsWith('[SYSTEM]')) line.className = 'diag-line sys';

    diagLog.appendChild(line);
    diagLog.scrollTop = diagLog.scrollHeight;

    // Memory safety cap
    while (diagLog.children.length > 400) diagLog.removeChild(diagLog.firstChild);
  }

  /* ── Expose badge updater to outer scope ─────────────────────── */
  window.__diagSetBadge = function(state, text) {
    badge.textContent = 'OCR: ' + text;
    badge.className   = state; // '' | 'ready' | 'error'
  };

  /* ── Wire console overrides ─────────────────────────────────── */
  const _log   = console.log.bind(console);
  const _warn  = console.warn.bind(console);
  const _error = console.error.bind(console);

  console.log = function (...a) { _log(...a);   appendLine('log',   a); };
  console.warn  = function (...a) { _warn(...a);  appendLine('warn',  a); };
  console.error = function (...a) { _error(...a); appendLine('error', a); };

  /* ── Catch unhandled errors & rejected promises ─────────────── */
  window.addEventListener('error', e => {
    appendLine('error', [`[UNCAUGHT ERROR] ${e.message} @ ${e.filename}:${e.lineno}`]);
  });
  window.addEventListener('unhandledrejection', e => {
    const r = e.reason instanceof Error ? `${e.reason.name}: ${e.reason.message}` : String(e.reason);
    appendLine('error', [`[UNHANDLED PROMISE] ${r}`]);
  });

  /* ── Toolbar buttons ─────────────────────────────────────────── */
  clearBtn.addEventListener('click', () => {
    diagLog.innerHTML = '';
    appendLine('info', ['[DIAG] Log cleared.']);
  });
  toggleBtn.addEventListener('click', () => {
    isHidden = !isHidden;
    if (isHidden) {
      diagLog.style.display    = 'none';
      diagPanel.style.height   = '28px';
      toggleBtn.textContent    = 'SHOW';
    } else {
      diagLog.style.display    = 'flex';
      diagPanel.style.height   = '30vh';
      toggleBtn.textContent    = 'HIDE';
    }
  });

  /* ── Boot banner ─────────────────────────────────────────────── */
  appendLine('info', ['[DIAG] ═══════════════════════════════════════']);
  appendLine('info', ['[DIAG] On-screen console ACTIVE (v2-fix build)']);
  appendLine('info', ['[DIAG] ═══════════════════════════════════════']);

  /* ── SYSTEM checkpoint: Browser UA ─────────────────────────── */
  appendLine('sys',  [`[SYSTEM] Browser UA: ${navigator.userAgent}`]);
  appendLine('sys',  [`[SYSTEM] Screen: ${screen.width}x${screen.height} | DPR: ${window.devicePixelRatio}`]);
  appendLine('sys',  [`[SYSTEM] Platform: ${navigator.platform || 'unknown'}`]);
  appendLine('sys',  [`[SYSTEM] Language: ${navigator.language}`]);
  appendLine('sys',  [`[SYSTEM] Online: ${navigator.onLine}`]);
  appendLine('sys',  [`[SYSTEM] Protocol: ${location.protocol} (camera+worker need HTTPS)`]);
  appendLine('info', [`[BOOT] Tesseract global present: ${typeof Tesseract !== 'undefined'}`]);
  appendLine('info', [`[BOOT] THREE.js global present: ${typeof THREE !== 'undefined'}`]);
  appendLine('info', [`[BOOT] Worker API available: ${typeof Worker !== 'undefined'}`]);
  appendLine('info', [`[BOOT] MediaDevices available: ${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}`]);
})();

/* ═══════════════════════════════════════════════════════════════
   BLOCK 4 — FUZZY MATCH (Levenshtein)
═══════════════════════════════════════════════════════════════ */
function levenshteinDistance(a, b) {
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const m = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) m[0][i] = i;
  for (let j = 0; j <= b.length; j++) m[j][0] = j;
  for (let j = 1; j <= b.length; j++)
    for (let i = 1; i <= a.length; i++)
      m[j][i] = Math.min(m[j][i-1]+1, m[j-1][i]+1, m[j-1][i-1] + (a[i-1]===b[j-1] ? 0 : 1));
  return 1 - m[b.length][a.length] / Math.max(a.length, b.length);
}

function fuzzyMatchDish(ocrText) {
  const n = ocrText.toLowerCase().trim();
  let best = null, bestScore = 0;
  for (const dish of CONFIG.menu) {
    let score = levenshteinDistance(n, dish.name.toLowerCase());
    for (const kw of dish.keywords.map(k => k.toLowerCase())) {
      if (n.includes(kw)) score = Math.max(score, 0.8);
      score = Math.max(score, levenshteinDistance(n, kw));
    }
    if (score > bestScore) { bestScore = score; best = dish; }
  }
  return bestScore > CONFIG.ocr.fuzzyMatchThreshold ? { dish: best, score: bestScore } : null;
}

/* ═══════════════════════════════════════════════════════════════
   BLOCK 5 — THREE.JS PARALLAX SCENE
═══════════════════════════════════════════════════════════════ */
let parallaxCtx = null;

function initParallax() {
  try {
    const canvas = el('parallaxCanvas');
    const w = window.innerWidth, h = window.innerHeight;
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(75, w/h, 0.1, 1000);
    camera.position.z = 2;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(w, h);
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(window.devicePixelRatio);

    const glow = new THREE.Mesh(
      new THREE.TorusGeometry(1.2, 0.08, 32, 100),
      new THREE.MeshPhongMaterial({ color: 0xd4af37, emissive: 0xd4af37, emissiveIntensity: 0.6 })
    );
    glow.rotation.x = 0.3;
    scene.add(glow);

    const dishMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x222222, emissiveIntensity: 0.3 });
    const plane   = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.4), dishMat);
    plane.position.z = 0.1;
    scene.add(plane);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const pt = new THREE.PointLight(0xd4af37, 0.8, 10);
    pt.position.set(2, 2, 3);
    scene.add(pt);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    canvas.addEventListener('click', () => {
      if (STATE.currentDish && !STATE.bladeOpen) openBlade(STATE.currentDish);
    });

    (function animate() {
      requestAnimationFrame(animate);
      glow.rotation.z += 0.002;
      renderer.render(scene, camera);
    })();

    return { renderer, dishMat };
  } catch (err) {
    console.error('[Parallax] Init failed:', err.message);
    throw err;
  }
}

/* ═══════════════════════════════════════════════════════════════
   BLOCK 7 — TESSERACT v2 OCR ENGINE
   ───────────────────────────────────────────────────────────────
   ROOT CAUSE OF "[object Event]" error on mobile:
   ─────────────────────────────────────────────
   Tesseract v4 spawns a Worker using type:"module". Mobile browsers
   (Samsung Internet ≤14, older iOS Safari, UC Browser) block or
   silently kill module workers loaded from CDN origins due to their
   CORS + CSP policies. The browser fires a generic Event object on
   the worker's onerror handler — not a real JS Error — which is why
   the console shows "[object Event]" instead of a message string.

   Tesseract v2 uses classic Blob-URL workers + WASM, which bypass
   the module-worker restriction entirely. The v2 API also separates
   load() / loadLanguage() / initialize() into explicit async steps,
   giving us a precise failure point in the logs.

   PREWARM STRATEGY:
   ─────────────────
   Worker init is started on DOMContentLoaded (while the launch
   screen is visible). The promise is stored in `ocrPrewarmPromise`.
   When the user taps "Enter Experience", startAR() simply awaits
   that promise instead of blocking the camera start on OCR init.
   On a slow mobile connection, this saves 4–8 seconds.
═══════════════════════════════════════════════════════════════ */
let tesseractWorker    = null;
let ocrScanTimer       = null;
let ocrPrewarmPromise  = null;  // Holds the pre-warm Future so startAR can await it
let workerFailCount    = 0;     // Tracks consecutive failures for memory management

/*
  ╔════════════════════════════════════════════════════════════════╗
  ║  MANDATORY CDN PATHS — DO NOT CHANGE                          ║
  ║                                                                ║
  ║  These exact versions were chosen because:                    ║
  ║  • tesseract.js@v2.4.0 — last stable v2 release, wide mobile  ║
  ║    compat, no ES module workers                               ║
  ║  • tesseract.js-core@v2.2.0 — matching WASM core for v2.4.0  ║
  ║    The version pairing MUST match or WASM init will silently  ║
  ║    fail with a binary format mismatch.                        ║
  ╚════════════════════════════════════════════════════════════════╝
*/
const TESSERACT_CDN = {
  workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@v2.4.0/dist/worker.min.js',
  corePath:   'https://cdn.jsdelivr.net/npm/tesseract.js-core@v2.2.0/tesseract-core.wasm.js',
  langPath:   'https://tessdata.projectnaptha.com/4.0.0'
};

/* ── Safely terminate any existing worker ────────────────────── */
async function safeTerminateWorker() {
  if (!tesseractWorker) return;
  try {
    console.log('[OCR] Terminating old worker to free memory...');
    await tesseractWorker.terminate();
    console.log('[OCR] Old worker terminated OK.');
  } catch (e) {
    console.warn('[OCR] Worker terminate threw (safe to ignore):', e.message || e);
  } finally {
    tesseractWorker = null;
  }
}

/* ── Build & warm a fresh v2 worker ──────────────────────────── */
async function buildWorker() {
  await safeTerminateWorker();

  console.log('[OCR] ── Building Tesseract v2 worker ──');
  console.log('[OCR] workerPath: ' + TESSERACT_CDN.workerPath);
  console.log('[OCR] corePath:   ' + TESSERACT_CDN.corePath);
  console.log('[OCR] langPath:   ' + TESSERACT_CDN.langPath);

  /*
    Tesseract v2 createWorker() options:
    • workerPath  — URL to worker.min.js (loaded as a Blob, no CORS issue)
    • corePath    — URL to tesseract-core.wasm.js (WASM binary)
    • langPath    — Base URL for .traineddata language files
    • logger      — Progress callback called with {status, progress} objects
    • errorHandler — Called with the raw Event/Error on worker crash (this is
                     what v4 was swallowing as "[object Event]")
  */
  const worker = Tesseract.createWorker({
    workerPath:   TESSERACT_CDN.workerPath,
    corePath:     TESSERACT_CDN.corePath,
    langPath:     TESSERACT_CDN.langPath,
    logger: m => {
      // Log every Tesseract status transition so we can pinpoint hang points
      const pct = (m.progress * 100).toFixed(1);
      if (m.status === 'recognizing text') {
        console.log(`[OCR] Recognizing... ${pct}%`);
      } else {
        console.log(`[OCR] Status: "${m.status}" ${pct}%`);
      }
    },
    errorHandler: err => {
      /*
        This is the critical handler. In v4 this fires as a raw Event
        (hence "[object Event]"). In v2 with explicit errorHandler we
        can log the actual content of the event and distinguish between:
        • Network failure (worker script 404/CORS) → err.type = 'error', no stack
        • WASM load failure → err.message contains 'wasm'
        • Worker crash     → err.message contains 'terminated'
      */
      const detail = err instanceof Error
        ? err.message
        : (err && err.type ? `Event.type="${err.type}" (worker script blocked by browser)` : String(err));
      console.error(`[OCR] CRITICAL: Worker errorHandler fired: ${detail}`);
      console.error('[OCR] If you see "Event.type=error", the worker JS was blocked at network/security level.');
    }
  });

  /* ── v2 requires explicit 3-step init ───────────────────────── */
  console.log('[OCR] Step 1/3: worker.load() — loading WASM core...');
  await worker.load();
  console.log('[OCR] Step 2/3: worker.loadLanguage() — fetching traineddata...');
  await worker.loadLanguage('eng+ara');
  console.log('[OCR] Step 3/3: worker.initialize() — initializing engine...');
  await worker.initialize('eng+ara');

  console.log('[OCR] Worker initialized successfully. ✓');
  return worker;
}

/* ── initOCR: called on DOMContentLoaded for pre-warming ────── */
async function initOCR() {
  el('ocrStatus').textContent  = 'LOADING...';
  el('ocrPill').dataset.status = 'loading';
  window.__diagSetBadge('', 'WARMING...');

  console.log('[OCR] Worker loading from CDN (Tesseract v2)...');

  try {
    tesseractWorker = await buildWorker();
    STATE.ocrReady  = true;

    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent  = 'READY';
    window.__diagSetBadge('ready', 'READY ✓');
    toast('✓ OCR Engine Ready');

  } catch (err) {
    const detail = err instanceof Error ? err.message : String(err);
    console.error(`[OCR Init] FAILED: ${detail}`);
    console.error('[OCR Init] Diagnostic: if error is "[object Event]", the CDN worker script');
    console.error('[OCR Init] was blocked before JS could run. Check browser/network/CSP.');

    STATE.ocrReady = false;
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent  = 'ERROR';
    window.__diagSetBadge('error', 'FAILED ✗');
    toast('⚠ OCR load failed — see console');
  }
}

/* ═══════════════════════════════════════════════════════════════
   BLOCK 8 — OCR SCAN LOOP
   Hot path. Every failure point is independently try/caught
   so a single bad frame can never crash the whole loop.
═══════════════════════════════════════════════════════════════ */
async function runOCRScan() {
  if (!STATE.ocrReady || !STATE.started || STATE.bladeOpen) return;

  const video = el('videoFeed');
  if (!video)              { console.error('[SCAN] CRITICAL: #videoFeed missing from DOM!'); return; }
  if (!video.srcObject)    { console.warn('[SCAN] Skipped — no srcObject (camera not attached yet)'); return; }
  if (video.readyState < 2){ console.warn(`[SCAN] Skipped — readyState=${video.readyState} (<2, not playing)`); return; }

  try {
    el('ocrScanLine').classList.add('scanning');
    el('ocrPill').dataset.status = 'scanning';
    el('ocrStatus').textContent  = 'SCANNING';

    /* ── Capture frame ──────────────────────────────────────────── */
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (vw === 0 || vh === 0) {
      console.error(
        `[SCAN] CRITICAL: video dimensions ${vw}x${vh}. ` +
        'Canvas will be blank. Root cause: missing playsinline on iOS, or video ' +
        'stream not yet decoded. Confirm <video playsinline autoplay muted>.'
      );
      el('ocrPill').dataset.status = 'error';
      el('ocrStatus').textContent  = 'ERROR';
      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    const offscreen = document.createElement('canvas');
    offscreen.width  = vw;
    offscreen.height = vh;
    const ctx = offscreen.getContext('2d');

    /* ── drawImage — isolated catch (CORS / tainted canvas) ─────── */
    try {
      ctx.drawImage(video, 0, 0);
      console.log(`[SCAN] Frame captured and sent to Tesseract. Canvas: ${vw}x${vh}, readyState: ${video.readyState}`);
    } catch (drawErr) {
      console.error(`[SCAN] ctx.drawImage() FAILED: ${drawErr.message}`);
      console.error('[SCAN] Cause: tainted canvas (CORS on video src) or video element not yet decoded.');
      el('ocrPill').dataset.status = 'error';
      el('ocrStatus').textContent  = 'ERROR';
      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    /* ── Tesseract v2 recognize — isolated catch ─────────────────── */
    let result;
    try {
      result = await tesseractWorker.recognize(offscreen);
      workerFailCount = 0; // reset on success
    } catch (ocrErr) {
      workerFailCount++;
      const detail = ocrErr instanceof Error ? ocrErr.message : String(ocrErr);
      console.error(`[SCAN] tesseractWorker.recognize() FAILED (#${workerFailCount}): ${detail}`);

      /*
        MEMORY MANAGEMENT:
        If the worker fails 3 consecutive times, it has likely been
        killed by the mobile OS (low-memory kill / ANR on Android,
        Jetsam on iOS). We terminate the dead worker and rebuild it
        from scratch so the next scan attempt has a live worker.
        This prevents the tab from needing a full reload.
      */
      if (workerFailCount >= 3) {
        console.error('[OCR] 3 consecutive failures. Rebuilding worker to recover from OS kill...');
        STATE.ocrReady = false;
        el('ocrPill').dataset.status = 'error';
        el('ocrStatus').textContent  = 'REBUILDING';
        window.__diagSetBadge('', 'REBUILDING...');

        try {
          tesseractWorker  = await buildWorker();
          STATE.ocrReady   = true;
          workerFailCount  = 0;
          el('ocrPill').dataset.status = 'ready';
          el('ocrStatus').textContent  = 'READY';
          window.__diagSetBadge('ready', 'REBUILT ✓');
          console.log('[OCR] Worker successfully rebuilt after crash recovery.');
        } catch (rebuildErr) {
          console.error('[OCR] CRITICAL: Worker rebuild also failed:', rebuildErr.message || rebuildErr);
          window.__diagSetBadge('error', 'DEAD ✗');
          toast('⚠ OCR engine crashed — reload page');
        }
      }

      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    const text       = result.data.text;
    const confidence = result.data.confidence;

    /* ── RESULT checkpoint — always log raw output ───────────────── */
    console.log(`[RESULT] Tesseract output: "${text.substring(0, 80).replace(/\n/g,' ')}" | Confidence: ${confidence.toFixed(1)}`);

    if (confidence > 30 && text.trim().length > 3) {
      checkTextAgainstMenu(text);
    } else {
      console.log(`[SCAN] Low confidence (${confidence.toFixed(1)}) or empty text. Skipping match.`);
      el('ocrPill').dataset.status = 'ready';
      el('ocrStatus').textContent  = 'READY';
      el('ocrScanLine').classList.remove('scanning');
    }

  } catch (err) {
    console.error(`[OCR Scan] Unhandled outer error: ${err.message}`);
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent  = 'ERROR';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function checkTextAgainstMenu(text) {
  const match = fuzzyMatchDish(text);
  if (match && match.score > CONFIG.ocr.fuzzyMatchThreshold) {
    console.log(`[Match] "${match.dish.name}" (score: ${match.score.toFixed(2)})`);
    switchDish(match.dish);
    el('parallaxCanvas').classList.add('fade-in');
    setTimeout(() => openBlade(match.dish), 300);
  } else {
    console.log(`[NoMatch] No dish found for: "${text.substring(0, 40).replace(/\n/g,' ')}..."`);
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent  = 'READY';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function startOCRLoop() {
  if (ocrScanTimer) clearInterval(ocrScanTimer);
  ocrScanTimer = setInterval(runOCRScan, CONFIG.ocr.scanIntervalMs);
  console.log(`[LOOP] Interval started. Scanning every ${CONFIG.ocr.scanIntervalMs}ms.`);
}

function stopOCRLoop() {
  if (ocrScanTimer) {
    clearInterval(ocrScanTimer);
    ocrScanTimer = null;
    console.log('[LOOP] Interval stopped.');
  }
}

/* ═══════════════════════════════════════════════════════════════
   BLOCK 9 — AR INITIALIZATION
   startAR() no longer blocks on OCR init — it awaits the
   pre-warm promise that was started on DOMContentLoaded.
═══════════════════════════════════════════════════════════════ */
async function startAR() {
  STATE.started = true;

  el('videoFeed').classList.add('on');
  el('parallaxCanvas').classList.add('on');
  el('arOverlay').classList.add('on');
  el('hudBar').classList.add('on');

  /* ── Camera guard ────────────────────────────────────────────── */
  console.log('[CAMERA] Requesting video feed...');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.error(
      `[CAMERA] CRITICAL: navigator.mediaDevices.getUserMedia unavailable! ` +
      `Protocol: ${location.protocol}. Camera requires HTTPS or localhost.`
    );
    toast('Camera API not available — needs HTTPS');
    return;
  }
  console.log(`[CAMERA] mediaDevices OK. Protocol: ${location.protocol}`);

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
  } catch (err) {
    console.error(`[CAMERA] getUserMedia FAILED: ${err.name} — ${err.message}`);
    if (err.name === 'NotAllowedError')     console.error('[CAMERA] User denied permission or browser policy blocked.');
    if (err.name === 'NotFoundError')       console.error('[CAMERA] No camera device found.');
    if (err.name === 'NotReadableError')    console.error('[CAMERA] Camera already in use by another app.');
    if (err.name === 'OverconstrainedError')console.error('[CAMERA] Constraints unsatisfiable.');
    toast('Camera access denied');
    return;
  }

  const video  = el('videoFeed');
  const tracks = stream.getVideoTracks();

  if (tracks.length > 0) {
    const s = tracks[0].getSettings();
    console.log(`[CAMERA] Stream obtained. Track: "${tracks[0].label}"`);
    console.log(`[CAMERA] Negotiated: ${s.width}x${s.height} @ ${s.frameRate}fps`);
  } else {
    console.warn('[CAMERA] Stream has 0 video tracks!');
  }

  video.srcObject = stream;

  /* ── Instrument all video lifecycle events ───────────────────── */
  video.addEventListener('loadstart',      () => console.log('[CAMERA] Event: loadstart'));
  video.addEventListener('loadedmetadata', () => console.log(`[CAMERA] Event: loadedmetadata — ${video.videoWidth}x${video.videoHeight}`));
  video.addEventListener('loadeddata',     () => console.log(`[CAMERA] Event: loadeddata — readyState: ${video.readyState}`));
  video.addEventListener('canplay',        () => console.log(`[CAMERA] Event: canplay — readyState: ${video.readyState}`));
  video.addEventListener('playing', () => {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (vw === 0 || vh === 0) {
      console.error(
        `[CAMERA] CRITICAL: Video playing but dimensions are ${vw}x${vh}! ` +
        'iOS Safari requires playsinline to expose pixel data to canvas. ' +
        'Every drawImage() call will return a blank frame without it.'
      );
    } else {
      console.log(`[CAMERA] Video feed playing. Dimensions: ${vw}x${vh}.`);
    }
  });
  video.addEventListener('stalled', () => console.warn('[CAMERA] Event: stalled'));
  video.addEventListener('suspend', () => console.warn('[CAMERA] Event: suspend'));
  video.addEventListener('waiting', () => console.warn('[CAMERA] Event: waiting (decode stall)'));
  video.addEventListener('error',   () => {
    const code = video.error?.code ?? 'unknown';
    const msg  = video.error?.message ?? 'no message';
    console.error(`[CAMERA] CRITICAL: Video element error! code=${code} msg="${msg}"`);
  });

  video.onloadedmetadata = async () => {
    console.log(`[CAMERA] onloadedmetadata — ${video.videoWidth}x${video.videoHeight}`);

    try {
      parallaxCtx = initParallax();
      console.log('[Parallax] Scene ready (waiting for OCR match)');
    } catch (err) {
      console.error('[Parallax] FAILED:', err.message);
      toast('3D initialization failed');
      return;
    }

    /* ── Await the pre-warm promise seeded at DOMContentLoaded ─── */
    console.log('[AR] Awaiting OCR pre-warm completion...');
    try {
      await ocrPrewarmPromise;
    } catch (e) {
      // Already logged inside initOCR(). Just note it here.
      console.warn('[AR] Pre-warm promise rejected — OCR may not be ready.');
    }

    if (STATE.ocrReady) {
      startOCRLoop();
      toast('📷 Point camera at dish name');
    } else {
      console.error('[AR] OCR not ready after pre-warm. Loop NOT started.');
      console.error('[AR] Check [OCR] lines above for the exact failure point.');
      toast('⚠ OCR unavailable — see diagnostic log');
    }
  };

  /* ── Explicit play() call with autoplay-block detection ──────── */
  const playPromise = video.play();
  if (playPromise !== undefined) {
    playPromise
      .then(()  => console.log('[CAMERA] video.play() resolved. Autoplay OK.'))
      .catch(e  => {
        console.error(`[CAMERA] CRITICAL: video.play() BLOCKED: ${e.message}`);
        console.error('[CAMERA] Autoplay was rejected. Ensure <video muted> attribute is set.');
      });
  }

  track('ar_started');
}

/* ═══════════════════════════════════════════════════════════════
   BLOCK 10 — UI EVENT LISTENERS
═══════════════════════════════════════════════════════════════ */
el('portalBtn').addEventListener('click', () => {
  track('portal_tapped');
  el('launchScreen').classList.add('hidden');
  setTimeout(startAR, 240);
});

el('videoCta').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="position:relative;width:100%;max-width:600px;">
      <button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:-40px;right:0;background:transparent;border:none;color:#d4af37;font-size:24px;cursor:pointer;">✕</button>
      <video src="${STATE.currentDish.videoUrl}" controls autoplay style="width:100%;border-radius:8px;"></video>
    </div>`;
  document.body.appendChild(modal);
  track('video_opened', { dish: STATE.currentDish.name });
});

el('shareIG').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(`https://www.instagram.com/?caption=${encodeURIComponent('Discover ' + STATE.currentDish.name + ' at AR Gastronomy!')}`, '_blank');
  track('shared', { platform: 'instagram', dish: STATE.currentDish.name });
});
el('shareWA').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(`https://wa.me/?text=${encodeURIComponent(STATE.currentDish.name + ' — ' + window.location.href)}`, '_blank');
  track('shared', { platform: 'whatsapp', dish: STATE.currentDish.name });
});
el('shareMail').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(`mailto:?subject=${encodeURIComponent('Discover ' + STATE.currentDish.name)}&body=${encodeURIComponent(window.location.href)}`, '_blank');
  track('shared', { platform: 'email', dish: STATE.currentDish.name });
});

el('btnInfo').addEventListener('click', () => toast(`📍 ${CONFIG.restaurant.location}  ·  📞 ${CONFIG.restaurant.phone}`));
el('btnMenu').addEventListener('click', () => toast('FULL MENU — Coming Soon'));

document.querySelectorAll('.lang-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    STATE.lang = btn.dataset.lang;
    track('lang_changed', { lang: STATE.lang });
  });
});

window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && STATE.bladeOpen) closeBlade();
  if (e.key === ' ' && !STATE.started) { el('launchScreen').classList.add('hidden'); setTimeout(startAR, 240); }
  if (['1','2','3','4'].includes(e.key) && STATE.started) {
    const d = CONFIG.menu[+e.key - 1];
    if (d) { if (STATE.bladeOpen) closeBlade(); setTimeout(() => { switchDish(d); el('parallaxCanvas').classList.add('fade-in'); setTimeout(() => openBlade(d), 300); }, 120); }
  }
});

/* ═══════════════════════════════════════════════════════════════
   BLOCK 11 — APP BOOT
   ► Pre-warm OCR NOW, while the launch screen is visible.
     The user hasn't tapped anything yet, but we're already
     downloading the WASM core and language pack in the background.
     By the time they tap "Enter Experience" → camera opens, the
     worker is typically already initialized and waiting.
═══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  console.log('[BOOT] App loaded.');
  console.log(`[BOOT] Tesseract v2 available: ${typeof Tesseract !== 'undefined'}`);
  console.log(`[BOOT] THREE.js available: ${typeof THREE !== 'undefined'}`);
  console.log(`[BOOT] Worker API: ${typeof Worker !== 'undefined'}`);
  console.log(`[BOOT] MediaDevices: ${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}`);
  console.log(`[BOOT] HTTPS: ${location.protocol === 'https:' ? 'YES ✓' : 'NO ✗ (camera + workers may fail)'}`);

  el('launchBg').style.backgroundImage  = `url('${CONFIG.restaurant.heroImage}')`;
  el('portalImg').style.backgroundImage = `url('${CONFIG.restaurant.portalImage}')`;
  el('hudName').textContent             = CONFIG.restaurant.name.substring(0, 2).toUpperCase();

  track('app_loaded', { version: '3.0-tesseract-v2', lang: STATE.lang });
  toast('WELCOME TO AR GASTRONOMY');

  /* ─────────────────────────────────────────────────────────────
     PRE-WARM: Kick off OCR worker initialization immediately.
     We store the Promise so startAR() can await it without
     re-triggering the init sequence.
  ───────────────────────────────────────────────────────────── */
  console.log('[BOOT] Starting OCR pre-warm in background...');
  ocrPrewarmPromise = initOCR();
  ocrPrewarmPromise.catch(err => {
    // Already handled inside initOCR, this just prevents unhandled rejection warnings
    console.warn('[BOOT] Pre-warm promise caught:', err?.message || err);
  });
});

/* ── Cleanup ────────────────────────────────────────────────── */
window.addEventListener('beforeunload', () => {
  stopOCRLoop();
  safeTerminateWorker();
});
</script>
