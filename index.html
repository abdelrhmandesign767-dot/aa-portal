<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Portal | Spatial Experience</title>
    <style>
        :root { 
            --phi: 1.618; 
            --gold: #d4af37; 
            --white: #ffffff;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', -apple-system, sans-serif; }

        /* CAMERA FEED */
        #video { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }

        /* ATTRACTIVE START SCREEN */
        #start-screen { 
            position: fixed; inset: 0; z-index: 100; 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: var(--white); text-align: center;
        }

        /* Modern Background Pattern for Start Screen */
        #start-screen::before {
            content: ""; position: absolute; inset: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .hero-title { 
            font-size: 2.5rem; color: var(--gold); letter-spacing: 8px; font-weight: 800;
            margin-bottom: 10px; text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .hero-subtitle { font-size: 1rem; opacity: 0.6; margin-bottom: 40px; font-weight: 300; }

        #start-btn { 
            padding: 20px 60px; font-size: 1.1rem; background: transparent; 
            border: 2px solid var(--gold); color: var(--gold); border-radius: 100px;
            cursor: pointer; font-weight: bold; transition: all 0.4s ease;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        #start-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); }

        /* SPATIAL UI ELEMENTS */
        #ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; }

        #weather-info { 
            position: absolute; top: 30px; right: 30px; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-left: 3px solid var(--gold); padding: 10px 20px; color: #fff; font-size: 14px;
        }

        #arrow { 
            margin-top: 30vh; font-size: 70px; color: var(--gold); 
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; 
            filter: drop-shadow(0 0 15px var(--gold));
        }

        #info-card { 
            position: absolute; bottom: 10%; width: 85%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 25px;
            padding: 30px; color: #fff; transform: translateY(200%); transition: 0.7s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #info-card.active { transform: translateY(0); }

        .card-label { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hero-title">Spatial</div>
        <div class="hero-subtitle">Discovery Portal Experience</div>
        <button id="start-btn">Start Exploration</button>
        <p style="font-size: 10px; margin-top: 20px; opacity: 0.4;">Camera & Motion Sensors Required</p>
    </div>

    <div id="ui-layer">
        <div id="weather-info">Tanta: Fetching...</div>
        <div id="arrow">▲</div>
        <div id="info-card">
            <div class="card-label">Identified Item</div>
            <h2 id="title" style="margin:5px 0 15px 0; font-size: 1.8rem;"></h2>
            <p id="desc" style="font-weight: 300; line-height: 1.6; opacity: 0.8;"></p>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const card = document.getElementById('info-card');
        const arrow = document.getElementById('arrow');
        let configData = null;

        // LOAD DATA
        async function init() {
            const id = new URLSearchParams(window.location.search).get('id') || 'test';
            try {
                const res = await fetch(`clients/${id}.json`);
                configData = await res.json();
                fetchWeather();
            } catch(e) { console.error("Config missing"); }
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Tanta&appid=6ce2f9889336bf354a6a47b507723d3a&units=metric');
                const w = await res.json();
                document.getElementById('weather-info').innerText = `${Math.round(w.main.temp)}°C | ${w.weather[0].main}`;
            } catch(e) {}
        }

        // START HANDLER
        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
                
                video.srcObject = stream;
                
                // Motion Permissions for iOS
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }
                
                window.addEventListener('deviceorientation', handleSpatialTrack, true);
                startScreen.style.opacity = '0';
                setTimeout(() => startScreen.style.display = 'none', 500);
            } catch (err) { alert("Please allow camera access."); }
        };

        // SPATIAL LOGIC
        function handleSpatialTrack(e) {
            if (!configData) return;
            let currentHeading = e.webkitCompassHeading || (360 - e.alpha);
            let target = configData.points[0];
            let diff = currentHeading - target.angle;
            
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            if (Math.abs(diff) < 20) {
                arrow.style.opacity = "0";
                card.classList.add('active');
                document.getElementById('title').innerText = target.name;
                document.getElementById('desc').innerText = target.info;
            } else {
                arrow.style.opacity = "1";
                card.classList.remove('active');
                arrow.style.transform = `rotate(${diff > 0 ? -90 : 90}deg)`;
            }
        }
        init();
    </script>
</body>
</html>
