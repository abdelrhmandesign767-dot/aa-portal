<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <title>AR Gastronomy | Premium Dining Experience</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

    <style>
        /* =====================================================
           DESIGN TOKENS — Golden Ratio System
           ===================================================== */
        :root {
            --gold:          #d4af37;
            --gold-dim:      rgba(212,175,55,0.12);
            --gold-glow:     rgba(212,175,55,0.55);
            --white:         #f7f4ee;
            --bg:            #050505;
            --surface:       rgba(6,6,6,0.96);
            --border:        rgba(212,175,55,0.22);
            --text-primary:  #f7f4ee;
            --text-muted:    rgba(247,244,238,0.55);
            --success:       #4caf50;
            --error:         #ff6b6b;

            --sp1: 5px;  --sp2: 8px;  --sp3: 13px;
            --sp4: 21px; --sp5: 34px; --sp6: 55px; --sp7: 89px;

            --t-xs: 10px; --t-sm: 13px; --t-md: 21px;
            --t-lg: 34px; --t-xl: 55px;

            --blade-width: calc(100vw / 1.618);

            --ease-luxury:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-blade:   cubic-bezier(0.16, 1, 0.3, 1);
            --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* =====================================================
           LAUNCH SCREEN
           ===================================================== */
        .launch-screen {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: var(--bg);
            transition: opacity 0.9s var(--ease-blade), visibility 0.9s var(--ease-blade);
        }
        .launch-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .hero-backdrop {
            position: absolute; inset: -10%;
            background-size: cover; background-position: center;
            background-color: #0a0a0a;
            filter: blur(12px); z-index: 0;
        }
        .hero-scrim {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.82) 100%);
            z-index: 1;
        }
        .hero-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            gap: var(--sp6); text-align: center; padding: var(--sp5);
            max-width: 90%;
        }
        .hero-brand {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-lg); font-weight: 900;
            letter-spacing: 12px; color: var(--gold);
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
        }
        .hero-messaging { display: flex; flex-direction: column; gap: var(--sp3); animation: fadeInUp 1.2s ease-out; }
        .hero-tagline {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-md); font-weight: 400;
            color: var(--white); letter-spacing: 2px;
            text-shadow: 0 8px 24px rgba(0,0,0,0.7);
        }
        .hero-subtitle { font-size: var(--t-xs); color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; }

        .portal-button {
            position: relative; margin-top: var(--sp4);
            width: 200px; height: 200px;
            border-radius: 12px; overflow: hidden;
            border: 2px solid var(--gold); cursor: pointer;
            transition: all 0.3s var(--ease-luxury);
            box-shadow: 0 12px 40px rgba(212,175,55,0.3);
            animation: portalPulse 3s ease-in-out infinite;
            perspective: 1000px;
        }
        .portal-inner {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            position: relative;
            transition: transform 0.4s var(--ease-luxury);
        }
        .portal-button:hover .portal-inner { transform: scale(1.1) rotateX(5deg) rotateY(5deg); }
        .portal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 2; transition: opacity 0.3s; }
        .portal-button:hover .portal-overlay { opacity: 0; }
        .portal-icon { position: absolute; inset: 0; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 80px; }

        .corner-btn {
            position: absolute; z-index: 15;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .corner-btn:hover { background: rgba(212,175,55,0.2); border-color: var(--gold); transform: scale(1.12); }
        .corner-btn svg { width: 20px; height: 20px; stroke: var(--text-primary); stroke-width: 1.5; fill: none; }
        .corner-btn:hover svg { stroke: var(--gold); }
        .btn-top-left  { top: var(--sp5); left: var(--sp5); }
        .btn-top-right { top: var(--sp5); right: var(--sp5); }

        .lang-selector {
            position: absolute; bottom: var(--sp5); right: var(--sp5);
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            border-radius: 20px; padding: var(--sp1) var(--sp3);
            color: var(--text-primary); font-size: var(--t-xs);
            display: flex; gap: var(--sp2); cursor: pointer;
        }
        .lang-option { padding: var(--sp1) var(--sp2); border-radius: 12px; transition: all 0.2s ease; }
        .lang-option:hover, .lang-option.active { background: var(--gold); color: var(--bg); }

        /* =====================================================
           AR VIEWPORT — Three.js canvas + video feed
           ===================================================== */
        #ar-viewport {
            position: fixed; inset: 0; z-index: 1;
            width: 100%; height: 100%;
            display: none;
        }
        #ar-viewport.active { display: block; }

        #video-fallback {
            position: fixed; inset: 0; z-index: 2;
            width: 100%; height: 100%; object-fit: cover;
            display: none;
        }
        #video-fallback.active { display: block; }

        /* Click-target overlay sitting above video feed, below HUD */
        #ar-click-overlay {
            position: fixed; inset: 0; z-index: 10;
            display: none; cursor: crosshair;
        }
        #ar-click-overlay.active { display: block; }

        /* Three.js canvas sits on top of video as transparent layer */
        #parallax-canvas {
            position: fixed; inset: 0; z-index: 11;
            width: 100%; height: 100%;
            display: none; pointer-events: none;
        }
        #parallax-canvas.active { display: block; }

        /* =====================================================
           HUD STATUS BAR
           ===================================================== */
        .hud-status-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 60;
            padding: var(--sp4) var(--sp5);
            display: none; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
            backdrop-filter: blur(8px);
            font-size: var(--t-xs); letter-spacing: 2px;
        }
        .hud-status-bar.active { display: flex; }
        .hud-brand { font-family: 'Playfair Display', serif; color: var(--gold); font-weight: 600; letter-spacing: 3px; }
        .hud-tracker { display: flex; align-items: center; gap: var(--sp2); color: var(--text-muted); }
        .hud-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }

        /* =====================================================
           ★★★ REFACTOR 2: REDESIGNED SIDE BLADE ★★★
           Golden-ratio width, slides in from right, 5 staggered
           motion-element blocks: Title / Rating / Price /
           Ingredients / Video
           ===================================================== */
        .side-blade-container {
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: var(--blade-width);
            max-width: 100%;
            z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(30px) saturate(1.4);
            border-left: 1px solid var(--border);
            overflow-y: auto; overflow-x: hidden;
            padding: var(--sp7) var(--sp5) var(--sp6);
            display: flex; flex-direction: column;

            /* ★★★ REFACTOR 3: Luxury cubic-bezier slide */
            transform: translateX(110%);
            transition: transform 0.8s var(--ease-blade);
        }
        .side-blade-container.active { transform: translateX(0); }

        .side-blade-container::-webkit-scrollbar { width: 3px; }
        .side-blade-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .blade-close-btn {
            position: absolute; top: var(--sp4); right: var(--sp4);
            width: 32px; height: 32px;
            background: transparent; border: none;
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; line-height: 1;
            transition: color 0.2s ease, transform 0.2s var(--ease-elastic);
        }
        .blade-close-btn:hover { color: var(--gold); transform: rotate(90deg) scale(1.1); }

        /* ★★★ REFACTOR 3: motion-element base state */
        .motion-element {
            opacity: 0;
            transform: translateY(22px);
            transition:
                opacity  0.65s ease,
                transform 0.65s var(--ease-blade);
        }

        /* When parent gets .active, children animate in */
        .side-blade-container.active .motion-element {
            opacity: 1;
            transform: translateY(0);
        }

        /* ★★★ REFACTOR 3: Staggered delay classes */
        .delay-1 { transition-delay: 0.08s; }
        .delay-2 { transition-delay: 0.18s; }
        .delay-3 { transition-delay: 0.28s; }
        .delay-4 { transition-delay: 0.38s; }
        .delay-5 { transition-delay: 0.50s; }

        /* ─── Block 1: Title ──────────────────────────────── */
        .dish-title {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-lg); font-weight: 700;
            color: var(--gold); letter-spacing: 1px;
            line-height: 1.15;
        }
        .dish-category {
            display: block;
            margin-top: var(--sp2);
            font-size: var(--t-xs);
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ─── Block 2: Google Rating ──────────────────────── */
        .review-wrapper { margin-top: var(--sp4); }
        .google-rating-link {
            display: inline-flex; align-items: center; gap: var(--sp2);
            text-decoration: none;
            color: var(--gold);
            transition: opacity 0.2s ease;
        }
        .google-rating-link:hover { opacity: 0.75; }
        .stars { font-size: 16px; letter-spacing: 1px; }
        .review-text {
            font-size: var(--t-xs); letter-spacing: 2px;
            text-transform: uppercase; color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
        }

        /* ─── Block 3: Price (separated) ─────────────────── */
        .standalone-price {
            margin-top: 2rem;
            padding-top: 1.1rem;
            border-top: 1px solid rgba(212,175,55,0.12);
        }
        .price-value {
            font-size: var(--t-md); font-weight: 700;
            color: var(--gold); letter-spacing: 2px;
        }
        .price-label {
            display: block;
            margin-top: var(--sp1);
            font-size: var(--t-xs); color: var(--text-muted);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* ─── Block 4: Ingredients (text-only) ───────────── */
        .standalone-ingredients {
            margin-top: 2rem;
            padding-top: 1.1rem;
            border-top: 1px solid rgba(212,175,55,0.12);
        }
        .ingredients-label {
            font-size: var(--t-xs); color: var(--text-muted);
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: var(--sp3);
        }
        .ingredient-text {
            font-size: var(--t-sm); font-weight: 300;
            color: var(--text-muted); line-height: 1.7;
        }
        .allergen-note {
            margin-top: var(--sp3);
            padding: var(--sp2) var(--sp3);
            background: rgba(255,107,107,0.09);
            border-left: 3px solid #ff6b6b;
            border-radius: 3px;
            font-size: var(--t-xs); color: #ff9999;
            line-height: 1.5;
        }

        /* ─── Block 5: Video button (separated) ──────────── */
        .standalone-video {
            margin-top: 2rem;
            padding-top: 1.1rem;
            border-top: 1px solid rgba(212,175,55,0.12);
        }
        .luxury-video-btn {
            width: 100%;
            padding: var(--sp3) var(--sp4);
            background: var(--gold);
            color: var(--bg);
            border: none; border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: var(--t-xs); font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.3s var(--ease-elastic), box-shadow 0.3s ease;
        }
        .luxury-video-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(212,175,55,0.45);
        }
        .luxury-video-btn:active { transform: translateY(0); }

        .social-share {
            display: flex; gap: var(--sp2);
            margin-top: var(--sp4); padding-top: var(--sp4);
            border-top: 1px solid var(--border);
        }
        .share-btn {
            flex: 1; padding: var(--sp2) var(--sp3);
            background: transparent; border: 1px solid var(--border);
            color: var(--text-primary); border-radius: 4px;
            cursor: pointer; font-size: 14px;
            transition: all 0.2s ease;
        }
        .share-btn:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

        /* =====================================================
           VIDEO MODAL
           ===================================================== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 350;
            background: rgba(0,0,0,0.95);
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            padding: var(--sp5);
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal-content {
            position: relative; width: 100%; max-width: 600px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal-video { width: 100%; height: auto; display: block; }
        .modal-close-btn {
            position: absolute; top: var(--sp4); right: var(--sp4);
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            color: var(--white); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; z-index: 10; font-size: 20px;
        }
        .modal-close-btn:hover { background: var(--gold); color: var(--bg); }

        /* =====================================================
           GESTURE HINT & TOAST
           ===================================================== */
        .gesture-hint {
            position: fixed; bottom: var(--sp5); left: 50%;
            transform: translateX(-50%);
            z-index: 55; font-size: var(--t-xs);
            color: var(--text-muted); letter-spacing: 2px;
            text-align: center;
            animation: breatheText 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes breatheText { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        .toast {
            position: fixed; bottom: var(--sp6); left: 50%;
            transform: translateX(-50%) translateY(150px);
            z-index: 400;
            padding: var(--sp3) var(--sp5);
            background: rgba(0,0,0,0.92); color: var(--gold);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: var(--t-xs); letter-spacing: 1px;
            white-space: nowrap;
            transition: transform 0.4s var(--ease-blade);
            pointer-events: none; max-width: 80%; text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* =====================================================
           KEYFRAMES
           ===================================================== */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp   { from { opacity: 0; transform: translateY(30px);  } to { opacity: 1; transform: translateY(0); } }
        @keyframes portalPulse {
            0%,100% { box-shadow: 0 12px 40px rgba(212,175,55,0.3); }
            50%      { box-shadow: 0 16px 60px rgba(212,175,55,0.6); }
        }
    </style>
</head>
<body>

<!-- ================================================================
     LAUNCH SCREEN
     ================================================================ -->
<div class="launch-screen" id="launchScreen">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-scrim"></div>

    <div class="corner-btn btn-top-left" id="btnInfo" title="Restaurant Info">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 17v-6"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
    </div>
    <div class="corner-btn btn-top-right" id="btnMenu" title="Full Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>

    <div class="lang-selector">
        <div class="lang-option active" data-lang="en">EN</div>
        <div class="lang-option" data-lang="ar">عربي</div>
        <div class="lang-option" data-lang="fr">FR</div>
    </div>

    <div class="hero-container">
        <div class="hero-brand" id="heroBrand">CULINARY AR</div>
        <div class="hero-messaging">
            <div class="hero-tagline"  id="heroTagline">Discover Masterpieces</div>
            <div class="hero-subtitle" id="heroSubtitle">CINEMA-GRADE EXPERIENCE</div>
        </div>
        <button class="portal-button" id="portalButton">
            <div class="portal-inner" id="portalInner">
                <div class="portal-overlay"></div>
                <div class="portal-icon">🍽️</div>
            </div>
        </button>
    </div>
</div>

<!-- ================================================================
     AR VIEWPORT STACK (bottom → top)
     Layer 1: live camera feed
     Layer 2: transparent Three.js canvas (parallax render)
     Layer 3: invisible click-catcher
     ================================================================ -->
<video  id="video-fallback"  playsinline autoplay muted></video>
<canvas id="parallax-canvas"></canvas>
<div    id="ar-click-overlay"></div>

<!-- ================================================================
     HUD STATUS BAR
     ================================================================ -->
<div class="hud-status-bar" id="hudStatusBar">
    <div class="hud-brand" id="hudBrand">AR</div>
    <div class="hud-tracker">
        <div class="hud-dot"></div>
        <span id="hudStatus">INITIALIZING</span>
    </div>
</div>

<!-- ================================================================
     ★★★ REFACTOR 2: REDESIGNED SIDE BLADE ★★★
     Five clear separated blocks with motion-element + delay classes.
     All text nodes carry data-i18n for multi-language mapping.
     Reserve button and spice icons removed.
     ================================================================ -->
<div class="side-blade-container" id="luxurySideBlade">
    <button class="blade-close-btn" id="bladeClose">✕</button>

    <!-- Block 1 — Title + Category -->
    <div class="motion-element delay-1">
        <h2 class="dish-title"    data-i18n="dish_title" id="bladeTitle">—</h2>
        <span class="dish-category" data-i18n="dish_category" id="bladeCategory">—</span>
    </div>

    <!-- Block 2 — Google Maps Rating Link -->
    <div class="motion-element delay-2 review-wrapper">
        <a href="https://maps.google.com/YOUR_RESTAURANT_LINK"
           target="_blank"
           rel="noopener"
           class="google-rating-link"
           id="googleRatingLink">
            <span class="stars" id="bladeStars">★★★★★</span>
            <span class="review-text" data-i18n="rate_google" id="bladeRateLabel">Rate us on Google</span>
        </a>
    </div>

    <!-- Block 3 — Price -->
    <div class="motion-element delay-3 standalone-price">
        <span class="price-value" data-i18n="dish_price" id="bladePrice">—</span>
        <span class="price-label" data-i18n="price_label" id="bladePriceLabel">PER PERSON</span>
    </div>

    <!-- Block 4 — Text-only Ingredients + Allergen -->
    <div class="motion-element delay-4 standalone-ingredients">
        <div class="ingredients-label" data-i18n="ingredients_label" id="bladeIngredientsLabel">KEY INGREDIENTS</div>
        <p class="ingredient-text" data-i18n="dish_ingredients" id="bladeIngredients">—</p>
        <div class="allergen-note" id="allergenNote" style="display:none;">
            <strong>⚠️</strong> <span id="bladeAllergen"></span>
        </div>
    </div>

    <!-- Block 5 — Video CTA -->
    <div class="motion-element delay-5 standalone-video">
        <button class="luxury-video-btn" id="openVideoBtn">
            <span data-i18n="watch_video" id="watchVideoLabel">WATCH THE ARTISTRY</span>
        </button>

        <!-- Social share strip lives inside this block -->
        <div class="social-share" style="margin-top:var(--sp4);">
            <button class="share-btn" id="shareInstagram" title="Instagram">📷</button>
            <button class="share-btn" id="shareWhatsapp"  title="WhatsApp">💬</button>
            <button class="share-btn" id="shareEmail"     title="Email">✉️</button>
        </div>
    </div>
</div>

<!-- ================================================================
     VIDEO MODAL
     ================================================================ -->
<div class="modal-overlay" id="videoModal">
    <div class="modal-content">
        <button class="modal-close-btn" id="modalClose">✕</button>
        <video class="modal-video" id="modalVideo" controls playsinline></video>
    </div>
</div>

<!-- ================================================================
     GESTURE HINT + TOAST
     ================================================================ -->
<div class="gesture-hint" id="gestureHint">SWIPE TO DISMISS</div>
<div class="toast" id="toast"></div>

<!-- ================================================================
     JAVASCRIPT
     ================================================================ -->
<script>
/* =====================================================================
   CONFIGURATION
   ===================================================================== */
const CONFIG = {
    restaurant: {
        name:      "CULINARY AR",
        tagline:   "Discover Culinary Masterpieces",
        subtitle:  "CINEMA-GRADE DINING EXPERIENCE",
        heroImage: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800&q=80",

const $  = (id) => document.getElementById(id);

const showToast = (msg, dur = 3000) => {
    const el = $('toast');
    el.innerText = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);

const t = (key) =>
    CONFIG.i18n[STATE.currentLanguage]?.[key] ??

const trackEvent = (name, data = {}) => {

        fetch(CONFIG.api.analyticsUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event: name, ...data })

    }
};

/* =====================================================================
   ★★★ REFACTOR 1: THREE.JS PARALLAX DEPTH SYSTEM ★★★
   Mirrors the <a-entity id="ar-dish-container"> spec:
     • arDishContainer  (THREE.Group)  ← interactive root
       ├─ glowMesh  (PlaneGeometry)    ← z = -0.15, scale 1.5×, slow rotation
       └─ dishMesh  (PlaneGeometry)    ← z = 0, scale 1×, foreground
   The container also responds to device gyro / mouse for depth parallax.
   ===================================================================== */
let parallaxCtx = null;   // holds renderer + meshes + clock

function buildGlowTexture() {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 512;
    const ctx = cv.getContext('2d');

    // Outer golden radial halo
    const halo = ctx.createRadialGradient(256,256, 0, 256,256, 256);
    halo.addColorStop(0,   'rgba(212,175,55,0.80)');
    halo.addColorStop(0.35,'rgba(212,130,30,0.45)');
    halo.addColorStop(0.65,'rgba(180, 90,10,0.15)');
    halo.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, 512, 512);

    // Steam wisps
    for (let i = 0; i < 6; i++) {
        const wx = 170 + Math.random() * 172;
        const wy =  90 + Math.random() * 240;
        const r  =  28 + Math.random() * 38;
        const wisp = ctx.createRadialGradient(wx, wy, 0, wx, wy, r);
        wisp.addColorStop(0, 'rgba(255,255,255,0.18)');
        wisp.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = wisp;
        ctx.fillRect(0, 0, 512, 512);
    }
    return new THREE.CanvasTexture(cv);
}

function initParallaxScene(dish) {
    const canvas   = $('parallax-canvas');
    const W        = window.innerWidth;
    const H        = window.innerHeight;

    // Renderer — transparent so camera video shows through
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);   // fully transparent bg

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, W / H, 0.01, 100);
    camera.position.z = 2.2;

    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';

    // ── ★ ar-dish-container (THREE.Group) ──────────────────
    const arDishContainer = new THREE.Group();
    scene.add(arDishContainer);

    // ── ★ Background glow/steam layer  (z = -0.15, scale 1.5) ──
    const glowMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(1.5 * 1.5, 1.5 * 1.5),   // 1.5× scale built into geometry
        new THREE.MeshBasicMaterial({
            map: buildGlowTexture(),
            transparent: true,
            opacity: 0.72,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        })
    );
    glowMesh.position.z = -0.15;   // behind dish
    glowMesh.name = 'ar-glow-layer';
    arDishContainer.add(glowMesh);

    // ── ★ Foreground dish layer  (z = 0) ───────────────────
    const dishPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(1.6, 1.6),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
    );
    dishPlane.position.z = 0;      // front
    dishPlane.name = 'ar-dish-layer';
    arDishContainer.add(dishPlane);

    // Load dish texture
    loader.load(
        dish.image,
        (tex) => {
            tex.minFilter = THREE.LinearFilter;
            dishPlane.material.map     = tex;
            dishPlane.material.opacity = 1;
            dishPlane.material.needsUpdate = true;
        },
        undefined,
        () => { dishPlane.material.opacity = 0.85; } // fallback on error
    );

    // ── Raycaster for click / tap ───────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer   = new THREE.Vector2();

    function onPointerDown(e) {
        const src = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        pointer.x =  ((src.clientX - rect.left) / rect.width)  * 2 - 1;
        pointer.y = -((src.clientY - rect.top)  / rect.height) * 2 + 1;

        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects([dishPlane, glowMesh]);
        if (hits.length > 0) openSideBlade(dish);
    }

    // We attach events to the invisible overlay so the canvas stays
    // pointer-events:none (avoids blocking the video / gestures)
    const overlay = $('ar-click-overlay');
    overlay.addEventListener('click',      onPointerDown);
    overlay.addEventListener('touchstart', onPointerDown, { passive: true });

    // ── Mouse / gyro parallax ──────────────────────────────
    let targetRotX = 0, targetRotY = 0;
    let currentRotX = 0, currentRotY = 0;

    window.addEventListener('mousemove', (e) => {
        targetRotY = ((e.clientX / W) - 0.5) * 0.35;
        targetRotX = ((e.clientY / H) - 0.5) * -0.25;
    });

    window.addEventListener('deviceorientation', (e) => {
        if (e.gamma != null) targetRotY =  (e.gamma / 60) *  0.3;
        if (e.beta  != null) targetRotX = ((e.beta  - 45) / 45) * -0.2;
    });

    // ── Animation loop ─────────────────────────────────────
    const clock = new THREE.Clock();
    let   rafId = null;

    function animate() {
        rafId = requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // ★ Slow continuous rotation (35 s / revolution) on glow layer
        glowMesh.rotation.z = elapsed * (Math.PI * 2 / 35);

        // ★ Smooth parallax lerp on container
        const lerp = 0.04;
        currentRotX += (targetRotX - currentRotX) * lerp;
        currentRotY += (targetRotY - currentRotY) * lerp;
        arDishContainer.rotation.x = currentRotX;
        arDishContainer.rotation.y = currentRotY;

        renderer.render(scene, camera);
    }

    animate();

    // Resize handler
    const onResize = () => {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);

    // Store cleanup reference
    parallaxCtx = { renderer, scene, camera, arDishContainer, glowMesh, dishPlane, rafId, onResize, overlay, onPointerDown };
    return parallaxCtx;
}

function destroyParallaxScene() {
    if (!parallaxCtx) return;
    cancelAnimationFrame(parallaxCtx.rafId);
    window.removeEventListener('resize', parallaxCtx.onResize);
    parallaxCtx.overlay.removeEventListener('click',      parallaxCtx.onPointerDown);
    parallaxCtx.overlay.removeEventListener('touchstart', parallaxCtx.onPointerDown);
    parallaxCtx.renderer.dispose();
    parallaxCtx = null;
}

function switchParallaxDish(dish) {
    // Hot-swap the dish texture without rebuilding the whole scene
    if (!parallaxCtx) return;
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    loader.load(dish.image, (tex) => {
        tex.minFilter = THREE.LinearFilter;
        parallaxCtx.dishPlane.material.map     = tex;
        parallaxCtx.dishPlane.material.opacity = 1;
        parallaxCtx.dishPlane.material.needsUpdate = true;
    });
}

/* =====================================================================
   ★★★ REFACTOR 3 (JS BRIDGE): openSideBlade / closeSideBlade ★★★
   Clicking #ar-dish-container (via overlay) adds .active to
   #luxurySideBlade → triggers all motion-element stagger animations.
   ===================================================================== */
function openSideBlade(dish) {
    STATE.currentDish  = dish;
    STATE.bladeVisible = true;

    // ─ Populate data-i18n nodes ─────────────────────────────
    $('bladeTitle').innerText        = dish.name;
    $('bladeCategory').innerText     = dish.category;
    $('bladePrice').innerText        = dish.price;
    $('bladeIngredients').innerText  = dish.ingredients.join(', ') + '.';
    $('bladeStars').innerText        = '★'.repeat(Math.round(dish.rating));

    const rateLabel = t('rate_google');
    $('bladeRateLabel').innerText    = rateLabel;
    $('bladePriceLabel').innerText   = t('price_label');
    $('bladeIngredientsLabel').innerText = t('ingredients_label');
    $('watchVideoLabel').innerText   = t('watch_video');
    $('gestureHint').innerText       = t('swipe');

    // Google Maps link
    $('googleRatingLink').href = CONFIG.restaurant.googleMapsUrl;

    // Allergen
    if (dish.allergens) {
        $('allergenNote').style.display = 'block';
        $('bladeAllergen').innerText = dish.allergens;
    } else {
        $('allergenNote').style.display = 'none';
    }

    // ★★★ JS Bridge: add .active → triggers CSS motion-elements ★★★
    $('luxurySideBlade').classList.add('active');
    $('hudStatus').innerText = t('locked');

    // Touch-swipe to dismiss
    STATE.touchStartX = 0;
    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchend',   onTouchEnd,   { passive: true });

    trackEvent('dish_detected', { dish: dish.name });
    showToast(`${t('identified')}: ${dish.name}`);
}

function closeSideBlade() {
    STATE.bladeVisible = false;
    STATE.currentDish  = null;

    $('luxurySideBlade').classList.remove('active');
    $('hudStatus').innerText = t('tracking');

    document.removeEventListener('touchstart', onTouchStart);
    document.removeEventListener('touchend',   onTouchEnd);
    trackEvent('dish_dismissed');
}

function onTouchStart(e) { if (STATE.bladeVisible) STATE.touchStartX = e.touches[0].clientX; }
function onTouchEnd(e) {
    if (!STATE.bladeVisible) return;
    const diff = STATE.touchStartX - e.changedTouches[0].clientX;
    if (diff > 90) closeSideBlade();
}

/* =====================================================================
   LANGUAGE UPDATE
   ===================================================================== */
function updateLanguage() {
    $('heroBrand').innerText   = t('brand');
    $('heroTagline').innerText = t('tagline');
    $('heroSubtitle').innerText= t('subtitle');
    $('gestureHint').innerText = t('swipe');
    document.documentElement.lang = STATE.currentLanguage;
    document.documentElement.dir  = STATE.currentLanguage === 'ar' ? 'rtl' : 'ltr';

    if (STATE.bladeVisible && STATE.currentDish) {
        $('bladeRateLabel').innerText        = t('rate_google');
        $('bladePriceLabel').innerText       = t('price_label');
        $('bladeIngredientsLabel').innerText = t('ingredients_label');
        $('watchVideoLabel').innerText       = t('watch_video');
    }
}

/* =====================================================================
   CAMERA
   ===================================================================== */
function initCamera() {
    const video = $('video-fallback');
    if (!navigator.mediaDevices?.getUserMedia) return;
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
    })
    .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => video.play().catch(() => {});
    })
    .catch(err => console.warn('Camera error:', err));
}

/* =====================================================================
   AR DEMO CYCLE (rotates through menu items automatically)
   ===================================================================== */
function startDemoCycle() {
    let cycleIndex = 0;
    const dishes = CONFIG.menu;

    // Show first dish immediately on the parallax canvas
    switchParallaxDish(dishes[0]);
    $('hudStatus').innerText = t('tracking');

    const interval = setInterval(() => {
        if (!STATE.cameraActive) { clearInterval(interval); return; }
        if (STATE.bladeVisible)  return;   // don't interrupt open blade

        const dish = dishes[cycleIndex % dishes.length];
        switchParallaxDish(dish);

        if (STATE.deviceTiltOK) {
            openSideBlade(dish);
            setTimeout(() => { closeSideBlade(); cycleIndex++; }, 5500);
        } else {
            cycleIndex++;
        }
    }, 9000);
}

/* =====================================================================
   START AR EXPERIENCE
   ===================================================================== */
function startARExperience() {
    STATE.appStarted  = true;
    STATE.cameraActive = true;

    // Show layers
    $('video-fallback').classList.add('active');
    $('parallax-canvas').classList.add('active');
    $('ar-click-overlay').classList.add('active');
    $('hudStatusBar').classList.add('active');

    // Gyro permission (iOS 13+)
    if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(p => { if (p === 'granted') window.addEventListener('deviceorientation', onOrientation); })
            .catch(() => {});
    } else {
        window.addEventListener('deviceorientation', onOrientation);
    }

    initCamera();

    // Build parallax scene with first menu item as initial content
    initParallaxScene(CONFIG.menu[0]);
    startDemoCycle();

    trackEvent('ar_started');
    showToast('AR ENGINE ACTIVE — TAP THE DISH');
}

function onOrientation(e) {
    const tilt = Math.abs(e.beta || 0);
    STATE.deviceTiltOK =
        tilt >= CONFIG.arTracking.tiltMinDegrees &&
        tilt <= CONFIG.arTracking.tiltMaxDegrees;
}

/* =====================================================================
   LAUNCH SCREEN INIT
   ===================================================================== */
function initLaunchScreen() {
    $('heroBrand').innerText    = t('brand');
    $('heroTagline').innerText  = t('tagline');
    $('heroSubtitle').innerText = t('subtitle');
    $('hudBrand').innerText     = CONFIG.restaurant.name.substring(0, 2).toUpperCase();

    $('heroBackdrop').style.backgroundImage = `url('${CONFIG.restaurant.heroImage}')`;
    $('portalInner').style.backgroundImage  = `url('${CONFIG.restaurant.portalImage}')`;

    $('portalButton').addEventListener('click', () => {
        trackEvent('portal_clicked');
        $('launchScreen').classList.add('hidden');
        setTimeout(startARExperience, 220);
    });

    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            STATE.currentLanguage = opt.dataset.lang;
            updateLanguage();
            trackEvent('language_changed', { lang: STATE.currentLanguage });
        });
    });
}

/* =====================================================================
   EVENT LISTENERS
   ===================================================================== */
$('bladeClose').addEventListener('click', closeSideBlade);

$('openVideoBtn').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const modal = $('videoModal');
    const vid   = $('modalVideo');
    vid.src = STATE.currentDish.videoUrl;
    modal.classList.add('open');
    vid.play().catch(() => {});
    trackEvent('video_opened', { dish: STATE.currentDish.name });
});

$('modalClose').addEventListener('click', () => {
    $('videoModal').classList.remove('open');
    $('modalVideo').pause();
    $('modalVideo').src = '';
});

$('shareInstagram').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const text = `Check out ${STATE.currentDish.name} at AR Gastronomy!`;
    window.open(`https://www.instagram.com/?caption=${encodeURIComponent(text)}`, '_blank');
    trackEvent('shared', { platform: 'instagram', dish: STATE.currentDish.name });
});

$('shareWhatsapp').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    window.open(`https://wa.me/?text=${encodeURIComponent(STATE.currentDish.name + ' — ' + window.location.href)}`, '_blank');
    trackEvent('shared', { platform: 'whatsapp', dish: STATE.currentDish.name });
});

$('shareEmail').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    window.open(`mailto:?subject=${encodeURIComponent('Discover ' + STATE.currentDish.name)}&body=${encodeURIComponent(window.location.href)}`, '_blank');
    trackEvent('shared', { platform: 'email', dish: STATE.currentDish.name });
});

$('btnInfo').addEventListener('click', () => showToast(`📍 ${CONFIG.restaurant.location}  📞 ${CONFIG.restaurant.phone}`));
$('btnMenu').addEventListener('click', () => showToast('FULL MENU — Coming Soon'));

/* =====================================================================
   KEYBOARD SHORTCUTS
   ===================================================================== */
window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && STATE.bladeVisible) closeSideBlade();
    if (e.key === ' ' && !STATE.appStarted) {
        $('launchScreen').classList.add('hidden');
        setTimeout(startARExperience, 220);
    }
    // Dev shortcut: press 1/2/3 to trigger specific dishes
    if (['1','2','3'].includes(e.key) && STATE.appStarted) {
        const dish = CONFIG.menu[parseInt(e.key) - 1];
        if (dish) { switchParallaxDish(dish); openSideBlade(dish); }
    }
});

/* =====================================================================
   BOOT
   ===================================================================== */
window.addEventListener('DOMContentLoaded', async () => {
    // Optionally fetch live menu
    if (CONFIG.api.menuUrl) {
        try {
            const res = await fetch(CONFIG.api.menuUrl);
            CONFIG.menu = await res.json();
        } catch { /* fall through to defaults */ }
    }
    initLaunchScreen();
    trackEvent('app_loaded', { language: STATE.currentLanguage });
    showToast('WELCOME TO AR GASTRONOMY');
});
</script>
