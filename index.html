<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>UMAMI PRIME | AR Gastronomy Portal</title>

  <!-- Typefaces -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- Tesseract.js v4 -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    :root {
      --gold: #d4af37;
      --gold-pale: #e8d48a;
      --gold-dim: rgba(212,175,55,0.10);
      --gold-mid: rgba(212,175,55,0.22);
      --ink: #050505;
      --surface: rgba(5,5,5,0.97);
      --white: #f5f0e8;
      --text-hi: #f5f0e8;
      --text-lo: rgba(245,240,232,0.45);
      --text-mid: rgba(245,240,232,0.70);
      --success: #4db87a;
      --danger: #e05a5a;
      --border-hair: rgba(212,175,55,0.18);
      
      --s1: 5px; --s2: 8px; --s3: 13px; --s4: 21px; --s5: 34px; --s6: 55px; --s7: 89px;
      --t-2xs: 9px; --t-xs: 11px; --t-sm: 13px; --t-md: 16px; --t-lg: 21px; --t-xl: 34px; --t-2xl: 55px;
      --blade-w: calc(100vw / 1.618);
      
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --dur-blade: 0.78s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-hi);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══ DEBUG PANEL ═══ */
    #debugPanel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10000;
      background: rgba(0,0,0,0.95);
      border-top: 2px solid var(--gold);
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 10px;
    }
    #debugPanel .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid rgba(212,175,55,0.1);
      color: var(--text-mid);
    }
    #debugPanel .log-entry.error { color: var(--danger); font-weight: bold; }
    #debugPanel .log-entry.success { color: var(--success); }
    #debugPanel .log-entry.info { color: #4db8ff; }

    /* ═══ LAUNCH SCREEN ═══ */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--ink);
      transition: opacity 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .launch-bg {
      position: absolute; inset: -8%;
      background-size: cover; background-position: center;
      filter: blur(14px) brightness(0.4);
      z-index: 0;
    }
    .launch-scrim {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 60%, rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%);
      z-index: 1;
    }
    .launch-body {
      position: relative; z-index: 10;
      text-align: center; padding: var(--s5);
    }

    .launch-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      letter-spacing: 14px; color: var(--gold);
      text-transform: uppercase;
    }
    .launch-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--white); letter-spacing: 2px;
      margin-top: var(--s3);
    }

    .portal-ring {
      position: relative; margin: var(--s5) auto 0;
      width: 190px; height: 190px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-mid);
      cursor: pointer;
      box-shadow: 0 0 80px rgba(212,175,55,0.15);
    }
    .portal-img {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
    }
    .portal-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
    }
    .portal-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }

    /* ═══ AR STACK ═══ */
    #videoFeed {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #videoFeed.on { display: block; }

    #parallaxCanvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      display: none; pointer-events: none;
    }
    #parallaxCanvas.on { display: block; }

    #arOverlay {
      position: fixed; inset: 0; z-index: 4;
      display: none; cursor: crosshair;
    }
    #arOverlay.on { display: block; }

    /* ═══ HUD ═══ */
    #hudBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      padding: var(--s4) var(--s5);
      display: none; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
    }
    #hudBar.on { display: flex; }
    
    .hud-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-sm); font-weight: 600;
      letter-spacing: 4px; color: var(--gold);
    }

    #ocrPill {
      display: flex; align-items: center; gap: var(--s2);
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 20px;
      font-size: var(--t-2xs);
      color: var(--text-lo);
    }
    #ocrPill[data-status="ready"] { border-color: var(--success); color: var(--success); }
    #ocrPill[data-status="scanning"] { border-color: var(--gold); color: var(--gold); }
    #ocrPill[data-status="locked"] { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    #ocrPill[data-status="error"] { border-color: var(--danger); color: var(--danger); }

    .ocr-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ═══ SIDE BLADE ═══ */
    #sideBlade {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: var(--blade-w); max-width: 100%; z-index: 100;
      background: var(--surface);
      border-left: 1px solid var(--border-hair);
      box-shadow: -20px 0 80px rgba(0,0,0,0.6);
      overflow-y: auto;
      padding: var(--s7) var(--s5) var(--s6);
      transform: translateX(105%);
      transition: transform var(--dur-blade) var(--ease-out-expo);
    }
    #sideBlade.active { transform: translateX(0); }

    .blade-x {
      position: absolute; top: var(--s4); right: var(--s4);
      width: 34px; height: 34px;
      background: transparent; border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      color: var(--text-lo); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    .motion-element {
      opacity: 0; transform: translateY(26px);
      transition: all 0.6s var(--ease-out-expo);
    }
    #sideBlade.active .motion-element {
      opacity: 1; transform: translateY(0);
    }
    .delay-1 { transition-delay: 0.10s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.34s; }
    .delay-4 { transition-delay: 0.46s; }

    .blade-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700; color: var(--white);
    }
    .blade-category {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase;
    }

    .blade-block { 
      margin-top: var(--s5); 
      padding-top: var(--s4); 
      border-top: 1px solid var(--border-hair); 
    }
    
    .price-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-2xl); font-weight: 300; font-style: italic;
      color: var(--gold);
    }
    
    .ingredients-prose {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--text-mid); line-height: 1.6;
    }

    .video-cta {
      width: 100%; padding: var(--s3) var(--s4);
      background: var(--gold); border: none; border-radius: 6px;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      color: var(--ink); cursor: pointer;
    }

    /* ═══ OCR VIEWFINDER ═══ */
    #ocrViewfinder {
      position: fixed; inset: 0; z-index: 5;
      pointer-events: none; display: none;
    }
    #ocrViewfinder.on { display: block; }
    #ocrViewfinder.scanning { opacity: 1; }
    
    .ocr-scanline {
      position: absolute; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--success), var(--gold), var(--success), transparent);
      animation: scanSweep 2.5s linear infinite;
    }
    @keyframes scanSweep {
      0% { top: 20%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 80%; opacity: 0; }
    }

    .ocr-corner {
      position: absolute; width: 40px; height: 40px;
      border-color: var(--gold); border-style: solid; opacity: 0.6;
    }
    .ocr-corner.tl { top: 20%; left: 10%; border-width: 3px 0 0 3px; }
    .ocr-corner.tr { top: 20%; right: 10%; border-width: 3px 3px 0 0; }
    .ocr-corner.bl { bottom: 20%; left: 10%; border-width: 0 0 3px 3px; }
    .ocr-corner.br { bottom: 20%; right: 10%; border-width: 0 3px 3px 0; }

    /* ═══ TOAST ═══ */
    #toast {
      position: fixed; bottom: 220px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 9999;
      padding: var(--s3) var(--s5);
      background: rgba(5,5,5,0.95);
      border: 1px solid var(--gold);
      border-radius: 6px;
      font-size: var(--t-xs);
      color: var(--gold);
      transition: transform 0.45s var(--ease-out-expo);
      max-width: 90%;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
<base target="_blank">
</head>
<body>

<!-- ═══ DEBUG PANEL ═══ -->
<div id="debugPanel"></div>

<!-- ═══ LAUNCH SCREEN ═══ -->
<div id="launchScreen">
  <div class="launch-bg" id="launchBg"></div>
  <div class="launch-scrim"></div>
  <div class="launch-body">
    <h1 class="launch-wordmark">UMAMI PRIME</h1>
    <p class="launch-tagline">The Fifth Dimension of Taste</p>
    <button class="portal-ring" id="portalBtn">
      <div class="portal-img" id="portalImg"></div>
      <div class="portal-scrim"></div>
      <div class="portal-icon">🍱</div>
    </button>
  </div>
</div>

<!-- ═══ AR STACK ═══ -->
<video id="videoFeed" playsinline autoplay muted></video>
<canvas id="parallaxCanvas"></canvas>
<div id="arOverlay"></div>

<!-- ═══ OCR VIEWFINDER ═══ -->
<div id="ocrViewfinder">
  <div class="ocr-scanline"></div>
  <div class="ocr-corner tl"></div>
  <div class="ocr-corner tr"></div>
  <div class="ocr-corner bl"></div>
  <div class="ocr-corner br"></div>
</div>

<!-- ═══ HUD ═══ -->
<div id="hudBar">
  <span class="hud-name">UP</span>
  <div id="ocrPill" data-status="init">
    <div class="ocr-dot"></div>
    <span id="ocrStatus">INIT OCR</span>
  </div>
  <div style="color: var(--text-lo); font-size: 10px;">
    <span id="hudStatus">READY</span>
  </div>
</div>

<!-- ═══ SIDE BLADE ═══ -->
<aside id="sideBlade">
  <button class="blade-x" id="bladeClose">✕</button>
  
  <div class="motion-element delay-1">
    <h2 class="blade-title" id="bladeTitle">—</h2>
    <span class="blade-category" id="bladeCategory">—</span>
  </div>

  <div class="blade-block motion-element delay-2">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="color: var(--gold); font-size: 20px;">★★★★★</span>
      <div>
        <div style="color: var(--white); font-size: 18px; font-weight: 600;" id="bladeScore">4.9</div>
        <div style="font-size: 10px; color: var(--text-lo);">Google Maps</div>
      </div>
    </div>
  </div>

  <div class="blade-block motion-element delay-3">
    <span class="price-amount" id="bladePrice">—</span>
    <span style="font-size: 11px; color: var(--text-lo); letter-spacing: 2px; display: block; margin-top: 5px;">PER PERSON</span>
  </div>

  <div class="blade-block motion-element delay-4">
    <p style="font-size: 11px; color: var(--text-lo); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;">Components</p>
    <p class="ingredients-prose" id="bladeIngText">—</p>
  </div>

  <div class="blade-block motion-element delay-5">
    <button class="video-cta" id="videoCta">WATCH PREPARATION</button>
  </div>
</aside>

<div id="toast"></div>

<script>
/* ═════════════════════════════════════════════════════════════
   CONFIGURATION
═════════════════════════════════════════════════════════════ */
const CONFIG = {
  restaurant: {
    name: 'UMAMI PRIME',
    heroImage: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=1200&q=85',
    portalImage: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&q=85'
  },
  menu: [
    {
      id: 1,
      name: 'Miso-Cured Bluefin',
      category: 'Umami Foundation',
      price: '$95',
      ingredients: ['Hokkaido Bluefin Tuna', 'Sendai Red Miso', 'Sake Lees'],
      image: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&q=85',
      videoUrl: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/ElephantsDream.mp4',
      rating: 4.9
    },
    {
      id: 2,
      name: 'Sake-Steamed Scallop',
      category: 'Precision Heat',
      price: '$78',
      ingredients: ['Hokkaido Scallop', 'Daiginjo Sake', 'Black Garlic'],
      image: 'https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=600&q=85',
      videoUrl: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/ForBiggerBlazes.mp4',
      rating: 4.8
    },
    {
      id: 3,
      name: 'Miso Caramel Sphere',
      category: 'Molecular Finale',
      price: '$52',
      ingredients: ['White Miso', 'Matcha Powder', 'Sesame Tuile'],
      image: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600&q=85',
      videoUrl: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4',
      rating: 4.7
    }
  ]
};

const STATE = {
  started: false,
  bladeOpen: false,
  currentDish: null,
  ocrReady: false
};

/* ═════════════════════════════════════════════════════════════
   DEBUG SYSTEM
═════════════════════════════════════════════════════════════ */
const Debug = {
  panel: document.getElementById('debugPanel'),
  
  log(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    const time = new Date().toLocaleTimeString();
    entry.textContent = `[${time}] ${msg}`;
    this.panel.appendChild(entry);
    this.panel.scrollTop = this.panel.scrollHeight;
    console.log(`[${type.toUpperCase()}] ${msg}`);
  }
};

const el = (id) => document.getElementById(id);

function toast(msg, duration = 3000) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ═════════════════════════════════════════════════════════════
   THREE.JS PARALLAX
═════════════════════════════════════════════════════════════ */
let parallaxCtx = null;

function initParallax() {
  const canvas = el('parallaxCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.01, 100);
  camera.position.z = 2.4;

  const group = new THREE.Group();
  scene.add(group);

  // Glow
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(2.4, 2.4),
    new THREE.MeshBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.3 })
  );
  glow.position.z = -0.2;
  group.add(glow);

  // Dish
  const dishMat = new THREE.MeshBasicMaterial({ transparent: true });
  const dish = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.6), dishMat);
  group.add(dish);

  // Raycaster
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  el('arOverlay').addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    if (raycaster.intersectObject(dish).length > 0 && STATE.currentDish) {
      openBlade(STATE.currentDish);
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    glow.rotation.z += 0.002;
    renderer.render(scene, camera);
  }
  animate();

  return { renderer, dishMat };
}

function switchDish(dish) {
  STATE.currentDish = dish;
  if (!parallaxCtx) return;
  
  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  loader.load(dish.image, (tex) => {
    parallaxCtx.dishMat.map = tex;
    parallaxCtx.dishMat.needsUpdate = true;
  });
}

/* ═════════════════════════════════════════════════════════════
   SIDE BLADE
═════════════════════════════════════════════════════════════ */
function openBlade(dish) {
  if (!dish || STATE.bladeOpen) return;
  STATE.bladeOpen = true;
  
  el('bladeTitle').textContent = dish.name;
  el('bladeCategory').textContent = dish.category;
  el('bladePrice').textContent = dish.price;
  el('bladeScore').textContent = dish.rating;
  el('bladeIngText').textContent = dish.ingredients.join(' · ');
  
  el('sideBlade').classList.add('active');
  el('ocrPill').dataset.status = 'locked';
  el('ocrStatus').textContent = 'DISH FOUND';
  
  toast(`✓ IDENTIFIED: ${dish.name}`);
  Debug.log(`Blade opened: ${dish.name}`, 'success');
}

function closeBlade() {
  STATE.bladeOpen = false;
  el('sideBlade').classList.remove('active');
  el('ocrPill').dataset.status = 'ready';
  el('ocrStatus').textContent = 'OCR READY';
  Debug.log('Blade closed', 'info');
}

el('bladeClose').addEventListener('click', closeBlade);

/* ═════════════════════════════════════════════════════════════
   TESSERACT OCR — FIXED WITH EXPLICIT CDN PATHS
═════════════════════════════════════════════════════════════ */
let tesseractWorker = null;
let ocrInterval = null;

async function initOCR() {
  Debug.log('Starting OCR initialization...', 'info');
  el('ocrStatus').textContent = 'LOADING...';
  
  try {
    // CRITICAL FIX: Explicit CDN paths for GitHub Pages compatibility
    Debug.log('Creating worker with explicit CDN paths...', 'info');
    
    tesseractWorker = await Tesseract.createWorker({
      langPath: 'https://tessdata.projectnaptha.com/4.0.0',
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@v4.0.2/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@v4.0.1/tesseract-core.wasm.js',
      logger: m => {
        Debug.log(`Tesseract: ${m.status} (${Math.round(m.progress * 100)}%)`, 'info');
      }
    });

    Debug.log('Worker created, loading languages...', 'info');
    
    // Initialize languages
    await tesseractWorker.loadLanguage('eng+ara');
    Debug.log('Languages loaded', 'success');
    
    await tesseractWorker.initialize('eng+ara');
    Debug.log('Worker initialized successfully', 'success');
    
    STATE.ocrReady = true;
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent = 'OCR READY';
    
    // Show viewfinder
    el('ocrViewfinder').classList.add('on');
    Debug.log('OCR System Ready', 'success');
    
  } catch (err) {
    Debug.log(`OCR Init Error: ${err.message || err}`, 'error');
    console.error('Tesseract Error:', err);
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent = 'ERROR';
    toast('OCR Failed - Check Debug Log');
  }
}

async function runOCRScan() {
  if (!STATE.ocrReady || !STATE.started || STATE.bladeOpen) return;
  
  const video = document.querySelector('video');
  if (!video || !video.srcObject || video.readyState < 2) {
    return;
  }

  try {
    el('ocrPill').dataset.status = 'scanning';
    el('ocrStatus').textContent = 'SCANNING...';
    Debug.log('Starting OCR scan...', 'info');
    
    // Capture frame
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    Debug.log(`Frame captured: ${canvas.width}x${canvas.height}`, 'info');
    
    const result = await tesseractWorker.recognize(canvas);
    const text = result.data.text;
    const confidence = result.data.confidence;
    
    Debug.log(`OCR Result: "${text.substring(0, 40)}..." (conf: ${confidence})`, 'info');
    
    if (confidence > 30 && text.length > 3) {
      checkTextAgainstMenu(text);
    } else {
      el('ocrPill').dataset.status = 'ready';
      el('ocrStatus').textContent = 'OCR READY';
    }
    
  } catch (err) {
    Debug.log(`Scan Error: ${err.message || err}`, 'error');
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent = 'ERROR';
  }
}

function checkTextAgainstMenu(text) {
  const normalized = text.toLowerCase();
  Debug.log(`Checking text: ${normalized.substring(0, 50)}...`, 'info');
  
  for (const dish of CONFIG.menu) {
    const dishName = dish.name.toLowerCase();
    const keywords = dishName.split(' ');
    
    for (const keyword of keywords) {
      if (keyword.length > 3 && normalized.includes(keyword)) {
        Debug.log(`MATCH FOUND: ${dish.name} (keyword: ${keyword})`, 'success');
        switchDish(dish);
        openBlade(dish);
        return;
      }
    }
  }
  
  el('ocrPill').dataset.status = 'ready';
  el('ocrStatus').textContent = 'OCR READY';
}

function startOCRLoop() {
  if (ocrInterval) clearInterval(ocrInterval);
  ocrInterval = setInterval(runOCRScan, 3000);
  Debug.log('OCR loop started (3s interval)', 'success');
}

/* ═════════════════════════════════════════════════════════════
   AR INITIALIZATION
═════════════════════════════════════════════════════════════ */
function initAR() {
  Debug.log('Initializing AR...', 'info');
  
  document.body.dataset.ocrStatus = 'ready';
  el('launchScreen').classList.add('hidden');
  el('videoFeed').classList.add('on');
  el('parallaxCanvas').classList.add('on');
  el('arOverlay').classList.add('on');
  el('hudBar').classList.add('on');
  
  // Start camera
  navigator.mediaDevices?.getUserMedia({ 
    video: { facingMode: 'environment' }, 
    audio: false 
  }).then(stream => {
    const video = el('videoFeed');
    video.srcObject = stream;
    Debug.log('Camera access granted', 'success');
    
    parallaxCtx = initParallax();
    switchDish(CONFIG.menu[0]);
    
    video.onloadedmetadata = () => {
      Debug.log('Video metadata loaded, starting OCR...', 'info');
      initOCR().then(() => {
        if (STATE.ocrReady) {
          startOCRLoop();
        }
      });
    };
    
  }).catch(err => {
    Debug.log(`Camera error: ${err.message}`, 'error');
    toast('Camera access required');
  });
}

el('portalBtn').addEventListener('click', initAR);

/* ═════════════════════════════════════════════════════════════
   EVENT HANDLERS
═════════════════════════════════════════════════════════════ */
el('videoCta').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  
  // Create modal dynamically
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="position:relative;width:100%;max-width:600px;">
      <button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:-40px;right:0;background:transparent;border:none;color:#d4af37;font-size:24px;cursor:pointer;">✕</button>
      <video src="${STATE.currentDish.videoUrl}" controls autoplay style="width:100%;border-radius:8px;"></video>
    </div>
  `;
  document.body.appendChild(modal);
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBlade();
  if (e.key === ' ' && !STATE.started) initAR();
});

/* ═════════════════════════════════════════════════════════════
   BOOT
═════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  Debug.log('App loaded, waiting for user...', 'info');
  el('launchBg').style.backgroundImage = `url(${CONFIG.restaurant.heroImage})`;
  el('portalImg').style.backgroundImage = `url(${CONFIG.restaurant.portalImage})`;
});
</script>
