<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>AR Gastronomy | Premium Dining</title>

  <!-- Typefaces: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js (r128) from JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- Tesseract.js from JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS — Obsidian Atelier
       Gold-on-black luxury. Every size from the φ scale (×1.618).
    ═══════════════════════════════════════════════════════════════ */
    :root {
      /* Palette */
      --gold:          #d4af37;
      --gold-pale:     #e8d48a;
      --gold-dim:      rgba(212,175,55,0.10);
      --gold-mid:      rgba(212,175,55,0.22);
      --gold-glow:     rgba(212,175,55,0.55);
      --ink:           #050505;
      --ink-lift:      #0c0c0c;
      --surface:       rgba(5,5,5,0.97);
      --white:         #f5f0e8;
      --text-hi:       #f5f0e8;
      --text-lo:       rgba(245,240,232,0.45);
      --text-mid:      rgba(245,240,232,0.70);
      --success:       #4db87a;
      --danger:        #e05a5a;
      --border-hair:   rgba(212,175,55,0.18);
      --border-mid:    rgba(212,175,55,0.30);

      /* φ Spacing */
      --s1:  5px;   --s2:  8px;   --s3: 13px;
      --s4: 21px;   --s5: 34px;   --s6: 55px;  --s7: 89px;

      /* φ Type scale */
      --t-2xs: 9px;  --t-xs: 11px; --t-sm: 13px;
      --t-md:  16px; --t-lg: 21px; --t-xl: 34px;
      --t-2xl: 55px; --t-3xl: 89px;

      /* Golden-ratio blade width */
      --blade-w: calc(100vw / 1.618);

      /* Easing library */
      --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out:     cubic-bezier(0.65, 0, 0.35, 1);

      /* Durations */
      --dur-blade: 0.78s;
      --dur-block: 0.60s;
    }

    /* ─── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-hi);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Grain overlay ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
      opacity: 0.55;
    }

    /* ═══════════════════════════════════════════════════════════════
       ██████╗ ██╗ █████╗  ██████╗ ███╗   ██╗ ██████╗ ███████╗████████╗██╗ ██████╗
       ██╔══██╗██║██╔══██╗██╔════╝ ████╗  ██║██╔═══██╗██╔════╝╚══██╔══╝██║██╔════╝
       ██║  ██║██║███████║██║  ███╗██╔██╗ ██║██║   ██║███████╗   ██║   ██║██║
       ██║  ██║██║██╔══██║██║   ██║██║╚██╗██║██║   ██║╚════██║   ██║   ██║██║
       ██████╔╝██║██║  ██║╚██████╔╝██║ ╚████║╚██████╔╝███████║   ██║   ██║╚██████╗
       ╚═════╝ ╚═╝╚═╝  ╚═╝ ╚═════╝ ╚═╝  ╚═══╝ ╚═════╝ ╚══════╝   ╚═╝   ╚═╝ ╚═════╝
       ON-SCREEN DIAGNOSTIC CONSOLE — z-index 99999, bottom 30%
    ═══════════════════════════════════════════════════════════════ */
    #diagConsole {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30vh;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.82);
      border-top: 1px solid rgba(212, 175, 55, 0.35);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      /* Ensure it floats above everything including grain overlay */
    }

    #diagConsoleHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: rgba(212,175,55,0.10);
      border-bottom: 1px solid rgba(212,175,55,0.20);
      flex-shrink: 0;
    }

    #diagConsoleTitle {
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #d4af37;
      text-transform: uppercase;
    }

    #diagConsoleBtns {
      display: flex;
      gap: 6px;
    }

    .diag-btn {
      font-size: 9px;
      padding: 2px 7px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.30);
      border-radius: 3px;
      color: #d4af37;
      cursor: pointer;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .diag-btn:active { background: rgba(212,175,55,0.30); }

    #diagLog {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      -webkit-overflow-scrolling: touch;
    }

    .diag-line {
      font-size: 10px;
      line-height: 1.5;
      padding: 1px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .diag-line.log   { color: #c8e6c9; }
    .diag-line.warn  { color: #ffe082; }
    .diag-line.error { color: #ef9a9a; font-weight: bold; }
    .diag-line.crit  { color: #ff5252; font-weight: bold; background: rgba(255,82,82,0.12); padding: 2px 4px; border-radius: 2px; }
    .diag-line.info  { color: #80deea; }

    /* ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
    ═══════════════════════════════════════════════════════════════ */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; background: var(--ink);
      transition: opacity 1s var(--ease-out-expo),
                  visibility 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .launch-bg {
      position: absolute; inset: -8%;
      background-size: cover; background-position: center;
      filter: blur(14px) brightness(0.4);
      z-index: 0; will-change: transform;
    }
    .launch-scrim {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 60%,
                  rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%);
      z-index: 1;
    }
    .launch-body {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--s5);
      text-align: center; padding: var(--s5);
    }

    .launch-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      letter-spacing: 14px; color: var(--gold);
      text-transform: uppercase;
      animation: riseIn 1.1s var(--ease-out-expo) both;
    }
    .launch-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--white); letter-spacing: 2px;
      animation: riseIn 1.2s var(--ease-out-expo) 0.1s both;
    }
    .launch-sub {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 5px; text-transform: uppercase;
      animation: riseIn 1.3s var(--ease-out-expo) 0.2s both;
    }

    .portal-ring {
      position: relative; margin-top: var(--s4);
      width: 190px; height: 190px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-mid); cursor: pointer;
      box-shadow: 0 0 0 1px rgba(212,175,55,0.08),
                  0 20px 60px rgba(0,0,0,0.7),
                  0 0 80px rgba(212,175,55,0.15);
      animation: portalBreath 3.5s ease-in-out infinite,
                 riseIn 1.4s var(--ease-out-expo) 0.3s both;
      transition: box-shadow 0.3s ease, transform 0.4s var(--ease-spring);
    }
    .portal-ring:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 0 1px var(--gold-mid),
                  0 30px 80px rgba(0,0,0,0.8),
                  0 0 120px rgba(212,175,55,0.3);
    }
    .portal-img {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
      transition: transform 0.6s var(--ease-out-expo);
    }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      transition: opacity 0.3s ease;
    }
    .portal-ring:hover .portal-scrim { opacity: 0; }
    .portal-icon {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    @keyframes portalBreath {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0  80px rgba(212,175,55,0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.7), 0 0 130px rgba(212,175,55,0.30); }
    }

    .hud-corner {
      position: absolute; z-index: 15;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s var(--ease-spring);
    }
    .hud-corner:hover {
      background: rgba(212,175,55,0.18);
      border-color: var(--gold-mid);
      transform: scale(1.12);
    }
    .hud-corner svg {
      width: 18px; height: 18px;
      stroke: var(--text-mid); stroke-width: 1.5;
      fill: none; transition: stroke 0.2s ease;
    }
    .hud-corner:hover svg { stroke: var(--gold); }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }

    .lang-pill {
      position: absolute; bottom: var(--s5); left: var(--s5); z-index: 20;
      display: flex; gap: var(--s3);
      background: rgba(0,0,0,0.40);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-hair);
      border-radius: 24px;
      padding: var(--s2) var(--s3);
    }
    .lang-opt {
      background: transparent; border: none;
      color: var(--text-lo); font-size: var(--t-xs); font-weight: 500;
      cursor: pointer; padding: 4px 10px; border-radius: 12px;
      transition: all 0.25s ease;
    }
    .lang-opt.active {
      background: var(--gold-dim);
      color: var(--gold);
    }
    .lang-opt:hover { color: var(--gold); }

    /* ─────────────────────────────────────────────────────────────────
       AR STACK — video, canvas, overlay
    ───────────────────────────────────────────────────────────────── */
    #videoFeed {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #videoFeed.on { display: block; }

    #parallaxCanvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      display: none; pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s var(--ease-out-expo);
    }
    #parallaxCanvas.on { display: block; }
    #parallaxCanvas.fade-in { opacity: 1; }

    #arOverlay {
      position: fixed; inset: 0; z-index: 4;
      display: none; cursor: crosshair;
    }
    #arOverlay.on { display: block; }

    /* ─────────────────────────────────────────────────────────────────
       OCR SCANNING ANIMATION
    ───────────────────────────────────────────────────────────────── */
    #ocrScanLine {
      position: fixed; left: 0; right: 0; z-index: 5;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--gold) 50%,
        transparent 100%);
      top: 50%;
      display: none;
      opacity: 0;
      animation: scanMove 1.2s ease-in-out infinite;
      pointer-events: none;
    }
    #ocrScanLine.scanning {
      display: block;
      opacity: 0.7;
    }
    @keyframes scanMove {
      0% { top: 20%; opacity: 0; }
      50% { opacity: 0.8; }
      100% { top: 80%; opacity: 0; }
    }

    /* ─────────────────────────────────────────────────────────────────
       HUD BAR
    ───────────────────────────────────────────────────────────────── */
    #hudBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      padding: var(--s4) var(--s5);
      display: none; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
      backdrop-filter: blur(10px);
    }
    #hudBar.on { display: flex; }

    .hud-left {
      display: flex; align-items: center; gap: var(--s4);
    }

    .hud-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-sm); font-weight: 600;
      letter-spacing: 4px; color: var(--gold);
    }

    .hud-status {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 2px; text-transform: uppercase;
    }

    #ocrPill {
      display: flex; align-items: center; gap: var(--s2);
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 20px;
      font-size: var(--t-2xs);
      color: var(--text-lo);
      transition: all 0.3s ease;
    }
    #ocrPill[data-status="ready"]    { border-color: var(--success); color: var(--success); }
    #ocrPill[data-status="scanning"] { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    #ocrPill[data-status="locked"]   { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    #ocrPill[data-status="error"]    { border-color: var(--danger); color: var(--danger); }

    .ocr-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ─────────────────────────────────────────────────────────────────
       SIDE BLADE
    ───────────────────────────────────────────────────────────────── */
    #sideBlade {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: var(--blade-w); max-width: 100%; z-index: 100;
      background: var(--surface);
      border-left: 1px solid var(--border-hair);
      box-shadow: -20px 0 80px rgba(0,0,0,0.6);
      overflow-y: auto;
      padding: var(--s7) var(--s5) var(--s6);
      transform: translateX(105%);
      transition: transform var(--dur-blade) var(--ease-out-expo);
    }
    #sideBlade.active { transform: translateX(0); }

    .blade-x {
      position: absolute; top: var(--s4); right: var(--s4);
      width: 34px; height: 34px;
      background: transparent; border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      color: var(--text-lo); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
    }
    .blade-x:hover { color: var(--gold); border-color: var(--gold); }

    .motion-element {
      opacity: 0; transform: translateY(26px);
      transition: all 0.6s var(--ease-out-expo);
    }
    #sideBlade.active .motion-element { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 0.10s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.34s; }
    .delay-4 { transition-delay: 0.46s; }

    .blade-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700; color: var(--white);
    }
    .blade-category {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase;
    }

    .blade-block {
      margin-top: var(--s5);
      padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .blade-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

    .blade-label {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: var(--s2);
    }

    .blade-value { font-size: var(--t-md); color: var(--text-hi); font-weight: 500; }

    .blade-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-2xl); font-weight: 700;
      color: var(--gold); margin-top: var(--s3);
    }

    .blade-ing-text {
      font-size: var(--t-sm); color: var(--text-mid);
      line-height: 1.6; margin-top: var(--s3);
    }

    .blade-cta {
      margin-top: var(--s5);
      padding: 12px 21px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-mid);
      color: var(--gold);
      font-size: var(--t-sm); font-weight: 500;
      border-radius: 8px; cursor: pointer;
      transition: all 0.25s ease; text-align: center;
    }
    .blade-cta:hover { background: var(--gold-mid); color: var(--ink); }

    .share-row { display: flex; gap: var(--s3); margin-top: var(--s4); }
    .share-btn {
      flex: 1; padding: 10px;
      background: rgba(212,175,55,0.08);
      border: 1px solid var(--border-hair);
      color: var(--text-lo); border-radius: 6px;
      cursor: pointer; font-size: 16px;
      transition: all 0.25s ease;
    }
    .share-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

    /* ─────────────────────────────────────────────────────────────────
       TOAST
    ───────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: calc(30vh + 10px); left: 50%;
      transform: translateX(-50%);
      z-index: 50000;
      padding: var(--s3) var(--s5);
      background: rgba(0,0,0,0.85);
      border: 1px solid var(--border-hair);
      border-radius: 8px;
      color: var(--text-hi);
      font-size: var(--t-sm);
      backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #toast.show { opacity: 1; pointer-events: auto; }

    /* ─────────────────────────────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       DIAGNOSTIC CONSOLE — Injected by QA Engineer
       Floats above everything. z-index: 99999.
  ═══════════════════════════════════════════════════════════════ -->
  <div id="diagConsole">
    <div id="diagConsoleHeader">
      <span id="diagConsoleTitle">⚡ DIAGNOSTIC CONSOLE</span>
      <div id="diagConsoleBtns">
        <button class="diag-btn" id="diagClearBtn">CLEAR</button>
        <button class="diag-btn" id="diagToggleBtn">HIDE</button>
      </div>
    </div>
    <div id="diagLog"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="launchScreen">
    <div class="launch-bg" id="launchBg"></div>
    <div class="launch-scrim"></div>

    <div class="launch-body">
      <h1 class="launch-wordmark" id="wordmark">AR GASTRONOMY</h1>
      <p class="launch-tagline" id="tagline">Discover Culinary Artistry</p>
      <p class="launch-sub" id="launchSub">Premium Dining Experience</p>

      <div class="portal-ring" id="portalBtn">
        <div class="portal-img" id="portalImg"></div>
        <div class="portal-scrim"></div>
        <div class="portal-icon">📷</div>
      </div>
    </div>

    <div class="hud-corner corner-tl" id="btnInfo" title="Info">

/* ═══════════════════════════════════════════════════════════════
   ██████╗ ██╗ █████╗  ██████╗ ███╗   ██╗ ██████╗ ███████╗████████╗██╗ ██████╗
   ON-SCREEN DIAGNOSTIC CONSOLE — Override console.log/warn/error
   Must be bootstrapped FIRST before any other code runs.
═══════════════════════════════════════════════════════════════ */
(function() {
  'use strict';

  const diagLog    = document.getElementById('diagLog');
  const clearBtn   = document.getElementById('diagClearBtn');
  const toggleBtn  = document.getElementById('diagToggleBtn');
  const diagPanel  = document.getElementById('diagConsole');
  let   isHidden   = false;

  /* ── Append a line to the on-screen log ─────────────────────── */
  function appendLine(level, args) {
    const line = document.createElement('div');
    line.className = 'diag-line ' + level;

    // Format timestamp  HH:MM:SS.mmm
    const now    = new Date();
    const hh     = String(now.getHours()).padStart(2, '0');
    const mm     = String(now.getMinutes()).padStart(2, '0');
    const ss     = String(now.getSeconds()).padStart(2, '0');
    const ms     = String(now.getMilliseconds()).padStart(3, '0');
    const ts     = `${hh}:${mm}:${ss}.${ms}`;

    // Serialize arguments gracefully
    const msg = args.map(a => {
      if (a === null)            return 'null';
      if (a === undefined)       return 'undefined';
      if (a instanceof Error)    return `${a.name}: ${a.message}`;
      if (typeof a === 'object') {
        try { return JSON.stringify(a); } catch(e) { return String(a); }
      }
      return String(a);
    }).join(' ');

    line.textContent = `[${ts}] ${msg}`;

    // CRITICAL marker for zero-dimension video
    if (msg.includes('CRITICAL')) {
      line.className = 'diag-line crit';
    }

    diagLog.appendChild(line);

    // Auto-scroll to bottom
    diagLog.scrollTop = diagLog.scrollHeight;

    // Cap at 300 lines to avoid memory explosion
    while (diagLog.children.length > 300) {
      diagLog.removeChild(diagLog.firstChild);
    }
  }

  /* ── Intercept native console methods ───────────────────────── */
  const _log   = console.log.bind(console);
  const _warn  = console.warn.bind(console);
  const _error = console.error.bind(console);

  console.log = function(...args) {
    _log(...args);
    appendLine('log', args);
  };
  console.warn = function(...args) {
    _warn(...args);
    appendLine('warn', args);
  };
  console.error = function(...args) {
    _error(...args);
    appendLine('error', args);
  };

  /* ── Also catch uncaught JS errors and unhandled rejections ─── */
  window.addEventListener('error', function(e) {
    appendLine('error', [`[UNCAUGHT ERROR] ${e.message} @ ${e.filename}:${e.lineno}:${e.colno}`]);
  });
  window.addEventListener('unhandledrejection', function(e) {
    const reason = e.reason instanceof Error
      ? `${e.reason.name}: ${e.reason.message}`
      : String(e.reason);
    appendLine('error', [`[UNHANDLED PROMISE] ${reason}`]);
  });

  /* ── Clear button ────────────────────────────────────────────── */
  clearBtn.addEventListener('click', function() {
    diagLog.innerHTML = '';
    appendLine('info', ['[DIAG] Log cleared.']);
  });

  /* ── Toggle visibility ───────────────────────────────────────── */
  toggleBtn.addEventListener('click', function() {
    isHidden = !isHidden;
    if (isHidden) {
      diagLog.style.display = 'none';
      diagPanel.style.height = '28px';
      toggleBtn.textContent = 'SHOW';
    } else {
      diagLog.style.display = 'flex';
      diagPanel.style.height = '30vh';
      toggleBtn.textContent = 'HIDE';
    }
  });

  /* ── Announce console is live ────────────────────────────────── */
  appendLine('info', ['[DIAG] On-screen console ACTIVE. All logs will appear here.']);
  appendLine('info', [`[DIAG] UA: ${navigator.userAgent}`]);
  appendLine('info', [`[DIAG] Screen: ${screen.width}x${screen.height} | Window: ${window.innerWidth}x${window.innerHeight}`]);
  appendLine('info', [`[DIAG] Pixel Ratio: ${window.devicePixelRatio}`]);
  appendLine('info', [`[DIAG] Tesseract global available: ${typeof Tesseract !== 'undefined'}`]);
  appendLine('info', [`[DIAG] THREE.js global available: ${typeof THREE !== 'undefined'}`]);
})();

/* ─────────────────────────────────────────────────────────────────
   FUZZY MATCH ALGORITHM (Levenshtein distance)
───────────────────────────────────────────────────────────────── */
function levenshteinDistance(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;

  const matrix = Array(b.length + 1)
    .fill(null)
    .map(() => Array(a.length + 1).fill(0));

  for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
  for (let j = 0; j <= b.length; j++) matrix[j][0] = j;

  for (let j = 1; j <= b.length; j++) {
    for (let i = 1; i <= a.length; i++) {
      const indicator = a[i - 1] === b[j - 1] ? 0 : 1;
      matrix[j][i] = Math.min(
        matrix[j][i - 1] + 1,
        matrix[j - 1][i] + 1,
        matrix[j - 1][i - 1] + indicator
      );
    }
  }

  const distance = matrix[b.length][a.length];
  const maxLen = Math.max(a.length, b.length);
  return 1 - distance / maxLen;
}

function fuzzyMatchDish(ocrText) {
  const normalized = ocrText.toLowerCase().trim();
  let bestMatch = null;
  let bestScore = 0;

  for (const dish of CONFIG.menu) {
    const dishName     = dish.name.toLowerCase();
    const dishKeywords = dish.keywords.map(k => k.toLowerCase());

    let score = levenshteinDistance(normalized, dishName);

    for (const keyword of dishKeywords) {
      if (normalized.includes(keyword)) {
        score = Math.max(score, 0.8);
      }
      const keywordScore = levenshteinDistance(normalized, keyword);
      score = Math.max(score, keywordScore);
    }

    if (score > bestScore) {
      bestScore = score;
      bestMatch = dish;
    }
  }

  return bestScore > CONFIG.ocr.fuzzyMatchThreshold ? { dish: bestMatch, score: bestScore } : null;
}

/* ─────────────────────────────────────────────────────────────────
   THREE.JS PARALLAX SCENE
───────────────────────────────────────────────────────────────── */
let parallaxCtx = null;

function initParallax() {
  try {
    const canvas = el('parallaxCanvas');
    const w = window.innerWidth;
    const h = window.innerHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
    camera.position.z = 2;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true
    });
    renderer.setSize(w, h);
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(window.devicePixelRatio);

    const glowGeom = new THREE.TorusGeometry(1.2, 0.08, 32, 100);
    const glowMat  = new THREE.MeshPhongMaterial({
      color: 0xd4af37,
      emissive: 0xd4af37,
      emissiveIntensity: 0.6
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    glow.rotation.x = 0.3;
    scene.add(glow);

    const planeGeom = new THREE.PlaneGeometry(1.4, 1.4);
    const dishMat   = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      emissive: 0x222222,
      emissiveIntensity: 0.3
    });
    const plane = new THREE.Mesh(planeGeom, dishMat);
    plane.position.z = 0.1;
    scene.add(plane);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xd4af37, 0.8, 10);
    pointLight.position.set(2, 2, 3);
    scene.add(pointLight);

    window.addEventListener('resize', () => {
      const nw = window.innerWidth;
      const nh = window.innerHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    });

    canvas.addEventListener('click', () => {
      if (STATE.currentDish && !STATE.bladeOpen) {
        openBlade(STATE.currentDish);
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      glow.rotation.z += 0.002;
      renderer.render(scene, camera);
    }
    animate();

    return { renderer, dishMat };
  } catch (err) {
    console.error('[Parallax]', err);
    throw err;
  }
}

───────────────────────────────────────────────────────────────── */
let tesseractWorker = null;
let ocrScanTimer    = null;

const TESSERACT_CONFIG = {
  langPath:   'https://cdn.jsdelivr.net/npm/tesseract.js-data@v4.0.0',
  workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/worker.min.js',
  corePath:   'https://cdn.jsdelivr.net/npm/tesseract.js-core@v4.0.0/tesseract-core.wasm.js'
};

async function initOCR() {
  el('ocrStatus').textContent       = 'LOADING...';
  el('ocrPill').dataset.status      = 'loading';

  /* ── CHECKPOINT: OCR worker loading ─────────────────────────── */
  console.log('[OCR] Worker loading from CDN...');
  console.log('[OCR] langPath:   ' + TESSERACT_CONFIG.langPath);
  console.log('[OCR] workerPath: ' + TESSERACT_CONFIG.workerPath);
  console.log('[OCR] corePath:   ' + TESSERACT_CONFIG.corePath);

  try {
    tesseractWorker = await Tesseract.createWorker({
      langPath:   TESSERACT_CONFIG.langPath,
      workerPath: TESSERACT_CONFIG.workerPath,
      corePath:   TESSERACT_CONFIG.corePath,
      logger: (m) => {
        if (m.status === 'recognizing text') {
          const progress = Math.round(m.progress * 100);
          console.log(`[OCR] Progress: ${progress}%`);
        } else {
          // Log ALL Tesseract status events for diagnostics
          console.log(`[OCR] Status: "${m.status}" progress: ${(m.progress * 100).toFixed(1)}%`);
        }
      }
    });

    console.log('[OCR] Worker created. Loading language pack (eng+ara)...');
    await tesseractWorker.loadLanguage('eng+ara');
    console.log('[OCR] Language pack loaded. Initializing...');
    await tesseractWorker.initialize('eng+ara');

    /* ── CHECKPOINT: OCR initialized ────────────────────────────── */
    console.log('[OCR] Worker initialized successfully.');

    STATE.ocrReady = true;
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent  = 'READY';
    toast('✓ OCR Ready');

  } catch (err) {
    console.error('[OCR Init] FAILED:', err.message || err);
    console.error('[OCR Init] Full error:', err);
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent  = 'ERROR';
    toast('OCR initialization failed');
  }
}

/* ─────────────────────────────────────────────────────────────────
   runOCRScan — The hot path. All failure points are instrumented.
───────────────────────────────────────────────────────────────── */
async function runOCRScan() {
  if (!STATE.ocrReady || !STATE.started || STATE.bladeOpen) {
    // Silently skip — not an error, just guards
    return;
  }

  const video = el('videoFeed');

  /* ── Guard: video element must exist ───────────────────────── */
  if (!video) {
    console.error('[SCAN] CRITICAL: #videoFeed element not found in DOM!');
    return;
  }

  /* ── Guard: video must have an active stream ────────────────── */
  if (!video.srcObject) {
    console.warn('[SCAN] Skipped — video.srcObject is null. Camera not yet attached.');
    return;
  }

  /* ── Guard: video must be in a decodable state ──────────────── */
  // readyState < 2 means no current data (HAVE_NOTHING=0, HAVE_METADATA=1)
  if (video.readyState < 2) {
    console.warn(`[SCAN] Skipped — video.readyState=${video.readyState} (need ≥2). Video not yet playing.`);
    return;
  }

  try {
    // Show scanning animation
    el('ocrScanLine').classList.add('scanning');
    el('ocrPill').dataset.status = 'scanning';
    el('ocrStatus').textContent  = 'SCANNING';

    /* ── CHECKPOINT: Frame capture ──────────────────────────────── */
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // ── CRITICAL: Zero dimensions = iOS playsinline violation ─────
    if (vw === 0 || vh === 0) {
      console.error(
        `[SCAN] CRITICAL: video dimensions are ${vw}x${vh}! ` +
        'This means the browser cannot read pixel data from the video. ' +
        'On iOS, this is caused by a missing "playsinline" attribute. ' +
        'Confirm the <video> tag has: playsinline autoplay muted'
      );
      el('ocrPill').dataset.status = 'error';
      el('ocrStatus').textContent  = 'ERROR';
      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    const canvas = document.createElement('canvas');
    canvas.width  = vw;
    canvas.height = vh;
    const ctx = canvas.getContext('2d');

    console.log(`[SCAN] Frame captured and sent to Tesseract. Canvas: ${vw}x${vh}, readyState: ${video.readyState}`);

    /* ── Instrumented drawImage ─────────────────────────────────── */
    try {
      ctx.drawImage(video, 0, 0);
      console.log('[SCAN] ctx.drawImage() succeeded.');
    } catch (drawErr) {
      console.error(`[SCAN] ctx.drawImage() FAILED: ${drawErr.message}`);
      console.error('[SCAN] This is often a "Tainted canvas" (CORS) or "video not ready" error.');
      el('ocrPill').dataset.status = 'error';
      el('ocrStatus').textContent  = 'ERROR';
      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    /* ── Instrumented Tesseract.recognize ───────────────────────── */
    let result;
    try {
      result = await tesseractWorker.recognize(canvas);
    } catch (ocrErr) {
      console.error(`[SCAN] tesseractWorker.recognize() FAILED: ${ocrErr.message}`);
      console.error('[SCAN] Possible causes: worker crashed, canvas is blank, out of memory.');
      el('ocrPill').dataset.status = 'error';
      el('ocrStatus').textContent  = 'ERROR';
      el('ocrScanLine').classList.remove('scanning');
      return;
    }

    const text       = result.data.text;
    const confidence = result.data.confidence;

    /* ── CHECKPOINT: Raw Tesseract output ───────────────────────── */
    // Always log the raw output so we know Tesseract is actually running
    console.log(`[RESULT] Tesseract output: "${text.substring(0, 80).replace(/\n/g,' ')}..." | Confidence: ${confidence.toFixed(1)}`);

    if (confidence > 30 && text.trim().length > 3) {
      checkTextAgainstMenu(text);
    } else {
      console.log(`[SCAN] Low confidence (${confidence.toFixed(1)}) or empty text. Skipping match.`);
      el('ocrPill').dataset.status = 'ready';
      el('ocrStatus').textContent  = 'READY';
      el('ocrScanLine').classList.remove('scanning');
    }

  } catch (err) {
    // Catch-all for anything that slipped through
    console.error(`[OCR Scan] Unhandled error: ${err.message}`);
    console.error('[OCR Scan] Stack:', err.stack || '(no stack)');
    el('ocrPill').dataset.status = 'error';
    el('ocrStatus').textContent  = 'ERROR';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function checkTextAgainstMenu(text) {
  const match = fuzzyMatchDish(text);

  if (match && match.score > CONFIG.ocr.fuzzyMatchThreshold) {
    console.log(`[Match] "${match.dish.name}" (score: ${match.score.toFixed(2)})`);
    switchDish(match.dish);
    el('parallaxCanvas').classList.add('fade-in');
    setTimeout(() => { openBlade(match.dish); }, 300);
  } else {
    console.log(`[NoMatch] No dish found for: "${text.substring(0, 40).replace(/\n/g,' ')}..."`);
    el('ocrPill').dataset.status = 'ready';
    el('ocrStatus').textContent  = 'READY';
    el('ocrScanLine').classList.remove('scanning');
  }
}

function startOCRLoop() {
  if (ocrScanTimer) clearInterval(ocrScanTimer);
  ocrScanTimer = setInterval(runOCRScan, CONFIG.ocr.scanIntervalMs);

  /* ── CHECKPOINT: Loop started ──────────────────────────────── */
  console.log(`[LOOP] Interval started. Scanning every ${CONFIG.ocr.scanIntervalMs}ms.`);
}

function stopOCRLoop() {
  if (ocrScanTimer) {
    clearInterval(ocrScanTimer);
    ocrScanTimer = null;
    console.log('[LOOP] Interval stopped.');
  }
}

/* ─────────────────────────────────────────────────────────────────
   AR INITIALIZATION
───────────────────────────────────────────────────────────────── */
function startAR() {
  STATE.started = true;

  el('videoFeed').classList.add('on');
  el('parallaxCanvas').classList.add('on');
  el('arOverlay').classList.add('on');
  el('hudBar').classList.add('on');

  /* ── CHECKPOINT: Camera request ─────────────────────────────── */
  console.log('[CAMERA] Requesting video feed...');

  // Log mediaDevices availability — a common silent failure on non-HTTPS
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.error(
      '[CAMERA] CRITICAL: navigator.mediaDevices.getUserMedia is NOT available! ' +
      'This page MUST be served over HTTPS (or localhost) for camera access. ' +
      `Current protocol: ${location.protocol}`
    );
    toast('Camera API not available — requires HTTPS');
    return;
  }

  console.log(`[CAMERA] mediaDevices available. Protocol: ${location.protocol}`);

  navigator.mediaDevices
    .getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    })
    .then((stream) => {
      const video = el('videoFeed');

      // Log the actual track settings the browser negotiated
      const tracks = stream.getVideoTracks();
      if (tracks.length > 0) {
        const settings = tracks[0].getSettings();
        console.log(`[CAMERA] Stream obtained. Track: "${tracks[0].label}"`);
        console.log(`[CAMERA] Negotiated resolution: ${settings.width}x${settings.height} @ ${settings.frameRate}fps`);
      } else {
        console.warn('[CAMERA] Stream has 0 video tracks!');
      }

      video.srcObject = stream;

      /* ── Instrument all video lifecycle events ─────────────── */
      video.addEventListener('loadstart',      () => console.log('[CAMERA] Event: loadstart'));
      video.addEventListener('loadedmetadata', () => {
        console.log(`[CAMERA] Event: loadedmetadata — videoWidth: ${video.videoWidth}, videoHeight: ${video.videoHeight}`);
      });
      video.addEventListener('loadeddata',     () => console.log(`[CAMERA] Event: loadeddata — readyState: ${video.readyState}`));
      video.addEventListener('canplay',        () => console.log(`[CAMERA] Event: canplay — readyState: ${video.readyState}`));
      video.addEventListener('playing',        () => {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        /* ── CHECKPOINT: Video playing ─────────────────────────── */
        if (vw === 0 || vh === 0) {
          console.error(
            `[CAMERA] CRITICAL: Video feed playing but dimensions are ${vw}x${vh}! ` +
            'Canvas drawImage will return empty frames. ' +
            'Ensure <video> has playsinline attribute (iOS requirement).'
          );
        } else {
          console.log(`[CAMERA] Video feed playing. Dimensions: ${vw}x${vh}.`);
        }
      });
      video.addEventListener('stalled',  () => console.warn('[CAMERA] Event: stalled — video stalled!'));
      video.addEventListener('suspend',  () => console.warn('[CAMERA] Event: suspend'));
      video.addEventListener('waiting',  () => console.warn('[CAMERA] Event: waiting — decoding stalled'));
      video.addEventListener('error',    (e) => {
        const code = video.error ? video.error.code : 'unknown';
        const msg  = video.error ? video.error.message : 'no message';
        console.error(`[CAMERA] CRITICAL: Video element error! code=${code}, message="${msg}"`);
      });

      video.onloadedmetadata = () => {
        console.log(`[CAMERA] onloadedmetadata — Dimensions: ${video.videoWidth}x${video.videoHeight}`);

        try {
          parallaxCtx = initParallax();
          console.log('[Parallax] Scene ready (waiting for OCR match)');
        } catch (err) {
          console.error('[Parallax] FAILED:', err.message);
          toast('3D initialization failed');
          return;
        }

        /* ── CHECKPOINT: Kick off OCR ───────────────────────────── */
        initOCR().then(() => {
          if (STATE.ocrReady) {
            startOCRLoop();
            toast('📷 Point camera at dish name');
          } else {
            console.error('[AR] OCR did not reach ready state after initOCR(). Loop NOT started.');
          }
        }).catch((err) => {
          console.error('[AR] initOCR() promise rejected:', err.message);
        });
      };

      // Explicitly call play() and log the result — autoplay may be blocked
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => console.log('[CAMERA] video.play() promise resolved. Autoplay OK.'))
          .catch((err) => {
            console.error(`[CAMERA] CRITICAL: video.play() was BLOCKED: ${err.message}`);
            console.error('[CAMERA] This is an autoplay policy violation. Ensure <video muted> is set.');
          });
      }
    })
    .catch((err) => {
      console.error(`[CAMERA] getUserMedia FAILED: ${err.name} — ${err.message}`);
      if (err.name === 'NotAllowedError') {
        console.error('[CAMERA] User denied camera permission, or browser policy blocked it.');
      } else if (err.name === 'NotFoundError') {
        console.error('[CAMERA] No camera device found on this device.');
      } else if (err.name === 'NotReadableError') {
        console.error('[CAMERA] Camera is already in use by another app.');
      } else if (err.name === 'OverconstrainedError') {
        console.error('[CAMERA] Requested camera constraints could not be satisfied.');
      }
      toast('Camera access denied');
    });

  track('ar_started');
}

el('portalBtn').addEventListener('click', () => {
  track('portal_tapped');
  el('launchScreen').classList.add('hidden');
  setTimeout(startAR, 240);
});

/* ─────────────────────────────────────────────────────────────────
   UI INTERACTIONS
───────────────────────────────────────────────────────────────── */

el('videoCta').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  const modal = document.createElement('div');
  modal.style.cssText =
    'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="position:relative;width:100%;max-width:600px;">
      <button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:-40px;right:0;background:transparent;border:none;color:#d4af37;font-size:24px;cursor:pointer;">✕</button>
      <video src="${STATE.currentDish.videoUrl}" controls autoplay style="width:100%;border-radius:8px;"></video>
    </div>
  `;
  document.body.appendChild(modal);
  track('video_opened', { dish: STATE.currentDish.name });
});

el('shareIG').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `https://www.instagram.com/?caption=${encodeURIComponent('Discover ' + STATE.currentDish.name + ' at AR Gastronomy!')}`,
    '_blank'
  );
  track('shared', { platform: 'instagram', dish: STATE.currentDish.name });
});

el('shareWA').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `https://wa.me/?text=${encodeURIComponent(STATE.currentDish.name + ' — ' + window.location.href)}`,
    '_blank'
  );
  track('shared', { platform: 'whatsapp', dish: STATE.currentDish.name });
});

el('shareMail').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `mailto:?subject=${encodeURIComponent('Discover ' + STATE.currentDish.name)}&body=${encodeURIComponent(window.location.href)}`,
    '_blank'
  );
  track('shared', { platform: 'email', dish: STATE.currentDish.name });
});

el('btnInfo').addEventListener('click', () =>
  toast(`📍 ${CONFIG.restaurant.location}  ·  📞 ${CONFIG.restaurant.phone}`)
);
el('btnMenu').addEventListener('click', () => toast('FULL MENU — Coming Soon'));

document.querySelectorAll('.lang-opt').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-opt').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    STATE.lang = btn.dataset.lang;
    track('lang_changed', { lang: STATE.lang });
  });
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && STATE.bladeOpen) closeBlade();
  if (e.key === ' ' && !STATE.started) {
    el('launchScreen').classList.add('hidden');
    setTimeout(startAR, 240);
  }
  if (['1', '2', '3', '4'].includes(e.key) && STATE.started) {
    const d = CONFIG.menu[+e.key - 1];
    if (d) {
      if (STATE.bladeOpen) closeBlade();
      setTimeout(() => {
        switchDish(d);
        el('parallaxCanvas').classList.add('fade-in');
        setTimeout(() => openBlade(d), 300);
      }, 120);
    }
  }
});

/* ─────────────────────────────────────────────────────────────────
   APP BOOT
───────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  /* ── CHECKPOINT: App boot ──────────────────────────────────── */
  console.log('[BOOT] App loaded.');
  console.log(`[BOOT] Tesseract available: ${typeof Tesseract !== 'undefined'}`);
  console.log(`[BOOT] THREE available: ${typeof THREE !== 'undefined'}`);
  console.log(`[BOOT] MediaDevices available: ${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}`);
  console.log(`[BOOT] Protocol: ${location.protocol} — Camera requires HTTPS or localhost.`);

  el('launchBg').style.backgroundImage    = `url('${CONFIG.restaurant.heroImage}')`;
  el('portalImg').style.backgroundImage   = `url('${CONFIG.restaurant.portalImage}')`;
  el('hudName').textContent               = CONFIG.restaurant.name.substring(0, 2).toUpperCase();

  track('app_loaded', { version: '3.0-ocr-diag', lang: STATE.lang });
  toast('WELCOME TO AR GASTRONOMY');
});

window.addEventListener('beforeunload', () => {
  stopOCRLoop();
  if (tesseractWorker) tesseractWorker.terminate();
});
</script>
