<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>AR Gastronomy | Premium Dining</title>

  <!-- Typefaces: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js (r128 — same version as original) -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- NOTE: MindAR script kept for production integration. -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script> -->

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS — Obsidian Atelier
       Gold-on-black luxury. Every size from the φ scale (×1.618).
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --gold:          #d4af37;
      --gold-pale:     #e8d48a;
      --gold-dim:      rgba(212,175,55,0.10);
      --gold-mid:      rgba(212,175,55,0.22);
      --gold-glow:     rgba(212,175,55,0.55);
      --ink:           #050505;
      --ink-lift:      #0c0c0c;
      --surface:       rgba(5,5,5,0.97);
      --white:         #f5f0e8;
      --text-hi:       #f5f0e8;
      --text-lo:       rgba(245,240,232,0.45);
      --text-mid:      rgba(245,240,232,0.70);
      --success:       #4db87a;
      --danger:        #e05a5a;
      --border-hair:   rgba(212,175,55,0.18);
      --border-mid:    rgba(212,175,55,0.30);
      --s1:  5px;   --s2:  8px;   --s3: 13px;
      --s4: 21px;   --s5: 34px;   --s6: 55px;  --s7: 89px;
      --t-2xs: 9px;  --t-xs: 11px; --t-sm: 13px;
      --t-md:  16px; --t-lg: 21px; --t-xl: 34px;
      --t-2xl: 55px; --t-3xl: 89px;
      --blade-w: calc(100vw / 1.618);
      --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out:     cubic-bezier(0.65, 0, 0.35, 1);
      --dur-blade: 0.78s;
      --dur-block: 0.60s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); font-family: 'DM Sans', sans-serif; color: var(--text-hi); -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 9999; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 128px 128px; pointer-events: none; opacity: 0.55; }

    #launchScreen { position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: var(--ink); transition: opacity 1s var(--ease-out-expo), visibility 1s var(--ease-out-expo); }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .launch-bg { position: absolute; inset: -8%; background-size: cover; background-position: center; filter: blur(14px) brightness(0.4); z-index: 0; will-change: transform; }
    .launch-scrim { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 80% at 50% 60%, rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%); z-index: 1; }
    .launch-body { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: var(--s5); text-align: center; padding: var(--s5); }
    .launch-wordmark { font-family: 'Cormorant Garamond', serif; font-size: var(--t-xl); font-weight: 700; letter-spacing: 14px; color: var(--gold); text-transform: uppercase; animation: riseIn 1.1s var(--ease-out-expo) both; }
    .launch-tagline { font-family: 'Cormorant Garamond', serif; font-size: var(--t-lg); font-weight: 300; font-style: italic; color: var(--white); letter-spacing: 2px; animation: riseIn 1.2s var(--ease-out-expo) 0.1s both; }
    .launch-sub { font-size: var(--t-2xs); color: var(--text-lo); letter-spacing: 5px; text-transform: uppercase; animation: riseIn 1.3s var(--ease-out-expo) 0.2s both; }
    .portal-ring { position: relative; margin-top: var(--s4); width: 190px; height: 190px; border-radius: 14px; overflow: hidden; border: 1px solid var(--gold-mid); cursor: pointer; box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0 80px rgba(212,175,55,0.15); animation: portalBreath 3.5s ease-in-out infinite, riseIn 1.4s var(--ease-out-expo) 0.3s both; transition: box-shadow 0.3s ease, transform 0.4s var(--ease-spring); }
    .portal-ring:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 0 0 1px var(--gold-mid), 0 30px 80px rgba(0,0,0,0.8), 0 0 120px rgba(212,175,55,0.3); }
    .portal-img { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.6s var(--ease-out-expo); }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.28); transition: opacity 0.3s ease; }
    .portal-ring:hover .portal-scrim { opacity: 0; }
    .portal-icon { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 72px; }
    @keyframes portalBreath { 0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0 80px rgba(212,175,55,0.15); } 50% { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.7), 0 0 130px rgba(212,175,55,0.30); } }
    .hud-corner { position: absolute; z-index: 15; width: 42px; height: 42px; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px) saturate(1.2); border: 1px solid var(--border-hair); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s var(--ease-spring); }
    .hud-corner:hover { background: rgba(212,175,55,0.18); border-color: var(--gold-mid); transform: scale(1.12); }
    .hud-corner svg { width: 18px; height: 18px; stroke: var(--text-mid); stroke-width: 1.5; fill: none; transition: stroke 0.2s ease; }
    .hud-corner:hover svg { stroke: var(--gold); }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }
    .lang-pill { position: absolute; bottom: var(--s5); right: var(--s5); display: flex; gap: 2px; background: rgba(0,0,0,0.55); border: 1px solid var(--border-hair); border-radius: 24px; padding: 3px 5px; z-index: 15; }
    .lang-opt { padding: 4px 10px; border-radius: 18px; font-size: var(--t-2xs); font-weight: 500; letter-spacing: 1px; cursor: pointer; color: var(--text-lo); transition: background 0.2s ease, color 0.2s ease; }
    .lang-opt.active, .lang-opt:hover { background: var(--gold); color: var(--ink); }
    #videoFeed { position: fixed; inset: 0; z-index: 2; width: 100%; height: 100%; object-fit: cover; display: none; }
    #videoFeed.on { display: block; }
    #parallaxCanvas { position: fixed; inset: 0; z-index: 3; width: 100%; height: 100%; display: none; pointer-events: none; }
    #parallaxCanvas.on { display: block; }
    #arOverlay { position: fixed; inset: 0; z-index: 4; display: none; cursor: crosshair; }
    #arOverlay.on { display: block; }
    #hudBar { position: fixed; top: 0; left: 0; right: 0; z-index: 60; padding: var(--s4) var(--s5); display: none; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%); backdrop-filter: blur(12px); font-size: var(--t-2xs); letter-spacing: 2.5px; text-transform: uppercase; }
    #hudBar.on { display: flex; }
    .hud-name { font-family: 'Cormorant Garamond', serif; font-size: var(--t-sm); font-weight: 600; letter-spacing: 4px; color: var(--gold); }
    .hud-status-pill { display: flex; align-items: center; gap: var(--s2); color: var(--text-lo); }
    .hud-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); box-shadow: 0 0 7px var(--success); animation: dotPulse 2s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    #sideBlade { position: fixed; right: 0; top: 0; bottom: 0; width: var(--blade-w); max-width: 100%; z-index: 100; background: var(--surface); border-left: 1px solid var(--border-hair); box-shadow: inset 2px 0 0 0 rgba(212,175,55,0.12), -20px 0 80px rgba(0,0,0,0.6); overflow-y: auto; overflow-x: hidden; padding: var(--s7) var(--s5) var(--s6) var(--s5); display: flex; flex-direction: column; gap: 0; transform: translateX(105%); transition: transform var(--dur-blade) var(--ease-out-expo); will-change: transform; }
    #sideBlade.active { transform: translateX(0); }
    #sideBlade::-webkit-scrollbar { width: 3px; }
    #sideBlade::-webkit-scrollbar-thumb { background: var(--border-hair); border-radius: 2px; }
    .blade-x { position: absolute; top: var(--s4); right: var(--s4); width: 34px; height: 34px; background: transparent; border: 1px solid var(--border-hair); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-lo); font-size: 18px; transition: color 0.2s ease, border-color 0.2s ease, transform 0.3s var(--ease-spring), background 0.2s ease; }
    .blade-x:hover { color: var(--gold); border-color: var(--gold-mid); background: var(--gold-dim); transform: rotate(90deg); }
    .motion-element { opacity: 0; transform: translateY(26px); transition: opacity var(--dur-block) var(--ease-out-expo), transform var(--dur-block) var(--ease-out-expo); will-change: opacity, transform; }
    #sideBlade.active .motion-element { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 0.10s; } .delay-2 { transition-delay: 0.22s; } .delay-3 { transition-delay: 0.34s; } .delay-4 { transition-delay: 0.46s; } .delay-5 { transition-delay: 0.58s; }
    #sideBlade:not(.active) .motion-element { transition-delay: 0s !important; }
    .blade-block { width: 100%; }
    .blade-title { font-family: 'Cormorant Garamond', serif; font-size: var(--t-xl); font-weight: 700; color: var(--white); letter-spacing: 0.5px; line-height: 1.1; }
    .blade-category { display: block; margin-top: var(--s2); font-size: var(--t-2xs); font-weight: 500; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
    .blade-rating-block { margin-top: var(--s4); padding-top: var(--s4); border-top: 1px solid var(--border-hair); }
    .google-maps-link { display: inline-flex; align-items: center; gap: var(--s3); text-decoration: none; transition: opacity 0.2s ease; }
    .google-maps-link:hover { opacity: 0.72; }
    .star-row { font-size: 15px; letter-spacing: 2px; color: var(--gold); }
    .rating-label-wrap { display: flex; flex-direction: column; gap: 1px; }
    .rating-score { font-family: 'Cormorant Garamond', serif; font-size: var(--t-md); font-weight: 600; color: var(--white); line-height: 1; }
    .rating-cta { font-size: var(--t-2xs); font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--text-lo); border-bottom: 1px solid var(--border-hair); padding-bottom: 1px; }
    .blade-price-block { margin-top: var(--s5); padding-top: var(--s4); border-top: 1px solid var(--border-hair); }
    .price-amount { display: block; font-family: 'Cormorant Garamond', serif; font-size: var(--t-2xl); font-weight: 300; font-style: italic; color: var(--gold); line-height: 1; letter-spacing: -1px; }
    .price-per { display: block; margin-top: var(--s2); font-size: var(--t-2xs); font-weight: 400; letter-spacing: 4px; text-transform: uppercase; color: var(--text-lo); }
    .blade-ingredients-block { margin-top: var(--s5); padding-top: var(--s4); border-top: 1px solid var(--border-hair); }
    .ingredients-eyebrow { font-size: var(--t-2xs); font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--text-lo); margin-bottom: var(--s3); }
    .ingredients-prose { font-family: 'Cormorant Garamond', serif; font-size: var(--t-lg); font-weight: 300; font-style: italic; color: var(--text-mid); line-height: 1.55; }
    .allergen-strip { margin-top: var(--s3); padding: var(--s2) var(--s3); background: rgba(224,90,90,0.07); border-left: 2px solid rgba(224,90,90,0.55); border-radius: 3px; font-size: var(--t-xs); color: rgba(224,130,130,0.9); line-height: 1.5; display: none; }
    .blade-video-block { margin-top: var(--s5); padding-top: var(--s4); border-top: 1px solid var(--border-hair); }
    .video-cta { width: 100%; padding: var(--s3) var(--s4); background: var(--gold); border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: var(--t-xs); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--ink); cursor: pointer; position: relative; overflow: hidden; transition: transform 0.35s var(--ease-spring), box-shadow 0.35s ease; }
    .video-cta::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); transition: left 0.5s ease; }
    .video-cta:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(212,175,55,0.40); }
    .video-cta:hover::after { left: 140%; }
    .video-cta:active { transform: translateY(0); }
    .share-row { display: flex; gap: var(--s2); margin-top: var(--s4); }
    .share-btn { flex: 1; padding: var(--s2) var(--s3); background: transparent; border: 1px solid var(--border-hair); border-radius: 5px; color: var(--text-lo); font-size: 14px; cursor: pointer; transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease; }
    .share-btn:hover { background: var(--gold-dim); border-color: var(--gold-mid); color: var(--gold); }
    #videoModal { position: fixed; inset: 0; z-index: 350; background: rgba(0,0,0,0.97); display: flex; align-items: center; justify-content: center; padding: var(--s5); opacity: 0; visibility: hidden; transition: opacity 0.35s ease, visibility 0.35s ease; }
    #videoModal.open { opacity: 1; visibility: visible; }
    .modal-inner { position: relative; width: 100%; max-width: 600px; border-radius: 10px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 0 1px var(--border-hair); }
    #modalVideo { width: 100%; height: auto; display: block; }
    .modal-x { position: absolute; top: var(--s3); right: var(--s3); width: 38px; height: 38px; background: rgba(0,0,0,0.7); border: 1px solid var(--border-hair); border-radius: 50%; color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; z-index: 10; transition: background 0.2s ease, color 0.2s ease; }
    .modal-x:hover { background: var(--gold); color: var(--ink); }
    #gestureHint { position: fixed; bottom: var(--s5); left: 50%; transform: translateX(-50%); z-index: 55; pointer-events: none; font-size: var(--t-2xs); letter-spacing: 3px; text-transform: uppercase; color: var(--text-lo); animation: breathe 2.4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:0.35;} 50%{opacity:0.85;} }
    #toast { position: fixed; bottom: var(--s6); left: 50%; transform: translateX(-50%) translateY(120px); z-index: 400; pointer-events: none; padding: var(--s2) var(--s5); background: rgba(5,5,5,0.95); color: var(--gold); border: 1px solid var(--border-hair); border-radius: 6px; max-width: 82%; text-align: center; font-size: var(--t-2xs); letter-spacing: 2px; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: transform 0.45s var(--ease-out-expo); }
    #toast.show { transform: translateX(-50%) translateY(0); }
    @keyframes riseIn { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    [dir="rtl"] #sideBlade { right: auto; left: 0; border-left: none; border-right: 1px solid var(--border-hair); box-shadow: inset -2px 0 0 0 rgba(212,175,55,0.12), 20px 0 80px rgba(0,0,0,0.6); transform: translateX(-105%); }
    [dir="rtl"] #sideBlade.active { transform: translateX(0); }
    [dir="rtl"] .blade-x { right: auto; left: var(--s4); }
    [dir="rtl"] .allergen-strip { border-left: none; border-right: 2px solid rgba(224,90,90,0.55); }
  </style>
</head>
<body>

<div id="launchScreen">
  <div class="launch-bg" id="launchBg"></div>
  <div class="launch-scrim"></div>
  <button class="hud-corner corner-tl" id="btnInfo" aria-label="Restaurant info">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 17v-6"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
  </button>
  <button class="hud-corner corner-tr" id="btnMenu" aria-label="Full menu">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="lang-pill" role="group" aria-label="Language selection">
    <div class="lang-opt active" data-lang="en" tabindex="0">EN</div>
    <div class="lang-opt" data-lang="ar" tabindex="0">عربي</div>
    <div class="lang-opt" data-lang="fr" tabindex="0">FR</div>
  </div>
  <div class="launch-body">
    <h1 class="launch-wordmark" data-i18n="brand" id="launchBrand">CULINARY AR</h1>
    <p class="launch-tagline"  data-i18n="tagline" id="launchTagline">Discover Culinary Masterpieces</p>
    <p class="launch-sub"      data-i18n="subtitle" id="launchSub">CINEMA-GRADE DINING EXPERIENCE</p>
    <button class="portal-ring" id="portalBtn" aria-label="Enter AR experience">
      <div class="portal-img"   id="portalImg"></div>
      <div class="portal-scrim"></div>
      <div class="portal-icon">🍽️</div>
    </button>
  </div>
</div>

<video  id="videoFeed"      playsinline autoplay muted></video>
<canvas id="parallaxCanvas"></canvas>
<div    id="arOverlay"      role="button" aria-label="Tap dish to explore"></div>

<div id="hudBar">
  <span class="hud-name" id="hudName">AR</span>
  <div class="hud-status-pill">
    <div class="hud-dot"></div>
    <span id="hudStatus" data-i18n="tracking">TRACKING</span>
  </div>
</div>

<aside id="sideBlade" aria-label="Dish details" aria-hidden="true">
  <button class="blade-x" id="bladeClose" aria-label="Close">✕</button>
  <div class="blade-block motion-element delay-1">
    <h2 class="blade-title" data-i18n="dish_title" id="bladeTitle">—</h2>
    <span class="blade-category" data-i18n="dish_category" id="bladeCategory">—</span>
  </div>
  <div class="blade-block blade-rating-block motion-element delay-2">
    <a id="googleMapsLink" href="#" target="_blank" rel="noopener noreferrer" class="google-maps-link">
      <span class="star-row" id="bladeStars">★★★★★</span>
      <div class="rating-label-wrap">
        <span class="rating-score" id="bladeScore">4.8</span>
        <span class="rating-cta" data-i18n="rate_google" id="bladeRateCta">Rate us on Google</span>
      </div>
    </a>
  </div>
  <div class="blade-block blade-price-block motion-element delay-3">
    <span class="price-amount" data-i18n="dish_price" id="bladePrice">—</span>
    <span class="price-per" data-i18n="price_label" id="bladePriceLabel">PER PERSON</span>
  </div>
  <div class="blade-block blade-ingredients-block motion-element delay-4">
    <p class="ingredients-eyebrow" data-i18n="ingredients_label" id="bladeIngLabel">KEY INGREDIENTS</p>
    <p class="ingredients-prose" data-i18n="dish_ingredients" id="bladeIngText">—</p>
    <div class="allergen-strip" id="allergenStrip"><strong>⚠</strong>&nbsp;<span id="allergenText"></span></div>
  </div>
  <div class="blade-block blade-video-block motion-element delay-5">
    <button class="video-cta" id="videoCta"><span data-i18n="watch_video" id="videoCtaLabel">WATCH THE ARTISTRY</span></button>
    <div class="share-row">
      <button class="share-btn" id="shareIG" title="Instagram">📷</button>
      <button class="share-btn" id="shareWA" title="WhatsApp">💬</button>
      <button class="share-btn" id="shareMail" title="Email">✉️</button>
    </div>
  </div>
</aside>

<div id="videoModal" role="dialog" aria-modal="true" aria-label="Dish video">
  <div class="modal-inner">
    <button class="modal-x" id="modalClose" aria-label="Close video">✕</button>
    <video id="modalVideo" controls playsinline></video>
  </div>
</div>

<p  id="gestureHint" data-i18n="swipe" aria-hidden="true">SWIPE TO DISMISS</p>
<div id="toast"      role="status"  aria-live="polite"></div>

<script>
/* ─────────────────────────────────────────────────────────────────
   DATA BRIDGE (المجنون) — يجلب umami-prime/data.js بأي طريقة ويعالج المسارات
───────────────────────────────────────────────────────────────── */
(async function crazyDataBridge() {

    if (!extractedData) {
      const temp = {};

})();

      if (!url || typeof url !== 'string') return url;

      if (trimmed.startsWith('http://') || trimmed.startsWith('https://') || trimmed.startsWith('//') || trimmed.startsWith('data:') || trimmed.startsWith('umami-prime/')) return trimmed;
