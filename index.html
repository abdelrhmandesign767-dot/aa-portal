<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vision AR Engine v9 | Hybrid NFT</title>

    <!-- Google Fonts: Luxury Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- MindAR.js Image Tracking (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

    <style>
        /* =============================================
           DESIGN TOKENS — GOLDEN RATIO (φ = 1.618)
           Base unit: 8px — scale × φ at each step
           ============================================= */
        :root {
            --gold:        #d4af37;
            --gold-dim:    rgba(212,175,55,0.15);
            --gold-glow:   rgba(212,175,55,0.45);
            --white:       #f7f4ee;
            --bg:          #050505;
            --surface:     rgba(8,8,8,0.88);
            --border:      rgba(212,175,55,0.22);
            --text-muted:  rgba(247,244,238,0.55);

            /* φ-scaled spacing */
            --sp1: 5px;   /* 8 / φ */
            --sp2: 8px;
            --sp3: 13px;  /* 8 × φ */
            --sp4: 21px;  /* 13 × φ */
            --sp5: 34px;  /* 21 × φ */
            --sp6: 55px;  /* 34 × φ */

            /* φ-scaled type */
            --t-xs:  10px;
            --t-sm:  13px;
            --t-md:  21px;
            --t-lg:  34px;
            --t-xl:  55px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--white);
            -webkit-font-smoothing: antialiased;
        }

        /* =============================================
           LAUNCH PAD — IMMERSIVE HERO
           ============================================= */
        .glass-hero {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .glass-hero.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .hero-bg-image {
            position: absolute; inset: -5%;
            background-size: cover; background-position: center;
            filter: blur(8px); z-index: 1;
            /* Fallback gradient when no image is loaded */
            background-color: #0a0a0a;
            background-image: linear-gradient(135deg, #0d0d0d 0%, #1a1208 50%, #0d0d0d 100%);
        }
        .glass-overlay {
            position: absolute; inset: 0;
            background: rgba(5,5,5,0.45); z-index: 2;
        }
        .hero-center-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; gap: var(--sp5);
            text-align: center; padding: var(--sp5);
        }
        .lp-brand {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-lg);
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
        }
        .sensory-text { display: flex; flex-direction: column; gap: var(--sp2); }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-md);
            color: var(--white);
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
        }
        .hero-subtitle {
            font-size: var(--t-xs);
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        /* Corner icon buttons */
        .corner-icon {
            position: absolute; z-index: 10;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: var(--white);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .corner-icon svg { width: 18px; height: 18px; }
        .corner-icon:hover { background: rgba(212,175,55,0.2); border-color: var(--gold); }
        .top-left    { top: var(--sp4); left: var(--sp4); }
        .top-right   { top: var(--sp4); right: var(--sp4); }
        .bottom-left { bottom: var(--sp4); left: var(--sp4); }
        /* Breathing camera button */
        .breathing-cam-btn {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            animation: breathe 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .breathing-cam-btn svg { width: 28px; height: 28px; }
        .breathing-cam-btn:active { transform: scale(0.9); }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 15px rgba(212,175,55,0.2); transform: scale(1); }
            50%       { box-shadow: 0 0 35px rgba(212,175,55,0.6); transform: scale(1.05); }
        }

        /* Hide tilt indicator visually — logic stays active */
        #tilt-indicator { display: none !important; }

        /* =============================================
           CAMERA CANVAS
           ============================================= */
        #ar-viewport {
            position: fixed; inset: 0; z-index: 1;
            display: none;
        }
        #ar-viewport.active { display: block; }

        /* Real camera feed fallback (non-MindAR mode) */
        #video-bg {
            position: fixed; inset: 0; z-index: 2;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }
        #video-bg.active { display: block; }

        /* =============================================
           HUD LAYER — always on top of camera
           ============================================= */
        #hud {
            position: fixed; inset: 0; z-index: 50;
            pointer-events: none;
            display: none;
        }
        #hud.active { display: block; }

        /* --- Top Bar --- */
        .hud-top {
            position: absolute; top: 0; left: 0; right: 0;
            padding: var(--sp4) var(--sp5);
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .hud-brand {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-md);
            color: var(--gold);
            letter-spacing: 3px;
        }
        .hud-status {
            display: flex; align-items: center; gap: var(--sp2);
            font-size: var(--t-xs);
            color: var(--text-muted);
            letter-spacing: 2px;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- Tilt Indicator --- */
        #tilt-indicator {
            position: absolute; left: var(--sp5); top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: var(--sp2);
        }
        .tilt-track {
            width: 3px; height: 89px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; position: relative;
            overflow: hidden;
        }
        .tilt-zone {
            position: absolute; width: 100%;
            background: var(--gold-dim);
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            /* 30°-70° zone = roughly 33%-77% of track */
            top: 33%; height: 44%;
        }
        .tilt-thumb {
            position: absolute; width: 9px; height: 9px;
            background: var(--gold); border-radius: 50%;
            left: 50%; transform: translateX(-50%);
            top: 50%; transition: top 0.15s ease;
            box-shadow: 0 0 8px var(--gold-glow);
        }
        .tilt-label {
            font-size: 9px; color: var(--text-muted);
            letter-spacing: 1px; writing-mode: vertical-rl;
            text-transform: uppercase;
        }

        /* --- Target Reticle — Minimalistic --- */
        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border: none;
        }
        .smart-corner {
            position: absolute;
            width: 30px; height: 30px;
            border-color: rgba(255,255,255,0.3);
            border-style: solid;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .smart-corner.tl { top: 0; left: 0; border-width: 1px 0 0 1px; border-top-left-radius: 12px; }
        .smart-corner.tr { top: 0; right: 0; border-width: 1px 1px 0 0; border-top-right-radius: 12px; }
        .smart-corner.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; border-bottom-left-radius: 12px; }
        .smart-corner.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; border-bottom-right-radius: 12px; }
        /* Scanning — gentle pulse */
        #reticle.scanning .smart-corner {
            animation: corner-pulse 1.8s ease-in-out infinite;
        }
        @keyframes corner-pulse {
            0%, 100% { border-color: rgba(255,255,255,0.2); transform: scale(1); }
            50%       { border-color: rgba(212,175,55,0.7); transform: scale(1.04); }
        }
        /* Locked — corners shrink and fade (card takes over) */
        #reticle.locked .smart-corner {
            border-color: var(--gold);
            transform: scale(0.8);
            opacity: 0;
        }

        /* Scan shimmer */
        #scan-shimmer {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            top: 0; opacity: 0;
            box-shadow: 0 0 12px var(--gold);
            animation: shimmer-sweep 2.5s ease-in-out infinite;
        }
        .shimmer-active { opacity: 1 !important; }
        @keyframes shimmer-sweep {
            0%   { top: 0%; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Circular Score Badge */
        #circular-score-badge {
            position: absolute; top: var(--sp4); right: var(--sp4);
            width: 50px; height: 50px;
            background: rgba(5,5,5,0.4);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        #circular-score-badge.visible { opacity: 1; }
        .score-ring {
            width: 100%; height: 100%;
            position: absolute;
            transform: rotate(-90deg);
        }
        .ring-bg  { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 2; }
        .ring-fill {
            fill: none; stroke: var(--gold); stroke-width: 2;
            transition: stroke-dasharray 0.3s ease;
            stroke-linecap: round;
        }
        .score-text {
            font-size: 11px; color: var(--gold);
            font-weight: 600; position: relative; z-index: 1;
        }

        /* Hide old linear confidence bar */
        #confidence-bar { display: none !important; }

        /* =============================================
           AR INFO CARD — iPhone Glassmorphism + Cascade
           ============================================= */
        .glass-card {
            position: fixed;
            bottom: var(--sp3); left: var(--sp3); right: var(--sp3);
            z-index: 60;
            pointer-events: none;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card.visible {
            pointer-events: auto;
            opacity: 1;
            transform: translateX(0);
        }
        .glass-card.dismissing {
            transform: translateX(-100%);
            opacity: 0;
        }
        .card-inner {
            background: rgba(15,15,15,0.65);
            backdrop-filter: blur(25px) saturate(1.8);
            -webkit-backdrop-filter: blur(25px) saturate(1.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: var(--sp5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Cascade animation staggering */
        .cascade-item {
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card.visible .cascade-item          { opacity: 1; transform: translateX(0); }
        .glass-card.visible .step-1 { transition-delay: 0.10s; }
        .glass-card.visible .step-2 { transition-delay: 0.20s; }
        .glass-card.visible .step-3 { transition-delay: 0.30s; }
        .glass-card.visible .step-4 { transition-delay: 0.40s; }
        .glass-card.visible .step-5 { transition-delay: 0.50s; }

        /* Card handle */
        .card-handle {
            width: 34px; height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 0 auto var(--sp4);
            cursor: pointer;
        }

        /* Card text fields */
        .card-category {
            font-size: 9px;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: var(--sp2);
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-md);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--sp3);
            color: var(--white);
        }
        .card-desc {
            font-size: var(--t-sm);
            color: var(--text-muted);
            line-height: 1.618;
            margin-bottom: var(--sp4);
        }

        /* Elegant horizontal ingredients strip */
        .elegant-ingredients {
            display: flex; gap: var(--sp3);
            overflow-x: auto; padding-bottom: var(--sp2);
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: var(--sp4);
        }
        .elegant-ingredients::-webkit-scrollbar { display: none; }
        .ing-icon-item {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            min-width: 48px; flex-shrink: 0;
        }
        .ing-circle {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .ing-label {
            font-size: 9px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
            text-align: center; line-height: 1.3;
        }

        /* Allergy warning */
        .allergy-banner {
            display: flex; align-items: flex-start; gap: var(--sp3);
            background: rgba(255,180,0,0.06);
            border: 1px solid rgba(255,180,0,0.2);
            border-radius: 4px;
            padding: var(--sp3);
            margin-bottom: var(--sp4);
        }
        .allergy-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
        .allergy-text { font-size: 11px; color: rgba(255,200,100,0.85); line-height: 1.5; }
        .allergy-title { font-weight: 600; margin-bottom: 2px; }

        /* Dynamic action buttons */
        .dynamic-actions {
            display: flex; justify-content: space-between; align-items: center;
        }
        .dynamic-video-btn {
            width: 48px; height: 48px;
            border-radius: 24px;
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
        }
        .dynamic-video-btn:hover { width: 140px; background: var(--gold); }
        .dynamic-video-btn:hover svg { fill: #000; }
        .dynamic-video-btn::after {
            content: 'PLAY VIDEO';
            position: absolute; opacity: 0;
            color: #000; font-size: 11px; font-weight: 700; letter-spacing: 2px;
            white-space: nowrap;
            left: 50%; transform: translateX(-50%);
            transition: opacity 0.25s 0.15s;
            pointer-events: none;
        }
        .dynamic-video-btn:hover::after { opacity: 1; }
        .dynamic-video-btn svg { transition: fill 0.3s; }
        .minimal-close-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px; letter-spacing: 3px;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            transition: color 0.3s;
        }
        .minimal-close-btn:hover { color: var(--white); }

        /* =============================================
           TOAST NOTIFICATION
           ============================================= */
        #toast {
            position: fixed; top: var(--sp5); left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: var(--sp3) var(--sp4);
            font-size: var(--t-xs);
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* =============================================
           HINT — TILT WARNING
           ============================================= */
        #tilt-hint {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 55;
            display: flex; flex-direction: column; align-items: center; gap: var(--sp3);
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }
        #tilt-hint.show { opacity: 1; }
        .tilt-hint-icon { width: 44px; height: 44px; }
        .tilt-hint-text {
            font-size: var(--t-xs);
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
        }

        /* =============================================
           VIDEO MODAL
           ============================================= */
        #video-modal {
            position: fixed; inset: 0; z-index: 400;
            background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: var(--sp4);
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s, visibility 0.4s;
        }
        #video-modal.open { opacity: 1; visibility: visible; }
        #modal-video {
            width: 92%; max-width: 500px;
            aspect-ratio: 16/9;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #000;
        }
        #modal-close {
            width: 44px; height: 44px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: transparent;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }
        #modal-close:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<!-- =================== LAUNCH PAD — IMMERSIVE HERO =================== -->
<div id="launch-pad" class="glass-hero">
    <div class="hero-bg-image" style="background-image: url('content/hero-bg.jpg');"></div>
    <div class="glass-overlay"></div>

    <button class="corner-icon top-left" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    <button class="corner-icon top-right" aria-label="Info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
    </button>
    <button class="corner-icon bottom-left" aria-label="Menu items">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
    </button>

    <div class="hero-center-content">
        <div class="lp-brand" id="restaurant-name">ENGINE V9</div>
        <div class="sensory-text">
            <h1 class="hero-title">Discover Your Dish's Story</h1>
            <p class="hero-subtitle">The food is speaking. Point your camera to listen.</p>
        </div>
        <button id="start-btn" class="breathing-cam-btn" aria-label="Unlock AR Experience">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </button>
    </div>
</div>

<!-- =================== HUD =================== -->
<div id="hud">
    <div class="hud-top">
        <div class="hud-brand" id="hud-brand">ENGINE V9</div>
        <div class="hud-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">SCANNING</span>
        </div>
    </div>

    <!-- Tilt indicator (left side) -->
    <div id="tilt-indicator">
        <div class="tilt-label">TILT</div>
        <div class="tilt-track">
            <div class="tilt-zone"></div>
            <div class="tilt-thumb" id="tilt-thumb"></div>
        </div>
        <div class="tilt-label">OK</div>
    </div>

    <!-- Target Reticle — Minimalistic -->
    <div id="reticle" class="scanning">
        <div class="smart-corner tl"></div>
        <div class="smart-corner tr"></div>
        <div class="smart-corner bl"></div>
        <div class="smart-corner br"></div>
    </div>
    <div id="scan-shimmer"></div>

    <!-- Circular Score Badge (replaces linear confidence bar) -->
    <div id="circular-score-badge">
        <svg class="score-ring" viewBox="0 0 36 36">
            <path class="ring-bg"   d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path class="ring-fill" id="circular-conf-fill" stroke-dasharray="0, 100"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
        </svg>
        <div class="score-text" id="circular-conf-value">0%</div>
    </div>

    <!-- Hidden linear bar kept in DOM for JS compat — overridden by display:none CSS -->
    <div id="confidence-bar" aria-hidden="true">
        <div class="conf-track"><div class="conf-fill" id="conf-fill"></div></div>
        <div id="conf-value"></div>
    </div>
</div>

<!-- =================== TILT HINT =================== -->
<div id="tilt-hint">
    <svg class="tilt-hint-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="6" width="20" height="32" rx="3" stroke="#d4af37" stroke-width="1.5"/>
        <path d="M18 36h8" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 20v-6M22 20l-3-3M22 20l3-3" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 34 L4 38 M36 34 L40 38" stroke="#d4af37" stroke-opacity="0.5" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <div class="tilt-hint-text">Tilt phone to<br>dining angle</div>
</div>

<!-- =================== VIDEO (camera feed fallback) =================== -->
<video id="video-bg" autoplay playsinline muted></video>

<!-- =================== AR INFO CARD — GLASSMORPHISM =================== -->
<div id="ar-card" class="glass-card">
    <div class="card-inner cascade-container">
        <div class="card-handle" id="card-handle"></div>

        <div class="cascade-item step-1 card-category" id="card-category">CHEF'S SPECIAL</div>
        <h2 class="cascade-item step-2 card-title" id="card-title">Dish Name</h2>
        <p class="cascade-item step-3 card-desc" id="card-desc">Description loads here.</p>

        <div class="cascade-item step-4 elegant-ingredients" id="ingredients-wrap"></div>

        <div class="allergy-banner" id="allergy-banner" style="display:none">
            <svg class="allergy-icon" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <div class="allergy-text">
                <div class="allergy-title">Allergen Notice</div>
                <div id="allergy-text">Contains allergens.</div>
            </div>
        </div>

        <div class="cascade-item step-5 dynamic-actions">
            <button class="dynamic-video-btn" id="btn-video">
                <svg viewBox="0 0 24 24" fill="var(--gold)" width="18" height="18">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            </button>
            <button class="minimal-close-btn" id="btn-dismiss">✕ CLOSE</button>
        </div>
    </div>
</div>

<!-- =================== VIDEO MODAL =================== -->
<div id="video-modal">
    <video id="modal-video" controls></video>
    <button id="modal-close">✕</button>
</div>

<!-- =================== TOAST =================== -->
<div id="toast">DISH DETECTED</div>


<!-- =================== ENGINE SCRIPT =================== -->
<script>
/* =====================================================
   DYNAMIC MENU DATA (JSON Architecture)
   Each dish must have: target_image_url, video_preview,
   ingredients_list, allergy_warnings + mindar target_index
   ===================================================== */
const RESTAURANT = {
    brand: "ENGINE V9",
    menu_items: [
        {
            id: "dish_0",
            target_index: 0,           // MindAR compiled target index
            category: "Signature Main",
            name: "Wagyu Tataki",
            description: "Lightly seared A5 wagyu beef, kissed with yuzu kosho butter, micro-shiso, and a 24-hour dashi reduction that lingers long after the last bite.",
            ingredients_list: ["A5 Wagyu", "Yuzu Kosho", "Shiso Leaf", "Dashi", "Truffle Salt", "Microgreens"],
            allergy_warnings: "Contains soy, sesame. May contain traces of shellfish.",
            target_image_url: "assets/targets/wagyu.jpg",  // served from same directory
            video_preview: "assets/videos/wagyu_recipe.mp4",
            angle: 0 // fallback compass heading
        },
        {
            id: "dish_1",
            target_index: 1,
            category: "Chef's Special",
            name: "Lobster Bisque",
            description: "Cold-water lobster slow-cooked in a cognac cream bisque with saffron foam, topped with caviar pearls and chive oil brushwork.",
            ingredients_list: ["Lobster", "Cognac", "Saffron", "Heavy Cream", "Caviar", "Chive Oil"],
            allergy_warnings: "Contains shellfish, dairy, alcohol. Not suitable for nut allergies.",
            target_image_url: "assets/targets/bisque.jpg",
            video_preview: "assets/videos/bisque_recipe.mp4",
            angle: 90
        },
        {
            id: "dish_2",
            target_index: 2,
            category: "Dessert",
            name: "Black Sesame Soufflé",
            description: "Airy Japanese black sesame soufflé, risen to perfection, served with house-churned tahini gelato and a drizzle of buckwheat honey.",
            ingredients_list: ["Black Sesame", "Egg Whites", "Tahini", "Milk", "Buckwheat Honey", "Vanilla"],
            allergy_warnings: "Contains eggs, dairy, gluten, sesame.",
            target_image_url: "assets/targets/souffle.jpg",
            video_preview: "assets/videos/souffle_recipe.mp4",
            angle: 180
        }
    ]
};

/* =====================================================
   STATE
   ===================================================== */
const STATE = {
    started: false,
    mindARActive: false,
    currentItem: null,
    cardVisible: false,
    matchScore: 0,
    tiltAngle: 45,
    tiltOK: false,
    lastFoundIndex: -1
};

const MIN_SCORE    = 0.70;  // 70% image match threshold
const MIN_TILT     = 30;    // degrees from horizontal
const MAX_TILT     = 70;

/* =====================================================
   DOM REFS
   ===================================================== */
const $  = id => document.getElementById(id);
const launchPad    = $('launch-pad');
const startBtn     = $('start-btn');
const hud          = $('hud');
const videoBg      = $('video-bg');
const arCard       = $('ar-card');
const reticle      = $('reticle');
const tiltThumb    = $('tilt-thumb');
const tiltHint     = $('tilt-hint');
const toast        = $('toast');
const scanShimmer  = $('scan-shimmer');
// Circular badge refs (replace old linear bar)
const circularBadge   = $('circular-score-badge');
const circularFill    = $('circular-conf-fill');
const circularValue   = $('circular-conf-value');
// Keep legacy refs alive so decayConfidence can read last value
let _lastConfidence = 0;

/* =====================================================
   LAUNCH
   ===================================================== */
document.getElementById('restaurant-name').textContent = RESTAURANT.brand;
document.getElementById('hud-brand').textContent        = RESTAURANT.brand;

startBtn.addEventListener('click', async () => {
    try {
        // Camera permission
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .catch(() => navigator.mediaDevices.getUserMedia({ video: true }));

        videoBg.srcObject = stream;
        videoBg.classList.add('active');

        // Motion permission (iOS 13+)
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const perm = await DeviceOrientationEvent.requestPermission();
            if (perm !== 'granted') showToast('MOTION SENSORS DENIED');
        }

        window.addEventListener('deviceorientation', onDeviceOrientation, true);

        launchPad.classList.add('hidden');
        hud.classList.add('active');

        STATE.started = true;
        showToast('AR ENGINE ACTIVE');

        // Attempt MindAR init
        initMindAR(stream);

    } catch (err) {
        showToast('CAMERA ACCESS REQUIRED');
        console.error(err);
    }
});

/* =====================================================
   MINDAR INTEGRATION — The Complete Brain (v2)
   Upload dish photos → MindAR Compiler → .mind file
   https://hiukim.github.io/mind-ar-js-doc/tools/compile
   ===================================================== */
async function initMindAR(cameraStream) {
    const MIND_FILE = 'assets/targets/menu_targets.mind';

    try {
        if (typeof window.MINDAR === 'undefined') throw new Error('MindAR not loaded');

        const mindarController = new window.MINDAR.IMAGE.Controller({
            inputWidth:  640,
            inputHeight: 480,
            maxTrack:    1   // single-target tracking for maximum accuracy
        });

        await mindarController.setup(cameraStream);
        await mindarController.addImageTargets(MIND_FILE);

        // Continuous rAF tracking loop
        const tick = () => {
            const results = mindarController.processVideo(videoBg);

            if (results && results.length > 0 && results[0].score > MIN_SCORE) {
                const foundIndex = results[0].targetIndex;
                const confidence = Math.round(results[0].score * 100);

                setConfidence(confidence);

                // Secondary gate: dining angle check
                if (STATE.tiltOK) {
                    lockAndShow(foundIndex, confidence);
                } else {
                    // Image match but wrong tilt — visual feedback only
                    reticle.className = 'locked';
                    tiltHint.classList.add('show');
                    $('status-text').innerText = 'ADJUST ANGLE';
                }
            } else {
                // Signal lost — decay meter and reset reticle
                tiltHint.classList.remove('show');
                decayConfidence();
            }

            window.requestAnimationFrame(tick);
        };

        tick();
        STATE.mindARActive = true;
        $('status-text').innerText = 'ENGINE READY';
        showToast('AR ENGINE ACTIVE');

    } catch (err) {
        console.warn('Image Tracking unavailable — falling back to Demo Mode.', err);
        $('status-text').innerText = 'DEMO MODE';
        runSimulatedTracking();
    }
}

/* =====================================================
   CORE ACTION — Lock & Display Dish Card
   ===================================================== */
function lockAndShow(index, score) {
    // Dedup guard: ignore repeat triggers for same dish
    if (STATE.lastFoundIndex === index && STATE.cardVisible) return;

    const dish = RESTAURANT.menu_items.find(item => item.target_index === index);
    if (!dish) return;

    STATE.currentItem    = dish;
    STATE.lastFoundIndex = index;

    // Populate card fields
    $('card-title').innerText    = dish.name;
    $('card-desc').innerText     = dish.description;
    $('card-category').innerText = dish.category;

    // Ingredients — elegant icon strip format
    $('ingredients-wrap').innerHTML =
        dish.ingredients_list.map(ing =>
            `<div class="ing-icon-item">
                <div class="ing-circle">✨</div>
                <span class="ing-label">${ing}</span>
            </div>`
        ).join('');

    // Allergy banner
    if (dish.allergy_warnings) {
        $('allergy-banner').style.display = 'flex';
        $('allergy-text').innerText = dish.allergy_warnings;
    } else {
        $('allergy-banner').style.display = 'none';
    }

    // Animate card in
    arCard.classList.remove('dismissing');
    arCard.classList.add('visible');
    STATE.cardVisible = true;

    // Reticle → locked state
    reticle.className = 'locked';
    scanShimmer.classList.remove('shimmer-active');
    $('status-text').innerText = 'LOCKED';
    tiltHint.classList.remove('show');

    showToast(`DISH IDENTIFIED: ${dish.name}`);
}

/* =====================================================
   DEVICE ORIENTATION — Tilt Gate (30°–70°)
   ===================================================== */
function onDeviceOrientation(e) {
    // beta: 0° = phone flat, 90° = phone upright (portrait held at table)
    let tilt = Math.abs(e.beta);
    STATE.tiltAngle = tilt;

    // Map tilt into the valid zone for visual thumb position
    let percent = ((tilt - MIN_TILT) / (MAX_TILT - MIN_TILT)) * 100;
    percent = Math.max(0, Math.min(100, percent));
    tiltThumb.style.top = `${100 - percent}%`;  // inverted: top=100% at MIN, top=0% at MAX

    if (tilt >= MIN_TILT && tilt <= MAX_TILT) {
        STATE.tiltOK = true;
        tiltHint.classList.remove('show');
        tiltThumb.style.background = 'var(--gold)';
    } else {
        STATE.tiltOK = false;
        if (STATE.started && !STATE.cardVisible) tiltHint.classList.add('show');
        tiltThumb.style.background = '#ff4b2b';  // red = wrong angle
    }

    // Status dot reflects tilt validity
    const dot = $('status-dot');
    dot.style.background = STATE.tiltOK ? '#4caf50' : '#ffb400';
    dot.style.boxShadow  = `0 0 8px ${STATE.tiltOK ? '#4caf50' : '#ffb400'}`;
}

/* =====================================================
   CONFIDENCE METER — Circular SVG Badge
   val: 0–100 integer
   ===================================================== */
function setConfidence(val) {
    val = Math.max(0, Math.min(100, val));
    _lastConfidence = val;

    // Drive the SVG ring (stroke-dasharray: filled, gap)
    circularFill.setAttribute('stroke-dasharray', `${val}, 100`);
    circularValue.innerText = val + '%';

    // Show badge when there's signal, hide when silent
    if (val > 0) {
        circularBadge.classList.add('visible');
    } else {
        circularBadge.classList.remove('visible');
    }
}

function decayConfidence() {
    if (_lastConfidence > 0) {
        setConfidence(Math.max(0, _lastConfidence - 5));
    } else {
        // Fully decayed — reset to scanning state
        circularBadge.classList.remove('visible');
        reticle.className = 'scanning';
        scanShimmer.classList.add('shimmer-active');
        if (STATE.cardVisible) dismissCard();
    }
}

/* =====================================================
   DISMISS CARD
   ===================================================== */
function dismissCard() {
    arCard.classList.add('dismissing');
    arCard.classList.remove('visible');
    setTimeout(() => arCard.classList.remove('dismissing'), 400);
    STATE.cardVisible    = false;
    STATE.currentItem    = null;
    STATE.lastFoundIndex = -1;
    $('status-text').innerText = 'SCANNING';
    reticle.className = 'scanning';
    scanShimmer.classList.add('shimmer-active');
}

$('btn-dismiss').onclick  = dismissCard;
$('card-handle').onclick  = dismissCard;

/* =====================================================
   VIDEO MODAL
   ===================================================== */
$('btn-video').onclick = () => {
    if (!STATE.currentItem) return;
    const modal = $('video-modal');
    const v     = $('modal-video');
    v.src = STATE.currentItem.video_preview;
    modal.classList.add('open');
    v.play().catch(() => {});
};

$('modal-close').onclick = () => {
    $('video-modal').classList.remove('open');
    $('modal-video').pause();
    $('modal-video').src = '';
};

/* =====================================================
   TOAST
   ===================================================== */
function showToast(msg) {
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

/* =====================================================
   SIMULATED DEMO TRACKING
   Activates automatically when MindAR / .mind file is
   unavailable — demonstrates the full UI flow.
   ===================================================== */
function runSimulatedTracking() {
    const dishes = RESTAURANT.menu_items;
    let simPhase = 0;

    // Build an ascending confidence ramp then trigger lock
    let rampValue  = 0;
    let ramping    = false;
    let targetIdx  = 0;

    const rampInterval = setInterval(() => {
        if (!ramping) {
            // Reset and pick next dish
            targetIdx = simPhase % dishes.length;
            rampValue = 0;
            ramping   = true;
            reticle.className = 'scanning';
            scanShimmer.classList.add('shimmer-active');
            $('status-text').innerText = 'SCANNING';
            setConfidence(0);
        } else {
            rampValue += 8 + Math.random() * 6;
            if (rampValue >= 100) rampValue = 100;
            setConfidence(Math.round(rampValue));

            if (rampValue >= 72 && STATE.tiltOK) {
                lockAndShow(dishes[targetIdx].target_index, Math.round(rampValue));
                ramping = false;
                simPhase++;
                // Auto-dismiss after 4s then scan next dish
                setTimeout(() => dismissCard(), 4000);
            }
        }
    }, 350);

    // Ensure tilt is valid for demo
    setTimeout(() => {
        STATE.tiltAngle = 50;
        STATE.tiltOK    = true;
        tiltThumb.style.top        = '50%';
        tiltThumb.style.background = 'var(--gold)';
        const dot = $('status-dot');
        dot.style.background = '#4caf50';
        dot.style.boxShadow  = '0 0 8px #4caf50';
    }, 800);

    showToast('DEMO MODE ACTIVE');
}
</script>
</body>
