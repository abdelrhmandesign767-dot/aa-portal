<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>UMAMI PRIME | AR Gastronomy Portal</title>

  <!-- Typefaces: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Three.js (r128 — same version as original) -->
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

  <!-- Tesseract.js v4 — OCR engine for dish name recognition (eng + ara) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <!-- NOTE: MindAR script kept for production integration.
       In demo mode the AR cycle uses a JS timer instead of .mind anchors.
       Swap initDemoCycle() with real anchor callbacks when deploying. -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script> -->

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS — Obsidian Atelier
       Gold-on-black luxury. Every size from the φ scale (×1.618).
    ═══════════════════════════════════════════════════════════════ */
    :root {
      /* Palette */
      --gold:          #d4af37;
      --gold-pale:     #e8d48a;
      --gold-dim:      rgba(212,175,55,0.10);
      --gold-mid:      rgba(212,175,55,0.22);
      --gold-glow:     rgba(212,175,55,0.55);
      --ink:           #050505;
      --ink-lift:      #0c0c0c;
      --surface:       rgba(5,5,5,0.97);
      --white:         #f5f0e8;
      --text-hi:       #f5f0e8;
      --text-lo:       rgba(245,240,232,0.45);
      --text-mid:      rgba(245,240,232,0.70);
      --success:       #4db87a;
      --danger:        #e05a5a;
      --border-hair:   rgba(212,175,55,0.18);
      --border-mid:    rgba(212,175,55,0.30);

      /* φ Spacing */
      --s1:  5px;   --s2:  8px;   --s3: 13px;
      --s4: 21px;   --s5: 34px;   --s6: 55px;  --s7: 89px;

      /* φ Type scale */
      --t-2xs: 9px;  --t-xs: 11px; --t-sm: 13px;
      --t-md:  16px; --t-lg: 21px; --t-xl: 34px;
      --t-2xl: 55px; --t-3xl: 89px;

      /* Golden-ratio blade width */
      --blade-w: calc(100vw / 1.618);

      /* Easing library */
      --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out:     cubic-bezier(0.65, 0, 0.35, 1);

      /* Durations */
      --dur-blade: 0.78s;
      --dur-block: 0.60s;
    }

    /* ─── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-hi);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Grain overlay (subtle film texture across entire UI) ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
      opacity: 0.55;
    }


    /* ═══════════════════════════════════════════════════════════════
       LAUNCH SCREEN
    ═══════════════════════════════════════════════════════════════ */
    #launchScreen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; background: var(--ink);
      transition: opacity 1s var(--ease-out-expo),
                  visibility 1s var(--ease-out-expo);
    }
    #launchScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .launch-bg {
      position: absolute; inset: -8%;
      background-size: cover; background-position: center;
      filter: blur(14px) brightness(0.4);
      z-index: 0; will-change: transform;
    }
    .launch-scrim {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 60%,
                  rgba(5,5,5,0.35) 0%, rgba(5,5,5,0.88) 100%);
      z-index: 1;
    }
    .launch-body {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--s5);
      text-align: center; padding: var(--s5);
    }

    /* Wordmark */
    .launch-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      letter-spacing: 14px; color: var(--gold);
      text-transform: uppercase;
      animation: riseIn 1.1s var(--ease-out-expo) both;
    }
    .launch-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--white); letter-spacing: 2px;
      animation: riseIn 1.2s var(--ease-out-expo) 0.1s both;
    }
    .launch-sub {
      font-size: var(--t-2xs); color: var(--text-lo);
      letter-spacing: 5px; text-transform: uppercase;
      animation: riseIn 1.3s var(--ease-out-expo) 0.2s both;
    }

    /* Portal CTA */
    .portal-ring {
      position: relative; margin-top: var(--s4);
      width: 190px; height: 190px;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-mid); cursor: pointer;
      box-shadow: 0 0 0 1px rgba(212,175,55,0.08),
                  0 20px 60px rgba(0,0,0,0.7),
                  0 0 80px rgba(212,175,55,0.15);
      animation: portalBreath 3.5s ease-in-out infinite,
                 riseIn 1.4s var(--ease-out-expo) 0.3s both;
      transition: box-shadow 0.3s ease, transform 0.4s var(--ease-spring);
    }
    .portal-ring:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 0 1px var(--gold-mid),
                  0 30px 80px rgba(0,0,0,0.8),
                  0 0 120px rgba(212,175,55,0.3);
    }
    .portal-img {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
      transition: transform 0.6s var(--ease-out-expo);
    }
    .portal-ring:hover .portal-img { transform: scale(1.08); }
    .portal-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      transition: opacity 0.3s ease;
    }
    .portal-ring:hover .portal-scrim { opacity: 0; }
    .portal-icon {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    @keyframes portalBreath {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.08), 0 20px 60px rgba(0,0,0,0.7), 0 0  80px rgba(212,175,55,0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.7), 0 0 130px rgba(212,175,55,0.30); }
    }

    /* HUD corner buttons */
    .hud-corner {
      position: absolute; z-index: 15;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s var(--ease-spring);
    }
    .hud-corner:hover {
      background: rgba(212,175,55,0.18);
      border-color: var(--gold-mid);
      transform: scale(1.12);
    }
    .hud-corner svg {
      width: 18px; height: 18px;
      stroke: var(--text-mid); stroke-width: 1.5;
      fill: none; transition: stroke 0.2s ease;
    }
    .hud-corner:hover svg { stroke: var(--gold); }
    .corner-tl { top: var(--s5); left: var(--s5); }
    .corner-tr { top: var(--s5); right: var(--s5); }

    /* Language pill */
    .lang-pill {
      position: absolute; bottom: var(--s5); right: var(--s5);
      display: flex; gap: 2px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 24px; padding: 3px 5px;
      z-index: 15;
    }
    .lang-opt {
      padding: 4px 10px; border-radius: 18px;
      font-size: var(--t-2xs); font-weight: 500;
      letter-spacing: 1px; cursor: pointer;
      color: var(--text-lo);
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lang-opt.active,
    .lang-opt:hover { background: var(--gold); color: var(--ink); }


    /* ═══════════════════════════════════════════════════════════════
       AR VIEWPORT STACK
       z2: camera video (environment)
       z3: Three.js canvas (parallax render — transparent bg)
       z4: invisible pointer-events target
       z60: HUD overlay
    ═══════════════════════════════════════════════════════════════ */
    #videoFeed {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #videoFeed.on { display: block; }

    #parallaxCanvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      display: none; pointer-events: none;
    }
    #parallaxCanvas.on { display: block; }

    /* Invisible div that catches clicks and forwards to Raycaster */
    #arOverlay {
      position: fixed; inset: 0; z-index: 4;
      display: none; cursor: crosshair;
    }
    #arOverlay.on { display: block; }

    /* ─── HUD bar ──────────────────────────────────────────────── */
    #hudBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      padding: var(--s4) var(--s5);
      display: none; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
      backdrop-filter: blur(12px);
      font-size: var(--t-2xs); letter-spacing: 2.5px; text-transform: uppercase;
    }
    #hudBar.on { display: flex; }
    .hud-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-sm); font-weight: 600;
      letter-spacing: 4px; color: var(--gold);
    }
    .hud-status-pill {
      display: flex; align-items: center; gap: var(--s2);
      color: var(--text-lo);
    }
    .hud-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 7px var(--success);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

    /* ─── OCR Status Pill (primary trigger indicator) ──────────── */
    #ocrPill {
      display: flex; align-items: center; gap: var(--s2);
      padding: 4px 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--border-hair);
      border-radius: 20px;
      font-size: var(--t-2xs); letter-spacing: 2px;
      color: var(--text-lo);
      transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
    }
    #ocrPill[data-status="ready"]    { border-color: var(--border-mid); color: var(--text-lo); }
    #ocrPill[data-status="scanning"] { border-color: rgba(77,184,122,0.4); color: rgba(77,184,122,0.9); }
    #ocrPill[data-status="locked"]   { border-color: var(--gold-mid); color: var(--gold); background: var(--gold-dim); }
    #ocrPill[data-status="error"]    { border-color: rgba(224,90,90,0.4); color: rgba(224,130,130,0.8); }
    #ocrPill[data-status="init"]     { border-color: var(--border-hair); color: var(--text-lo); }

    .ocr-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor;
      animation: ocrPulse 1.4s ease-in-out infinite;
    }
    @keyframes ocrPulse { 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:0.4; transform:scale(0.7);} }
    #ocrPill[data-status="locked"] .ocr-dot { animation: none; opacity: 1; }
    #ocrPill[data-status="error"]  .ocr-dot { animation: none; opacity: 0.7; }

    /* ─── OCR Viewfinder overlay (subtle scan line while AR is active) */
    #ocrViewfinder {
      position: fixed; inset: 0; z-index: 5;
      pointer-events: none;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #ocrViewfinder.on { display: block; }
    #ocrViewfinder.scanning { opacity: 1; }

    .ocr-scanline {
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(77,184,122,0.6) 20%,
        rgba(212,175,55,0.9) 50%,
        rgba(77,184,122,0.6) 80%,
        transparent 100%);
      border-radius: 1px;
      animation: scanSweep 2.5s linear infinite;
      box-shadow: 0 0 12px rgba(212,175,55,0.5);
    }
    @keyframes scanSweep {
      0%   { top: 15%; opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { top: 85%; opacity: 0; }
    }

    .ocr-corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.55;
    }
    .ocr-corner.tl { top: 14%; left: 9%; border-width: 2px 0 0 2px; }
    .ocr-corner.tr { top: 14%; right: 9%; border-width: 2px 2px 0 0; }
    .ocr-corner.bl { bottom: 14%; left: 9%; border-width: 0 0 2px 2px; }
    .ocr-corner.br { bottom: 14%; right: 9%; border-width: 0 2px 2px 0; }


    /* ═══════════════════════════════════════════════════════════════
       ★ SIDE BLADE — Luxury Motion Graphics Panel
    ═══════════════════════════════════════════════════════════════ */
    #sideBlade {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: var(--blade-w); max-width: 100%; z-index: 100;
      background: var(--surface);
      border-left: 1px solid var(--border-hair);
      box-shadow: inset 2px 0 0 0 rgba(212,175,55,0.12),
                  -20px 0 80px rgba(0,0,0,0.6);
      overflow-y: auto; overflow-x: hidden;
      padding: var(--s7) var(--s5) var(--s6) var(--s5);
      display: flex; flex-direction: column; gap: 0;
      transform: translateX(105%);
      transition: transform var(--dur-blade) var(--ease-out-expo);
      will-change: transform;
    }
    #sideBlade.active { transform: translateX(0); }

    #sideBlade::-webkit-scrollbar { width: 3px; }
    #sideBlade::-webkit-scrollbar-thumb { background: var(--border-hair); border-radius: 2px; }

    /* Close button */
    .blade-x {
      position: absolute; top: var(--s4); right: var(--s4);
      width: 34px; height: 34px;
      background: transparent; border: 1px solid var(--border-hair);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-lo); font-size: 18px;
      transition: color 0.2s ease, border-color 0.2s ease,
                  transform 0.3s var(--ease-spring), background 0.2s ease;
    }
    .blade-x:hover {
      color: var(--gold); border-color: var(--gold-mid);
      background: var(--gold-dim); transform: rotate(90deg);
    }

    /* ─── motion-element BASE STATE (hidden) ───────────────────── */
    .motion-element {
      opacity: 0;
      transform: translateY(26px);
      transition:
        opacity  var(--dur-block) var(--ease-out-expo),
        transform var(--dur-block) var(--ease-out-expo);
      will-change: opacity, transform;
    }

    /* When blade gets .active → children cascade in */
    #sideBlade.active .motion-element {
      opacity: 1;
      transform: translateY(0);
    }

    /* ★ Staggered delay classes */
    .delay-1 { transition-delay: 0.10s; }
    .delay-2 { transition-delay: 0.22s; }
    .delay-3 { transition-delay: 0.34s; }
    .delay-4 { transition-delay: 0.46s; }
    .delay-5 { transition-delay: 0.58s; }

    /* When blade closes, blocks snap back (no delay on exit) */
    #sideBlade:not(.active) .motion-element {
      transition-delay: 0s !important;
    }

    /* ─── BLOCK 1: Title + Category ────────────────────────────── */
    .blade-block { width: 100%; }

    .blade-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-xl); font-weight: 700;
      color: var(--white); letter-spacing: 0.5px;
      line-height: 1.1;
    }
    .blade-category {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); font-weight: 500;
      color: var(--gold); letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* ─── BLOCK 2: Google Maps Rating ──────────────────────────── */
    .blade-rating-block {
      margin-top: var(--s4); padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .google-maps-link {
      display: inline-flex; align-items: center; gap: var(--s3);
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .google-maps-link:hover { opacity: 0.72; }
    .star-row {
      font-size: 15px; letter-spacing: 2px;
      color: var(--gold);
    }
    .rating-label-wrap { display: flex; flex-direction: column; gap: 1px; }
    .rating-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-md); font-weight: 600;
      color: var(--white); line-height: 1;
    }
    .rating-cta {
      font-size: var(--t-2xs); font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-lo);
      border-bottom: 1px solid var(--border-hair);
      padding-bottom: 1px;
    }

    /* ─── BLOCK 3: Price ────────────────────────────────────────── */
    .blade-price-block {
      margin-top: var(--s5); padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .price-amount {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-2xl); font-weight: 300; font-style: italic;
      color: var(--gold); line-height: 1;
      letter-spacing: -1px;
    }
    .price-per {
      display: block; margin-top: var(--s2);
      font-size: var(--t-2xs); font-weight: 400;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ─── BLOCK 4: Ingredients ─────────────────────────────────── */
    .blade-ingredients-block {
      margin-top: var(--s5); padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .ingredients-eyebrow {
      font-size: var(--t-2xs); font-weight: 500;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-lo); margin-bottom: var(--s3);
    }
    .ingredients-prose {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--t-lg); font-weight: 300; font-style: italic;
      color: var(--text-mid); line-height: 1.55;
    }
    .allergen-strip {
      margin-top: var(--s3);
      padding: var(--s2) var(--s3);
      background: rgba(224,90,90,0.07);
      border-left: 2px solid rgba(224,90,90,0.55);
      border-radius: 3px;
      font-size: var(--t-xs); color: rgba(224,130,130,0.9);
      line-height: 1.5; display: none;
    }

    /* ─── BLOCK 5: Video CTA ───────────────────────────────────── */
    .blade-video-block {
      margin-top: var(--s5); padding-top: var(--s4);
      border-top: 1px solid var(--border-hair);
    }
    .video-cta {
      width: 100%;
      padding: var(--s3) var(--s4);
      background: var(--gold);
      border: none; border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--t-xs); font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink); cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.35s var(--ease-spring),
                  box-shadow 0.35s ease;
    }
    .video-cta::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s ease;
    }
    .video-cta:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(212,175,55,0.40); }
    .video-cta:hover::after { left: 140%; }
    .video-cta:active { transform: translateY(0); }

    /* Social share row */
    .share-row {
      display: flex; gap: var(--s2); margin-top: var(--s4);
    }
    .share-btn {
      flex: 1; padding: var(--s2) var(--s3);
      background: transparent;
      border: 1px solid var(--border-hair);
      border-radius: 5px; color: var(--text-lo);
      font-size: 14px; cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .share-btn:hover {
      background: var(--gold-dim); border-color: var(--gold-mid); color: var(--gold);
    }


    /* ═══════════════════════════════════════════════════════════════
       VIDEO MODAL

<video  id="videoFeed"      playsinline autoplay muted></video>

</div>

    <span class="price-per"    data-i18n="price_label" id="bladePriceLabel">PER PERSON</span>

  <!-- ─── Block 4: Ingredients (text-only, no icons) ─────────── -->

  </div>
</aside>

/* ─────────────────────────────────────────────────────────────────
   ★★★ THREE.JS PARALLAX DEPTH SYSTEM ★★★

   Architecture:
     #ar-dish-container  (THREE.Group)
       ├── glowMesh      bg layer  pos.z=-0.15  slow rotation
       └── dishMesh      fg layer  pos.z=0      foreground

   Raycasting on #arOverlay clicks fires openBlade().
   Hot-swap: switchDish(dish) replaces the dishMesh texture live.
───────────────────────────────────────────────────────────────── */

/** Build a golden radial glow + steam wisp texture entirely on a canvas. */
function makeGlowTexture() {
  const cv  = document.createElement('canvas');
  cv.width  = 512;
  cv.height = 512;
  const ctx = cv.getContext('2d');

  // Radial gold halo
  const halo = ctx.createRadialGradient(256,256,0, 256,256,256);
  halo.addColorStop(0,    'rgba(212,175,55,0.85)');
  halo.addColorStop(0.28, 'rgba(200,145,40,0.55)');
  halo.addColorStop(0.58, 'rgba(180,100,20,0.18)');
  halo.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0,0,512,512);

  // Steam wisps
  const wisps = [[230,120,48],[280,95,36],[255,155,55],[220,175,42],[290,140,38],[245,105,52]];
  wisps.forEach(([wx,wy,r]) => {
    const g = ctx.createRadialGradient(wx,wy,0, wx,wy,r);
    g.addColorStop(0, 'rgba(255,248,220,0.22)');
    g.addColorStop(1, 'rgba(255,248,220,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,512,512);
  });

  // Outer soft bloom ring
  const bloom = ctx.createRadialGradient(256,256,160, 256,256,256);
  bloom.addColorStop(0,   'rgba(212,175,55,0)');
  bloom.addColorStop(0.7, 'rgba(212,175,55,0.08)');
  bloom.addColorStop(1,   'rgba(212,175,55,0.20)');
  ctx.fillStyle = bloom;
  ctx.fillRect(0,0,512,512);

  return new THREE.CanvasTexture(cv);
}

function buildParallaxScene(dish) {
  const canvas  = el('parallaxCanvas');
  const W = window.innerWidth, H = window.innerHeight;

  // Renderer — alpha:true keeps it transparent over the camera feed
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(52, W/H, 0.01, 100);
  camera.position.z = 2.4;

  /* ── #ar-dish-container ──────────────────────────────────── */
  const arDishContainer = new THREE.Group();
  arDishContainer.name = 'ar-dish-container';
  scene.add(arDishContainer);

  /* ── Background Layer: glow/steam ─────────────────────────── */
  const glowMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2.4, 2.4),
    new THREE.MeshBasicMaterial({
      map:         makeGlowTexture(),
      transparent: true,
      opacity:     0.75,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending
    })
  );
  glowMesh.position.z = -0.15;
  glowMesh.name = 'ar-glow-layer';
  arDishContainer.add(glowMesh);

  /* ── Foreground Layer: dish image ────────────────────────── */
  const dishMat   = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
  const dishMesh  = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.6), dishMat);
  dishMesh.position.z = 0;
  dishMesh.name = 'ar-dish-layer';
  arDishContainer.add(dishMesh);

  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  function loadDishImage(url) {
    loader.load(url,
      (tex) => {
        tex.minFilter = THREE.LinearFilter;
        dishMat.map     = tex;
        dishMat.opacity = 1;
        dishMat.needsUpdate = true;
      },
      undefined,
      () => { dishMat.opacity = 0.8; }
    );
  }
  loadDishImage(dish.image);

  /* ── Raycaster — wired to #arOverlay clicks ───────────────── */
  const ray     = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const overlay = el('arOverlay');

  function onHit(e) {
    const src  = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    pointer.x  =  ((src.clientX - rect.left) / rect.width)  * 2 - 1;
    pointer.y  = -((src.clientY - rect.top)  / rect.height) * 2 + 1;
    ray.setFromCamera(pointer, camera);
    const hits = ray.intersectObjects([dishMesh, glowMesh]);
    if (hits.length) openBlade(STATE.currentDish || dish);
  }
  overlay.addEventListener('click',      onHit);
  overlay.addEventListener('touchstart', onHit, { passive: true });

  /* ── Mouse / Gyro parallax ──────────────────────────────── */
  let tgtX = 0, tgtY = 0, curX = 0, curY = 0;

  window.addEventListener('mousemove', (e) => {
    tgtY = ((e.clientX / W) - 0.5) *  0.40;
    tgtX = ((e.clientY / H) - 0.5) * -0.28;
  });
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma != null) tgtY =  (e.gamma / 60) *  0.32;
    if (e.beta  != null) tgtX = ((e.beta  - 45) / 45) * -0.22;
  });

  /* ── Animation loop ─────────────────────────────────────── */
  const clock = new THREE.Clock();
  let   raf   = null;

  function loop() {
    raf = requestAnimationFrame(loop);
    const elapsed = clock.getElapsedTime();

    // Slow, continuous rotation on the background glow layer
    glowMesh.rotation.z = elapsed * (Math.PI * 2 / 35);

    // Parallax lerp
    const L = 0.04;
    curX += (tgtX - curX) * L;
    curY += (tgtY - curY) * L;
    arDishContainer.rotation.x = curX;
    arDishContainer.rotation.y = curY;

    renderer.render(scene, camera);
  }
  loop();

  /* ── Resize ─────────────────────────────────────────────── */
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);

  /* ── Public context ─────────────────────────────────────── */
  return {
    renderer, scene, camera,
    arDishContainer, glowMesh, dishMesh,
    loadDishImage,
    raf, onResize, overlay, onHit,
    destroy() {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      overlay.removeEventListener('click',      onHit);
      overlay.removeEventListener('touchstart', onHit);
      renderer.dispose();
    }
  };
}

/** Hot-swap the foreground dish texture (no scene rebuild needed). */
function switchDish(dish) {
  STATE.currentDish = dish;
  if (STATE.pxCtx) STATE.pxCtx.loadDishImage(dish.image);
}


/* ─────────────────────────────────────────────────────────────────
   ★★★ SIDE BLADE open / close
   openBlade()  → populates all 5 blocks + adds .active
   closeBlade() → removes .active (motion-elements reverse)
   Updated for: bilingual EN/AR names, array allergens.
───────────────────────────────────────────────────────────────── */
function openBlade(dish) {
  if (!dish) return;
  STATE.bladeOpen   = true;
  STATE.currentDish = dish;

  const isAr = STATE.lang === 'ar';

  /* ── Block 1: Title + Category ─────────────────────────────── */
  el('bladeTitle').textContent    = (isAr && dish.nameArabic)     ? dish.nameArabic     : dish.name;
  el('bladeCategory').textContent = (isAr && dish.categoryArabic) ? dish.categoryArabic : dish.category;

  /* ── Block 2: Rating ────────────────────────────────────────── */
  el('bladeStars').textContent    = '★'.repeat(Math.round(dish.rating));
  el('bladeScore').textContent    = dish.rating.toFixed(1);
  el('bladeRateCta').textContent  = t('rate_google');
  el('googleMapsLink').href       = CONFIG.restaurant.googleMapsUrl;

  /* ── Block 3: Price ─────────────────────────────────────────── */
  el('bladePrice').textContent      = dish.price;
  el('bladePriceLabel').textContent = t('price_label');

  /* ── Block 4: Ingredients ───────────────────────────────────── */
  el('bladeIngLabel').textContent = t('ingredients_label');
  const ings = (isAr && dish.ingredientsArabic) ? dish.ingredientsArabic : dish.ingredients;
  el('bladeIngText').textContent  = Array.isArray(ings) ? ings.join('  ·  ') : (ings || '—');

  // Handle both string and array allergens
  const allergenSrc = (isAr && dish.allergenArabic) ? dish.allergenArabic : dish.allergens;
  const allergenStr = Array.isArray(allergenSrc)
    ? allergenSrc.join(', ')
    : (typeof allergenSrc === 'string' ? allergenSrc : '');
  if (allergenStr) {
    el('allergenText').textContent    = allergenStr;
    el('allergenStrip').style.display = 'block';
  } else {
    el('allergenStrip').style.display = 'none';
  }

  /* ── Block 5: Video CTA label ───────────────────────────────── */
  el('videoCtaLabel').textContent = t('watch_video');

  /* ── Gesture hint ───────────────────────────────────────────── */
  el('gestureHint').textContent   = t('swipe');

  /* ── ARIA ───────────────────────────────────────────────────── */
  el('sideBlade').setAttribute('aria-hidden', 'false');

  /* CSS cubic-bezier slide + motion-element stagger */
  el('sideBlade').classList.add('active');
  el('hudStatus').textContent = t('locked');

  /* Touch swipe-right to dismiss */
  document.addEventListener('touchstart', _swipeStart, { passive: true });
  document.addEventListener('touchend',   _swipeEnd,   { passive: true });

  track('dish_identified', { id: dish.id, name: dish.name });
  toast(`${t('identified')}: ${dish.name}`);
}

function closeBlade() {
  if (!STATE.bladeOpen) return;
  STATE.bladeOpen   = false;
  STATE.currentDish = null;

  el('sideBlade').classList.remove('active');
  el('sideBlade').setAttribute('aria-hidden', 'true');
  el('hudStatus').textContent = t('tracking');

  document.removeEventListener('touchstart', _swipeStart);
  document.removeEventListener('touchend',   _swipeEnd);

  track('dish_dismissed');
}

/* Swipe-right gesture: diffX > 90 → close */
function _swipeStart(e) { STATE.touchStartX = e.touches[0].clientX; }
function _swipeEnd(e) {
  if (!STATE.bladeOpen) return;
  const diff = e.changedTouches[0].clientX - STATE.touchStartX;
  if (diff > 90) closeBlade();
}

  navigator.mediaDevices.getUserMedia({

/* ═══════════════════════════════════════════════════════════════════
   ★★★ OCR ENGINE — Primary AR Trigger Brain ★★★

   Architecture:
     1. Tesseract.js v4 worker (eng+ara, LSTM-only engine)
     2. Every 2500 ms: capture video frame → canvas → JPEG dataURL
     3. Tesseract recognizes text (handwriting-tolerant settings)
     4. fuzzyMatchDish() matches OCR output against dish names (EN & AR)
     5. On match: switchDish() + openBlade() → AR blade slides in
     6. Viewfinder scan-line overlay provides live scanning feedback

   Fuzzy matching strategy:
     a. Normalise text (lowercase, strip punctuation)
     b. Levenshtein similarity on full dish name
     c. Word-level matching: key words from dish name in OCR text
     d. Best-of-both score; triggers at SCORE_THRESHOLD = 0.52
═══════════════════════════════════════════════════════════════════ */

/* ── OCR state ────────────────────────────────────────────────── */
let _ocrWorker   = null;
let _ocrRunning  = false;
let _ocrInterval = null;
let _ocrCooldown = false;   // prevent re-triggering same dish immediately

/* ── UI helper ───────────────────────────────────────────────── */
function updateOcrStatus(status) {
  const pill = el('ocrPill');
  const span = el('ocrStatus');
  if (!pill || !span) return;

  const labels = {
    init:     '… INIT OCR',
    ready:    '◉ OCR READY',
    scanning: '⟳ SCANNING',
    locked:   '✓ DISH FOUND',
    error:    '✕ OCR OFF'
  };
  span.textContent   = labels[status] || status.toUpperCase();
  pill.dataset.status = status;

  // Toggle viewfinder scan-line
  const vf = el('ocrViewfinder');
  if (vf) {
    vf.classList.toggle('scanning', status === 'scanning');
  }
}

/* ── Levenshtein distance ────────────────────────────────────── */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  // Build row by row to save memory
  let prev = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i-1] === b[j-1]
        ? prev[j-1]
        : 1 + Math.min(prev[j-1], prev[j], curr[j-1]);
    }
    prev = curr;
  }
  return prev[n];
}

/* ── Normalise string for comparison ────────────────────────── */
function normaliseText(s) {
  return (s || '')
    .toLowerCase()
    // keep Arabic Unicode block + Latin letters + spaces
    .replace(/[^a-z\u0600-\u06ff\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

/* ── Word-level overlap score ────────────────────────────────── */
function wordOverlap(candidateNorm, ocrNorm) {
  const words = candidateNorm.split(' ').filter(w => w.length > 3);
  if (!words.length) return 0;
  let hits = 0;
  for (const word of words) {
    if (ocrNorm.includes(word)) hits++;
  }
  return hits / words.length;
}

/* ── Fuzzy similarity (normalised Levenshtein) ───────────────── */
function stringSimilarity(a, b) {
  const maxLen = Math.max(a.length, b.length);
  if (!maxLen) return 1;
  return (maxLen - levenshtein(a, b)) / maxLen;
}

/* ── Master fuzzy matcher ────────────────────────────────────── */
const OCR_SCORE_THRESHOLD = 0.52;

function fuzzyMatchDish(ocrRawText) {
  if (!ocrRawText || ocrRawText.length < 3) return null;
  const ocrNorm = normaliseText(ocrRawText);
  if (ocrNorm.length < 3) return null;

  let bestDish  = null;
  let bestScore = 0;

  for (const dish of CONFIG.menu) {
    // Build candidate strings to test against (EN name, AR name, key words)
    const candidates = [
      dish.name,
      dish.nameArabic || '',
      // Also test individual significant words as partial candidates
      ...(dish.name.split(' ').filter(w => w.length > 4)),
      ...(dish.nameArabic ? dish.nameArabic.split(' ').filter(w => w.length > 3) : [])
    ].filter(Boolean);

    for (const candidate of candidates) {
      const candNorm = normaliseText(candidate);
      if (!candNorm) continue;

      // (a) Direct substring match (strongest signal)
      if (ocrNorm.includes(candNorm)) {
        bestDish  = dish;
        bestScore = 1.0;
        break;
      }

      // (b) Word-level overlap
      const wordScore = wordOverlap(candNorm, ocrNorm);

      // (c) Levenshtein on first N chars (handles partial OCR reads)
      const sliceLen  = Math.min(ocrNorm.length, candNorm.length + 8);
      const simScore  = stringSimilarity(ocrNorm.slice(0, sliceLen), candNorm) * 0.82;

      const score = Math.max(wordScore, simScore);
      if (score > bestScore) {
        bestScore = score;
        bestDish  = dish;
      }
    }

    if (bestScore >= 1.0) break; // early exit on perfect match
  }

  return bestScore >= OCR_SCORE_THRESHOLD ? bestDish : null;
}

/* ── Capture current video frame as JPEG dataURL ─────────────── */
function captureVideoFrame() {
  const video = el('videoFeed');
  if (!video || video.readyState < 2 || !video.videoWidth) return null;

  const cv  = document.createElement('canvas');
  cv.width  = video.videoWidth;
  cv.height = video.videoHeight;
  const ctx = cv.getContext('2d');

  // Optional: mild contrast boost to help OCR on menu cards
  ctx.filter = 'contrast(1.15) brightness(1.05)';
  ctx.drawImage(video, 0, 0, cv.width, cv.height);

  return cv.toDataURL('image/jpeg', 0.88);
}

/* ── Single OCR scan tick ────────────────────────────────────── */
async function runOCRScan() {
  // Guard: skip if already running, worker not ready, AR not started, or blade open
  if (_ocrRunning || !_ocrWorker || !STATE.started) return;
  if (STATE.bladeOpen || _ocrCooldown) return;

  _ocrRunning = true;
  updateOcrStatus('scanning');

  try {
    const frameDataUrl = captureVideoFrame();
    if (!frameDataUrl) {
      updateOcrStatus('ready');
      _ocrRunning = false;
      return;
    }

    // Recognise text in frame
    const { data: { text, confidence } } = await _ocrWorker.recognize(frameDataUrl);

    if (confidence > 12 && text && text.trim().length > 2) {
      const matched = fuzzyMatchDish(text);
      if (matched && !STATE.bladeOpen) {
        // Dish detected — trigger blade
        updateOcrStatus('locked');
        _ocrCooldown = true;

        switchDish(matched);
        // Small delay so parallax image loads before blade reveals it
        setTimeout(() => {
          if (!STATE.bladeOpen) openBlade(matched);
        }, 180);

        // Re-arm after cooldown period (avoid spamming same dish)
        setTimeout(() => { _ocrCooldown = false; }, 8000);
        toast(`🔍 ${t('ocr_detected')}: ${matched.name}`);
      } else {
        updateOcrStatus('ready');
      }
    } else {
      updateOcrStatus('ready');
    }
  } catch (err) {
    console.warn('[OCR] Scan error:', err);
    updateOcrStatus('ready');
  }

  _ocrRunning = false;
}

/* ── Initialise Tesseract worker ─────────────────────────────── */
async function initOCR() {
  updateOcrStatus('init');

  if (typeof Tesseract === 'undefined') {
    console.warn('[OCR] Tesseract.js not loaded');
    updateOcrStatus('error');
    return false;
  }

  try {
    /*
     * createWorker(lang, oem, options)
     *   lang = 'eng+ara'   — English + Arabic bilingual pack
     *   oem  = 1           — LSTM-only (best accuracy, handles handwriting)
     *
     * Tesseract.js v4 auto-downloads tessdata from CDN on first run.
     * High-confidence settings for printed + handwritten menus.
     */
    _ocrWorker = await Tesseract.createWorker('eng+ara', 1, {
      logger: () => {}  // suppress verbose logs in production
    });

    await _ocrWorker.setParameters({
      tessedit_ocr_engine_mode:      '1',   // LSTM only — best for handwriting
      tessedit_pageseg_mode:         '3',   // Auto pageseg — best for real-world frames
      preserve_interword_spaces:     '1',
      tessedit_char_whitelist:       '',    // allow all characters (EN + AR)
      // Boost confidence on mixed scripts
      textord_min_linesize:          '2'
    });

    console.log('[OCR] Tesseract worker ready — eng+ara, LSTM mode');
    updateOcrStatus('ready');
    return true;

  } catch (err) {
    console.warn('[OCR] Worker initialisation failed:', err);
    updateOcrStatus('error');
    return false;
  }
}

/* ── Start OCR polling loop ──────────────────────────────────── */
async function startOCR() {
  const ok = await initOCR();
  if (!ok) return;

  // Show the viewfinder brackets now that OCR is active
  const vf = el('ocrViewfinder');
  if (vf) vf.classList.add('on');

  // Poll every 2500 ms
  _ocrInterval = setInterval(runOCRScan, 2500);
  console.log('[OCR] Polling started — interval 2500 ms');
}

/* ── Stop OCR gracefully (e.g. when page hides) ─────────────── */
async function stopOCR() {
  clearInterval(_ocrInterval);
  _ocrInterval = null;
  if (_ocrWorker) {
    await _ocrWorker.terminate().catch(() => {});
    _ocrWorker = null;
  }
  updateOcrStatus('init');
}

// Pause OCR when tab hidden; resume on visibility
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(_ocrInterval);
    _ocrInterval = null;
  } else if (_ocrWorker && STATE.started) {
    _ocrInterval = setInterval(runOCRScan, 2500);
  }
});


/* ─────────────────────────────────────────────────────────────────
   AR CYCLE — demo mode rotates through menu items (secondary trigger)
   OCR is the primary brain. Demo cycle is a visual fallback that keeps
   the 3-D parallax populated between real OCR detections.

   In production: replace with MindAR anchor callbacks.

   MindAR integration stub (uncomment when .mind file is ready):

     const mindar = new window.MINDAR.IMAGE.MindARThree({
       container: document.body,
       imageTargetSrc: CONFIG.ar.mindFile
     });
     CONFIG.menu.forEach((dish) => {
       const anchor = mindar.addAnchor(dish.targetIndex);
       anchor.onTargetFound = () => { switchDish(dish); openBlade(dish); };
       anchor.onTargetLost  = () => closeBlade();
     });
     await mindar.start();
───────────────────────────────────────────────────────────────── */
function startDemoCycle() {
  let idx = 0;
  const dishes = CONFIG.menu;

  // Prime first dish immediately so parallax has something to render
  switchDish(dishes[0]);
  el('hudStatus').textContent = t('tracking');

  setInterval(() => {
    // Demo cycle only rotates parallax image — does NOT auto-open blade.
    // That is OCR's job. Demo cycle is purely visual background rotation.
    if (!STATE.started || STATE.bladeOpen || _ocrCooldown) return;
    idx = (idx + 1) % dishes.length;
    switchDish(dishes[idx]);
  }, 12000);
}

window.addEventListener('deviceorientation', (e) => {
  const beta = Math.abs(e.beta || 0);
  STATE.deviceTiltOK = beta >= CONFIG.ar.tiltMin && beta <= CONFIG.ar.tiltMax;
});


/* ─────────────────────────────────────────────────────────────────
   START AR EXPERIENCE (called when portal button is tapped)
───────────────────────────────────────────────────────────────── */
function startAR() {
  STATE.started = true;

  el('videoFeed').classList.add('on');
  el('parallaxCanvas').classList.add('on');
  el('arOverlay').classList.add('on');
  el('hudBar').classList.add('on');

  startCamera();

  // Request gyro permission on iOS 13+
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(p => { if (p === 'granted') STATE.deviceTiltOK = true; })
      .catch(() => {});
  }

  STATE.pxCtx = buildParallaxScene(CONFIG.menu[0]);

  // ★ Demo cycle keeps parallax image rotating (visual fallback)
  if (CONFIG.ar.demoMode) startDemoCycle();

  // ★★★ PRIMARY TRIGGER: Start OCR engine listening to the camera feed
  startOCR();

  track('ar_started');
  toast(t('tap_dish'));
}


/* ─────────────────────────────────────────────────────────────────
   LAUNCH SCREEN INIT
───────────────────────────────────────────────────────────────── */
function initLaunch() {
  applyLang();

  el('launchBg').style.backgroundImage  = `url('${CONFIG.restaurant.heroImage}')`;
  el('portalImg').style.backgroundImage = `url('${CONFIG.restaurant.portalImage}')`;

  el('portalBtn').addEventListener('click', () => {
    track('portal_tapped');
    el('launchScreen').classList.add('hidden');
    setTimeout(startAR, 240);
  });

  // Language selector
  document.querySelectorAll('.lang-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.lang = btn.dataset.lang;
      applyLang();
      track('lang_changed', { lang: STATE.lang });
    });
  });

  // Info / menu corner buttons
  el('btnInfo').addEventListener('click', () =>
    toast(`📍 ${CONFIG.restaurant.location}  ·  📞 ${CONFIG.restaurant.phone}`)
  );
  el('btnMenu').addEventListener('click', () =>
    toast(`🍱 UMAMI PRIME — ${CONFIG.restaurant.michelin} Michelin  ·  Omakase 8 Courses`)
  );
}


/* ─────────────────────────────────────────────────────────────────
   EVENT WIRING — Blade controls, modal, share
───────────────────────────────────────────────────────────────── */

// Close blade
el('bladeClose').addEventListener('click', closeBlade);

// Video CTA → modal
el('videoCta').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  el('modalVideo').src = STATE.currentDish.videoUrl;
  el('videoModal').classList.add('open');
  el('modalVideo').play().catch(() => {});
  track('video_opened', { dish: STATE.currentDish.name });
});

// Modal close
el('modalClose').addEventListener('click', () => {
  el('videoModal').classList.remove('open');
  el('modalVideo').pause();
  el('modalVideo').src = '';
});
el('videoModal').addEventListener('click', (e) => {
  if (e.target === el('videoModal')) el('modalClose').click();
});

// Social share
el('shareIG').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `https://www.instagram.com/?caption=${encodeURIComponent('Discover ' + STATE.currentDish.name + ' at UMAMI PRIME!')}`,
    '_blank'
  );
  track('shared', { platform: 'instagram', dish: STATE.currentDish.name });
});
el('shareWA').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `https://wa.me/?text=${encodeURIComponent(STATE.currentDish.name + ' — ' + window.location.href)}`,
    '_blank'
  );
  track('shared', { platform: 'whatsapp', dish: STATE.currentDish.name });
});
el('shareMail').addEventListener('click', () => {
  if (!STATE.currentDish) return;
  window.open(
    `mailto:?subject=${encodeURIComponent('Discover ' + STATE.currentDish.name)}&body=${encodeURIComponent(window.location.href)}`,
    '_blank'
  );
  track('shared', { platform: 'email', dish: STATE.currentDish.name });
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (el('videoModal').classList.contains('open')) { el('modalClose').click(); return; }
    if (STATE.bladeOpen) { closeBlade(); return; }
  }
  // Space bar → enter AR from launch screen
  if (e.key === ' ' && !STATE.started) {
    el('launchScreen').classList.add('hidden');
    setTimeout(startAR, 240);
  }
  // Dev: press 1/2/3 to trigger dishes directly (bypasses OCR for testing)
  if (['1','2','3'].includes(e.key) && STATE.started) {
    const d = CONFIG.menu[+e.key - 1];
    if (d) {
      if (STATE.bladeOpen) closeBlade();
      setTimeout(() => { switchDish(d); openBlade(d); }, 120);
    }
  }
  // Dev: press O to force a manual OCR scan tick
  if (e.key === 'o' && STATE.started) {
    runOCRScan();
  }
});


/* ─────────────────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {
  // Optional: pull live menu from API
  if (CONFIG.api.menuUrl) {
    try {
      const res = await fetch(CONFIG.api.menuUrl);
      if (res.ok) CONFIG.menu = await res.json();
    } catch { /* use defaults */ }
  }
  initLaunch();
  track('app_loaded', { version: '2.0', lang: STATE.lang, restaurant: CONFIG.restaurant.id });
  toast('WELCOME TO UMAMI PRIME');
});
</script>
