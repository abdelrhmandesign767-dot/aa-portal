<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <title>AR Gastronomy | Premium Dining Experience</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

    <style>
        /* =====================================================
           DESIGN TOKENS — Golden Ratio System
           ===================================================== */
        :root {
            --gold:          #d4af37;
            --gold-dim:      rgba(212,175,55,0.12);
            --gold-glow:     rgba(212,175,55,0.55);
            --white:         #f7f4ee;
            --bg:            #050505;
            --surface:       rgba(8,8,8,0.92);
            --border:        rgba(212,175,55,0.25);
            --text-primary:  #f7f4ee;
            --text-muted:    rgba(247,244,238,0.60);
            --accent-warm:   #d4af37;
            --success:       #4caf50;
            --warning:       #ffb400;
            --error:         #ff6b6b;

            /* φ-Scaled Spacing */
            --sp1: 5px;
            --sp2: 8px;
            --sp3: 13px;
            --sp4: 21px;
            --sp5: 34px;
            --sp6: 55px;
            --sp7: 89px;

            /* φ-Scaled Typography */
            --t-xs:  10px;
            --t-sm:  13px;
            --t-md:  21px;
            --t-lg:  34px;
            --t-xl:  55px;
            --t-2xl: 89px;

            /* Dimensions */
            --blade-width: calc(100vw / 1.618);
            
            /* Easing */
            --ease-luxury: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-exit:   cubic-bezier(0.33, 0.66, 0.66, 1);
            --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* =====================================================
           LAUNCH SCREEN — Enhanced Cinematic Hero
           ===================================================== */
        .launch-screen {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg);
            transition: opacity 0.9s var(--ease-exit), visibility 0.9s var(--ease-exit);
        }

        .launch-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .hero-backdrop {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            background-color: #0a0a0a;
            filter: blur(12px);
            z-index: 0;
        }

        .hero-scrim {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.8) 100%);
            z-index: 1;
        }

        .hero-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--sp6);
            text-align: center;
            padding: var(--sp5);
            max-width: 90%;
        }

        .hero-brand {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-lg);
            font-weight: 900;
            letter-spacing: 12px;
            color: var(--gold);
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-messaging {
            display: flex;
            flex-direction: column;
            gap: var(--sp3);
            animation: fadeInUp 1.2s ease-out;
        }

        .hero-tagline {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-md);
            font-weight: 400;
            color: var(--white);
            letter-spacing: 2px;
            text-shadow: 0 8px 24px rgba(0,0,0,0.7);
        }

        .hero-subtitle {
            font-size: var(--t-sm);
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Portal Button with 3D Parallax */
        .portal-button {
            position: relative;
            margin-top: var(--sp4);
            width: 200px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: all 0.3s var(--ease-luxury);
            box-shadow: 0 12px 40px rgba(212,175,55,0.3);
            animation: portalPulse 3s ease-in-out infinite;
            perspective: 1000px;
        }

        .portal-inner {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.4s var(--ease-luxury);
            transform: translateZ(0);
        }

        .portal-button:hover .portal-inner {
            transform: scale(1.1) rotateX(5deg) rotateY(5deg);
        }

        .portal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 2;
            transition: opacity 0.3s var(--ease-luxury);
        }

        .portal-button:hover .portal-overlay {
            opacity: 0;
        }

        .portal-icon {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        @keyframes portalPulse {
            0%, 100% {
                box-shadow: 0 12px 40px rgba(212,175,55,0.3);
            }
            50% {
                box-shadow: 0 16px 60px rgba(212,175,55,0.6);
            }
        }

        /* Corner Buttons */
        .corner-buttons {
            position: absolute;
            z-index: 15;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .corner-buttons:hover {
            background: rgba(212,175,55,0.2);
            border-color: var(--gold);
            transform: scale(1.12);
        }

        .corner-buttons svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .corner-buttons:hover svg {
            color: var(--gold);
        }

        .btn-top-left {
            top: var(--sp5);
            left: var(--sp5);
        }

        .btn-top-right {
            top: var(--sp5);
            right: var(--sp5);
        }

        .lang-selector {
            position: absolute;
            bottom: var(--sp5);
            right: var(--sp5);
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: var(--sp1) var(--sp3);
            color: var(--text-primary);
            font-size: var(--t-xs);
            display: flex;
            gap: var(--sp2);
            cursor: pointer;
        }

        .lang-option {
            padding: var(--sp1) var(--sp2);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .lang-option:hover, .lang-option.active {
            background: var(--gold);
            color: var(--bg);
        }

        /* =====================================================
           CAMERA VIEWPORT
           ===================================================== */
        #ar-viewport {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: none;
        }

        #ar-viewport.active {
            display: block;
        }

        #video-fallback {
            position: fixed;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #video-fallback.active {
            display: block;
        }

        /* =====================================================
           HUD STATUS BAR — Minimal
           ===================================================== */
        .hud-status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 60;
            padding: var(--sp4) var(--sp5);
            display: none;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            backdrop-filter: blur(8px);
            font-size: var(--t-xs);
            letter-spacing: 2px;
        }

        .hud-status-bar.active {
            display: flex;
        }

        .hud-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 3px;
        }

        .hud-tracker {
            display: flex;
            align-items: center;
            gap: var(--sp2);
            color: var(--text-muted);
        }

        .hud-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        /* =====================================================
           SIDE BLADE — Premium Golden Ratio Panel
           ===================================================== */
        .side-blade {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: var(--blade-width);
            max-width: 100%;
            z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--border);
            transform: translateX(110%);
            transition: transform 0.8s var(--ease-luxury);
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--sp6) var(--sp5);
            display: flex;
            flex-direction: column;
            gap: var(--sp5);
        }

        .side-blade.visible {
            transform: translateX(0);
        }

        .side-blade::-webkit-scrollbar {
            width: 4px;
        }

        .side-blade::-webkit-scrollbar-track {
            background: transparent;
        }

        .side-blade::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .blade-close {
            position: absolute;
            top: var(--sp4);
            right: var(--sp4);
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            font-size: 24px;
            line-height: 1;
        }

        .blade-close:hover {
            color: var(--gold);
        }

        /* Blade Content Animations */
        .blade-content {
            display: flex;
            flex-direction: column;
            gap: var(--sp4);
            opacity: 0;
            animation: slideInContent 0.8s var(--ease-luxury) forwards;
            animation-delay: 0.15s;
        }

        @keyframes slideInContent {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-title {
            font-family: 'Playfair Display', serif;
            font-size: var(--t-lg);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
            line-height: 1.2;
            animation: slideInTitle 0.7s var(--ease-luxury);
        }

        @keyframes slideInTitle {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-category {
            font-size: var(--t-xs);
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: slideInCategory 0.7s var(--ease-luxury);
        }

        @keyframes slideInCategory {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-price {
            font-size: var(--t-md);
            color: var(--gold);
            font-weight: 700;
            animation: slideInPrice 0.8s var(--ease-luxury);
        }

        @keyframes slideInPrice {
            from {
                opacity: 0;
                transform: translateX(25px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-description {
            font-size: var(--t-sm);
            color: var(--text-muted);
            line-height: 1.6;
            font-weight: 300;
            animation: slideInDesc 0.8s var(--ease-luxury);
        }

        @keyframes slideInDesc {
            from {
                opacity: 0;
                transform: translateX(25px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-section-label {
            font-size: var(--t-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: var(--sp3);
        }

        .blade-ingredients {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp3);
        }

        .ingredient-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--sp1);
            padding: var(--sp1) var(--sp3);
            background: var(--gold-dim);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: var(--t-xs);
            color: var(--white);
            animation: slideInIng 0.8s var(--ease-luxury);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ingredient-tag:hover {
            background: var(--gold);
            color: var(--bg);
        }

        @keyframes slideInIng {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .blade-allergy {
            padding: var(--sp3) var(--sp4);
            background: rgba(255,107,107,0.1);
            border-left: 3px solid #ff6b6b;
            border-radius: 4px;
            font-size: var(--t-xs);
            color: #ff9999;
            line-height: 1.5;
            animation: slideInAllergy 1s var(--ease-luxury);
        }

        @keyframes slideInAllergy {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-rating {
            display: flex;
            align-items: center;
            gap: var(--sp2);
            font-size: var(--t-sm);
            color: var(--text-muted);
            animation: slideInRating 0.9s var(--ease-luxury);
        }

        @keyframes slideInRating {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .star {
            color: var(--gold);
            font-size: 14px;
        }

        .blade-actions {
            display: flex;
            gap: var(--sp3);
            margin-top: var(--sp4);
            animation: slideInActions 1s var(--ease-luxury);
        }

        @keyframes slideInActions {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .blade-btn {
            flex: 1;
            padding: var(--sp3) var(--sp4);
            background: var(--gold);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-size: var(--t-xs);
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .blade-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.4);
        }

        .blade-btn:active {
            transform: translateY(0);
        }

        .blade-btn.secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .blade-btn.secondary:hover {
            background: var(--gold-dim);
        }

        .social-share {
            display: flex;
            gap: var(--sp2);
            margin-top: var(--sp3);
            padding-top: var(--sp3);
            border-top: 1px solid var(--border);
            animation: slideInShare 1.1s var(--ease-luxury);
        }

        @keyframes slideInShare {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .share-btn {
            flex: 1;
            padding: var(--sp2) var(--sp3);
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .share-btn:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* =====================================================
           TOAST NOTIFICATIONS
           ===================================================== */
        .toast {
            position: fixed;
            bottom: var(--sp6);
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            z-index: 400;
            padding: var(--sp3) var(--sp5);
            background: rgba(0,0,0,0.9);
            color: var(--gold);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: var(--t-xs);
            letter-spacing: 1px;
            white-space: nowrap;
            transition: transform 0.4s var(--ease-luxury);
            pointer-events: none;
            max-width: 80%;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* =====================================================
           MODAL
           ===================================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 350;
            background: rgba(0,0,0,0.95);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--sp5);
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .modal-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-close-btn {
            position: absolute;
            top: var(--sp4);
            right: var(--sp4);
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
            font-size: 20px;
        }

        .modal-close-btn:hover {
            background: var(--gold);
            color: var(--bg);
        }

        /* =====================================================
           GESTURE INDICATOR
           ===================================================== */
        .gesture-hint {
            position: fixed;
            bottom: var(--sp5);
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            font-size: var(--t-xs);
            color: var(--text-muted);
            letter-spacing: 2px;
            text-align: center;
            animation: breatheText 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes breatheText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* =====================================================
           LOADING SPINNER
           ===================================================== */
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 400;
            display: none;
        }

        .spinner.show {
            display: block;
        }

        .spinner::after {
            content: '';
            width: 50px;
            height: 50px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* =====================================================
           UTILITIES
           ===================================================== */
        .hidden {
            display: none !important;
        }

        .no-scroll {
            overflow: hidden;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- ================================================================
     LAUNCH SCREEN
     ================================================================ -->
<div class="launch-screen" id="launchScreen">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-scrim"></div>

    <div class="corner-buttons btn-top-left" id="btnInfo" title="Restaurant Info">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 17v-6"/><circle cx="12" cy="8" r="1"/></svg>
    </div>

    <div class="corner-buttons btn-top-right" id="btnMenu" title="Full Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>

    <div class="lang-selector">
        <div class="lang-option active" data-lang="en">EN</div>
        <div class="lang-option" data-lang="ar">عربي</div>
        <div class="lang-option" data-lang="fr">FR</div>
    </div>

    <div class="hero-container">
        <div class="hero-brand" id="heroBrand">CULINARY AR</div>
        <div class="hero-messaging">
            <div class="hero-tagline" id="heroTagline">Discover Masterpieces</div>
            <div class="hero-subtitle" id="heroSubtitle">CINEMA-GRADE EXPERIENCE</div>
        </div>

        <button class="portal-button" id="portalButton">
            <div class="portal-inner" id="portalInner">
                <div class="portal-overlay"></div>
                <div class="portal-icon">🍽️</div>
            </div>
        </button>
    </div>
</div>

<!-- ================================================================
     CAMERA VIEWPORT
     ================================================================ -->
<canvas id="ar-viewport"></canvas>
<video id="video-fallback" playsinline autoplay muted></video>

<!-- ================================================================
     HUD
     ================================================================ -->
<div class="hud-status-bar" id="hudStatusBar">
    <div class="hud-brand" id="hudBrand">AR</div>
    <div class="hud-tracker">
        <div class="hud-dot"></div>
        <span id="hudStatus">INITIALIZING</span>
    </div>
</div>

<!-- ================================================================
     SIDE BLADE
     ================================================================ -->
<div class="side-blade" id="sideBlade">
    <button class="blade-close" id="bladeClose">✕</button>

    <div class="blade-content">
        <div class="blade-title" id="bladeTitle">Dish Name</div>
        <div class="blade-category" id="bladeCategory">Category</div>
        <div class="blade-price" id="bladePrice">—</div>
        <div class="blade-description" id="bladeDescription">Description</div>

        <div class="blade-rating" id="bladeRating">
            <span class="star">★★★★★</span>
            <span>(4.8)</span>
        </div>

        <div id="ingredientsSection">
            <div class="blade-section-label" id="ingredientsLabel">KEY INGREDIENTS</div>
            <div class="blade-ingredients" id="bladeIngredients"></div>
        </div>

        <div id="allergySection" class="blade-allergy hidden">
            <strong>⚠️ Allergen Warning:</strong><br>
            <span id="bladeAllergy"></span>
        </div>

        <div class="blade-actions">
            <button class="blade-btn" id="bladeVideo">WATCH</button>
            <button class="blade-btn secondary" id="bladeReserve">RESERVE</button>
        </div>

        <div class="social-share">
            <button class="share-btn" id="shareInstagram">📷</button>
            <button class="share-btn" id="shareWhatsapp">💬</button>
            <button class="share-btn" id="shareEmail">✉️</button>
        </div>
    </div>
</div>

<!-- ================================================================
     MODAL
     ================================================================ -->
<div class="modal-overlay" id="videoModal">
    <div class="modal-content">
        <button class="modal-close-btn" id="modalClose">✕</button>
        <video class="modal-video" id="modalVideo" controls playsinline></video>
    </div>
</div>

<!-- ================================================================
     GESTURE HINT
     ================================================================ -->
<div class="gesture-hint" id="gestureHint">SWIPE TO DISMISS</div>

<!-- ================================================================
     TOAST
     ================================================================ -->
<div class="toast" id="toast"></div>

<!-- ================================================================
     SPINNER
     ================================================================ -->
<div class="spinner" id="spinner"></div>

<script>
/* =====================================================================
   CONFIGURATION — Centralized, JSON-driven
   ===================================================================== */
const CONFIG = {
    // Restaurant Identity
    restaurant: {
        name: "CULINARY AR",
        tagline: "Discover Culinary Masterpieces",
        subtitle: "CINEMA-GRADE DINING EXPERIENCE",
        logo: "https://via.placeholder.com/200?text=Logo",
        heroImage: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800&q=80",
        portalImage: "https://images.unsplash.com/photo-1494142849219-8f521e3a3bcc?w=400&q=80",
        location: "Downtown, City",
        phone: "+1 (555) 123-4567",
        rating: 4.8
    },

    // AR Tracking
    arTracking: {
        mindFile: "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js",
        enableDemo: true,
        trackingConfidenceThreshold: 0.65,
        tiltMinDegrees: 25,
        tiltMaxDegrees: 75
    },

    // API Endpoints
    api: {
        menuUrl: null,  // Set to API endpoint for dynamic menu
        reservationUrl: null,
        analyticsUrl: null
    },

    // Menu Items (default)
    menu: [
        {
            id: 1,
            name: "Signature Wagyu",
            category: "Proteins",
            description: "A5 Japanese Wagyu with beurre blanc and microgreens.",
            price: "$68",
            ingredients: ["A5 Wagyu", "Beurre Blanc", "Microgreens"],
            allergens: "Contains Dairy",
            videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
            image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80",
            rating: 4.9,
            targetIndex: 0
        },
        {
            id: 2,
            name: "Saffron Risotto",
            category: "Grains",
            description: "Creamy Carnaroli rice infused with premium saffron from Iran.",
            price: "$32",
            ingredients: ["Carnaroli Rice", "Saffron", "Parmigiano"],
            allergens: "Contains Dairy",
            videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
            image: "https://images.unsplash.com/photo-1564504055112-37910bae769e?w=400&q=80",
            rating: 4.7,
            targetIndex: 1
        },
        {
            id: 3,
            name: "Sea Urchin Delice",
            category: "Seafood",
            description: "Uni from Santa Barbara with crispy nori and yuzu emulsion.",
            price: "$52",
            ingredients: ["Sea Urchin (Uni)", "Nori", "Yuzu"],
            allergens: "Contains Shellfish, Fish",
            videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
            image: "https://images.unsplash.com/photo-1553521033-f6b9a21e9e0f?w=400&q=80",
            rating: 4.8,
            targetIndex: 2
        }
    ],

    // Translations
    i18n: {
        en: {
            brand: "CULINARY AR",
            tagline: "Discover Culinary Masterpieces",
            subtitle: "CINEMA-GRADE DINING EXPERIENCE",
            ingredients: "KEY INGREDIENTS",
            watch: "WATCH",
            reserve: "RESERVE",
            swipe: "SWIPE TO DISMISS",
            identified: "IDENTIFIED",
            tracking: "TRACKING",
            locked: "LOCKED"
        },
        ar: {
            brand: "طهي AR",
            tagline: "اكتشف روائع الطهي",
            subtitle: "تجربة سينمائية الجودة",
            ingredients: "المكونات الأساسية",
            watch: "مشاهدة",
            reserve: "احجز",
            swipe: "اسحب للإغلاق",
            identified: "تم التحديد",
            tracking: "جاري التتبع",
            locked: "مقفول"
        },
        fr: {
            brand: "CULINAIRE AR",
            tagline: "Découvrez les Chefs-d'œuvre",
            subtitle: "EXPÉRIENCE CINÉMATOGRAPHIQUE",
            ingredients: "INGRÉDIENTS CLÉS",
            watch: "REGARDER",
            reserve: "RÉSERVER",
            swipe: "GLISSEZ POUR FERMER",
            identified: "IDENTIFIÉ",
            tracking: "SUIVI",
            locked: "VERROUILLÉ"
        }
    }
};

/* =====================================================================
   STATE MANAGEMENT
   ===================================================================== */
const STATE = {
    appStarted: false,
    cameraActive: false,
    bladeVisible: false,
    currentDish: null,
    deviceTiltOK: false,
    lastDetectedIndex: -1,
    mindARActive: false,
    currentLanguage: 'en',
    touchStartX: 0,
    menuLoaded: false
};

/* =====================================================================
   UTILITIES
   ===================================================================== */
const $ = (id) => document.getElementById(id);

const showToast = (msg, duration = CONFIG.animations?.toastDuration || 3000) => {
    const el = $('toast');
    el.innerText = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
};

const t = (key) => {
    const translations = CONFIG.i18n[STATE.currentLanguage];
    return translations?.[key] || CONFIG.i18n.en[key] || key;
};

const formatIngredients = (ingredients) => {
    const icons = ['🌿', '🧂', '🔥', '💧', '✨', '🎯', '🌶️', '🍋'];
    return ingredients.map((ing, idx) => ({
        text: ing,
        icon: icons[idx % icons.length]
    }));
};

const trackEvent = (eventName, data = {}) => {
    if (CONFIG.api.analyticsUrl) {
        fetch(CONFIG.api.analyticsUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event: eventName, ...data })
        }).catch(() => {});
    }
};

/* =====================================================================
   INITIALIZATION
   ===================================================================== */
function initVideo() {
    const video = $('video-fallback');
    if (navigator.mediaDevices?.getUserMedia) {
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        })
            .then((stream) => {
                video.srcObject = stream;
                video.onloadedmetadata = () => video.play().catch(() => {});
            })
            .catch((err) => console.warn('Camera:', err));
    }
}

async function loadMenu() {
    if (CONFIG.api.menuUrl) {
        try {
            const response = await fetch(CONFIG.api.menuUrl);
            CONFIG.menu = await response.json();
            STATE.menuLoaded = true;
        } catch (err) {
            console.warn('Menu API error, using default:', err);
        }
    }
}

function initLaunchScreen() {
    const screen = $('launchScreen');
    const backdrop = $('heroBackdrop');
    const portal = $('portalButton');
    const portalInner = $('portalInner');

    // Set branding
    $('heroBrand').innerText = t('brand');
    $('heroTagline').innerText = t('tagline');
    $('heroSubtitle').innerText = t('subtitle');
    $('hudBrand').innerText = CONFIG.restaurant.name.substring(0, 2).toUpperCase();

    // Set images
    backdrop.style.backgroundImage = `url('${CONFIG.restaurant.heroImage}')`;
    portalInner.style.backgroundImage = `url('${CONFIG.restaurant.portalImage}')`;

    // Portal interaction
    portal.addEventListener('click', () => {
        trackEvent('portal_clicked');
        screen.classList.add('hidden');
        setTimeout(() => startARExperience(), 200);
    });

    // Language selector
    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            STATE.currentLanguage = opt.dataset.lang;
            updateLanguage();
            trackEvent('language_changed', { lang: STATE.currentLanguage });
        });
    });
}

function updateLanguage() {
    $('heroBrand').innerText = t('brand');
    $('heroTagline').innerText = t('tagline');
    $('heroSubtitle').innerText = t('subtitle');
    $('ingredientsLabel').innerText = t('ingredients');
    $('gestureHint').innerText = t('swipe');
    if (STATE.bladeVisible) {
        document.getElementById('bladeVideo').innerText = t('watch');
        document.getElementById('bladeReserve').innerText = t('reserve');
    }
}

function startARExperience() {
    STATE.appStarted = true;
    STATE.cameraActive = true;

    $('hudStatusBar').classList.add('active');
    $('video-fallback').classList.add('active');
    $('gestureHint').classList.add('show');

    if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then((perm) => {
                    if (perm === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation);
                    }
                })
                .catch(() => {});
        } else {
            window.addEventListener('deviceorientation', onDeviceOrientation);
        }
    }

    initMindAR();
    trackEvent('ar_started');
    showToast('AR ENGINE ACTIVE');
}

function onDeviceOrientation(event) {
    let tilt = Math.abs(event.beta || 0);
    const minTilt = CONFIG.arTracking.tiltMinDegrees;
    const maxTilt = CONFIG.arTracking.tiltMaxDegrees;
    STATE.deviceTiltOK = tilt >= minTilt && tilt <= maxTilt;
}

function showSideBlade(dish) {
    STATE.currentDish = dish;
    STATE.bladeVisible = true;

    $('bladeTitle').innerText = dish.name;
    $('bladeCategory').innerText = dish.category;
    $('bladePrice').innerText = dish.price;
    $('bladeDescription').innerText = dish.description;
    $('bladeRating').innerHTML = `<span class="star">${'★'.repeat(Math.round(dish.rating))}</span> <span>(${dish.rating})</span>`;

    const ingredientsHTML = formatIngredients(dish.ingredients)
        .map((ing) => `<div class="ingredient-tag"><span class="ingredient-icon">${ing.icon}</span>${ing.text}</div>`)
        .join('');
    $('bladeIngredients').innerHTML = ingredientsHTML;

    if (dish.allergens) {
        $('allergySection').classList.remove('hidden');
        $('bladeAllergy').innerText = dish.allergens;
    } else {
        $('allergySection').classList.add('hidden');
    }

    $('sideBlade').classList.add('visible');
    $('hudStatus').innerText = t('locked');

    // Gesture support
    STATE.touchStartX = 0;
    document.addEventListener('touchstart', onTouchStart, false);
    document.addEventListener('touchend', onTouchEnd, false);

    trackEvent('dish_detected', { dish: dish.name });
    showToast(`${t('identified')}: ${dish.name}`);
}

function hideSideBlade() {
    STATE.bladeVisible = false;
    STATE.currentDish = null;
    $('sideBlade').classList.remove('visible');
    $('hudStatus').innerText = t('tracking');
    document.removeEventListener('touchstart', onTouchStart, false);
    document.removeEventListener('touchend', onTouchEnd, false);
    trackEvent('dish_dismissed');
}

function onTouchStart(e) {
    if (STATE.bladeVisible) STATE.touchStartX = e.touches[0].clientX;
}

function onTouchEnd(e) {
    if (!STATE.bladeVisible) return;
    const touchEndX = e.changedTouches[0].clientX;
    const diffX = STATE.touchStartX - touchEndX;
    if (diffX > 100) hideSideBlade();
}

function initMindAR() {
    if (!CONFIG.arTracking.enableDemo) return;

    let cycleIndex = 0;
    const detectCycle = setInterval(() => {
        if (!STATE.cameraActive) {
            clearInterval(detectCycle);
            return;
        }

        const dish = CONFIG.menu[cycleIndex % CONFIG.menu.length];
        if (STATE.deviceTiltOK) {
            showSideBlade(dish);
            setTimeout(() => {
                hideSideBlade();
                cycleIndex++;
            }, 5000);
        }
    }, 8000);

    STATE.mindARActive = true;
    $('hudStatus').innerText = t('tracking');
}

/* =====================================================================
   EVENT LISTENERS
   ===================================================================== */
$('bladeClose').addEventListener('click', hideSideBlade);

$('bladeVideo').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const modal = $('videoModal');
    const video = $('modalVideo');
    video.src = STATE.currentDish.videoUrl;
    modal.classList.add('open');
    video.play().catch(() => {});
    trackEvent('video_opened', { dish: STATE.currentDish.name });
});

$('modalClose').addEventListener('click', () => {
    $('videoModal').classList.remove('open');
    $('modalVideo').pause();
    $('modalVideo').src = '';
});

$('bladeReserve').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    showToast(`RESERVATION: ${STATE.currentDish.name}`);
    trackEvent('reservation_initiated', { dish: STATE.currentDish.name });
});

$('shareInstagram').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const text = `Check out ${STATE.currentDish.name} on AR Gastronomy!`;
    window.open(`https://www.instagram.com/?caption=${encodeURIComponent(text)}`, '_blank');
    trackEvent('shared', { platform: 'instagram', dish: STATE.currentDish.name });
});

$('shareWhatsapp').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const text = `Check out ${STATE.currentDish.name}! ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    trackEvent('shared', { platform: 'whatsapp', dish: STATE.currentDish.name });
});

$('shareEmail').addEventListener('click', () => {
    if (!STATE.currentDish) return;
    const subject = `Discover ${STATE.currentDish.name}`;
    window.open(`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(window.location.href)}`, '_blank');
    trackEvent('shared', { platform: 'email', dish: STATE.currentDish.name });
});

$('btnInfo').addEventListener('click', () => {
    showToast(`📍 ${CONFIG.restaurant.location} | 📞 ${CONFIG.restaurant.phone}`);
    trackEvent('info_opened');
});

$('btnMenu').addEventListener('click', () => {
    showToast('FULL MENU - Coming Soon');
    trackEvent('menu_opened');
});

/* =====================================================================
   BOOT SEQUENCE
   ===================================================== */
window.addEventListener('DOMContentLoaded', async () => {
    initVideo();
    await loadMenu();
    initLaunchScreen();

    trackEvent('app_loaded', {
        language: STATE.currentLanguage,
        restaurant: CONFIG.restaurant.name
    });

    showToast('WELCOME TO AR GASTRONOMY');
});

window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && STATE.bladeVisible) hideSideBlade();
    if (e.key === ' ' && !STATE.appStarted) {
        $('launchScreen').classList.add('hidden');
        setTimeout(() => startARExperience(), 200);
    }
});
</script>

</body>
</html>
